<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas</title>
    <!-- Servidores ultra-estáveis (cdnjs) para rodar o React e Babel no navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.12/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ─── ÍCONES ───────────────────────────────────────────────────
        const EyeIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        );
        const EyeOffIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
        );
        const BellIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
        );
        const PlusIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        );
        const TrendUpIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                <polyline points="17 6 23 6 23 12"/>
            </svg>
        );
        const TrendDownIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
                <polyline points="17 18 23 18 23 12"/>
            </svg>
        );
        const CoinsIcon = () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="8" cy="8" r="6"/>
                <path d="M18.09 10.37A6 6 0 1110.34 18"/>
                <path d="M7 6h1v4"/><line x1="16.71" y1="13.88" x2="17" y2="14"/>
            </svg>
        );

        // ─── DADOS SIMULADOS ──────────────────────────────────────────────────
        const investments = [
            { id: 1, name: "Tesouro Selic 2027", category: "Renda Fixa", value: 5820.0, change: +2.3, status: "safe", statusLabel: "Seguro", color: "#00C896", bgLight: "#E8FFF7", description: "Acompanha os juros do país. Estável e previsível." },
            { id: 2, name: "Fundo Multimercado XP", category: "Fundos", value: 3140.5, change: -0.8, status: "moderate", statusLabel: "Moderado", color: "#FFB800", bgLight: "#FFFBEA", description: "Mistura renda fixa e ações. Pode oscilar um pouco." },
            { id: 3, name: "Ações ITUB4", category: "Ações", value: 1980.0, change: -3.1, status: "risky", statusLabel: "Arriscado", color: "#FF5C5C", bgLight: "#FFF0F0", description: "Ações sobem e descem bastante. Para quem aguenta as ondas." }
        ];

        const riskMeterPositions = { safe: 15, moderate: 50, risky: 85 };

        // ─── COMPONENTE PRINCIPAL ─────────────────────────────────────────────
        function Dashboard() {
            const [balanceVisible, setBalanceVisible] = useState(false);
            const [activeCard, setActiveCard] = useState(null);
            const [farolState, setFarolState] = useState("moderate");

            const totalBalance = investments.reduce((acc, i) => acc + i.value, 0);
            const totalChange = investments.reduce((acc, i) => acc + (i.value * i.change) / 100, 0);

            const farolConfig = {
                safe: { label: "Verde — Siga em frente", desc: "Momento tranquilo. Bom para quem quer começar a investir agora.", color: "#00C896", bg: "#E8FFF7" },
                moderate: { label: "Amarelo — Olho vivo", desc: "Mercado um pouco agitado. Espere antes de fazer movimentos grandes.", color: "#FFB800", bg: "#FFFBEA" },
                risky: { label: "Vermelho — Calma", desc: "Turbulência passageira. Quem tem prazo longo não precisa se preocupar.", color: "#FF5C5C", bg: "#FFF0F0" }
            };
            const farol = farolConfig[farolState];

            return (
                <div style={{ fontFamily: "'Inter', sans-serif", background: "#F7F8FA", minHeight: "100vh" }}>
                    <header style={{ background: "#fff", borderBottom: "1px solid #EAECF0", position: "sticky", top: 0, zIndex: 50 }}>
                        <div style={{ maxWidth: 900, margin: "0 auto", padding: "0 24px", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <div style={{ width: 36, height: 36, borderRadius: 10, background: "#00C896", display: "flex", alignItems: "center", justifyContent: "center" }}><CoinsIcon /></div>
                                <span style={{ fontWeight: 800, fontSize: 18, color: "#1A1D23", letterSpacing: "-0.5px" }}>Minhas<span style={{ color: "#00C896" }}>Moedinhas</span></span>
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                                <button style={{ background: "none", border: "none", cursor: "pointer", color: "#6B7280", padding: 8, borderRadius: 8, display: "flex" }}><BellIcon /></button>
                                <div style={{ width: 36, height: 36, borderRadius: "50%", background: "#E8FFF7", border: "2px solid #00C896", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, color: "#00C896" }}>JS</div>
                            </div>
                        </div>
                    </header>

                    <main style={{ maxWidth: 900, margin: "0 auto", padding: "32px 24px 80px" }}>
                        <section style={{ background: "#1A1D23", borderRadius: 20, padding: "32px 36px", marginBottom: 28, position: "relative", overflow: "hidden" }}>
                            <p style={{ color: "#9CA3AF", fontSize: 13, marginBottom: 8, letterSpacing: "0.04em", textTransform: "uppercase", fontWeight: 500 }}>Seu dinheiro guardado</p>
                            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 12 }}>
                                <span style={{ fontWeight: 800, fontSize: balanceVisible ? 36 : 32, color: "#fff", letterSpacing: "-1.5px", lineHeight: 1 }}>
                                    {balanceVisible ? "R$ " + totalBalance.toLocaleString("pt-BR", { minimumFractionDigits: 2 }) : "R$ •••••••"}
                                </span>
                                <button onClick={() => setBalanceVisible(!balanceVisible)} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "#9CA3AF", display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
                                    {balanceVisible ? <EyeOffIcon /> : <EyeIcon />}
                                    <span>{balanceVisible ? "Ocultar" : "Ver saldo"}</span>
                                </button>
                            </div>
                            {balanceVisible ? (
                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span style={{ color: totalChange >= 0 ? "#00C896" : "#FF5C5C", display: "flex", alignItems: "center", gap: 4, fontSize: 14, fontWeight: 600 }}>
                                        {totalChange >= 0 ? <TrendUpIcon /> : <TrendDownIcon />}
                                        {totalChange >= 0 ? "+" : ""}R$ {Math.abs(totalChange).toLocaleString("pt-BR", { minimumFractionDigits: 2 })}
                                    </span>
                                    <span style={{ color: "#6B7280", fontSize: 13 }}>nos últimos 30 dias</span>
                                </div>
                            ) : <p style={{ color: "#4B5563", fontSize: 13, marginTop: 4 }}>Toque em "Ver saldo" para revelar 👆</p>}
                        </section>

                        <section style={{ marginBottom: 28 }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                                <h2 style={{ fontWeight: 700, fontSize: 16, color: "#1A1D23" }}>🚦 Farol de Tendências</h2>
                            </div>
                            <div style={{ background: farol.bg, borderLeft: "4px solid " + farol.color, borderRadius: 14, padding: "18px 22px", display: "flex", alignItems: "center", gap: 16 }}>
                                <div style={{ width: 14, height: 14, borderRadius: "50%", background: farol.color, boxShadow: "0 0 10px " + farol.color + "66" }} />
                                <div>
                                    <p style={{ fontWeight: 700, fontSize: 14, color: "#1A1D23", marginBottom: 3 }}>{farol.label}</p>
                                    <p style={{ fontSize: 13, color: "#4B5563", lineHeight: 1.5 }}>{farol.desc}</p>
                                </div>
                            </div>
                            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                                {["safe", "moderate", "risky"].map((s) => (
                                    <button key={s} onClick={() => setFarolState(s)} style={{ fontSize: 11, padding: "4px 12px", borderRadius: 20, border: "1px solid " + farolConfig[s].color, background: farolState === s ? farolConfig[s].color : "transparent", color: farolState === s ? "#fff" : farolConfig[s].color, cursor: "pointer", fontWeight: 600 }}>
                                        {farolConfig[s].label.split(" — ")[0]}
                                    </button>
                                ))}
                            </div>
                        </section>

                        <section style={{ marginBottom: 36 }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                                <h2 style={{ fontWeight: 700, fontSize: 16, color: "#1A1D23" }}>🌡️ Meus Investimentos</h2>
                            </div>
                            <div style={{ marginBottom: 20, padding: "14px 18px", background: "#fff", borderRadius: 12, border: "1px solid #EAECF0" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#9CA3AF", marginBottom: 6 }}>
                                    <span>Mais seguro</span><span>Mais arriscado</span>
                                </div>
                                <div style={{ position: "relative", height: 8, borderRadius: 4, background: "linear-gradient(to right, #00C896, #FFB800, #FF5C5C)" }}>
                                    {investments.map((inv) => (
                                        <div key={inv.id} onClick={() => setActiveCard(activeCard === inv.id ? null : inv.id)} style={{ position: "absolute", top: "50%", left: riskMeterPositions[inv.status] + "%", transform: "translate(-50%, -50%)", width: 18, height: 18, borderRadius: "50%", background: inv.color, border: "3px solid #fff", boxShadow: "0 0 0 2px " + inv.color + "66", cursor: "pointer" }} />
                                    ))}
                                </div>
                            </div>

                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14 }}>
                                {investments.map((inv) => (
                                    <div key={inv.id} onClick={() => setActiveCard(activeCard === inv.id ? null : inv.id)} style={{ background: activeCard === inv.id ? inv.bgLight : "#fff", border: "1.5px solid " + (activeCard === inv.id ? inv.color : "#EAECF0"), borderRadius: 16, padding: "20px 22px", cursor: "pointer", position: "relative" }}>
                                        <p style={{ fontWeight: 700, fontSize: 15, color: "#1A1D23", marginBottom: 2 }}>{inv.name}</p>
                                        <p style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 14 }}>{inv.category}</p>
                                        <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between" }}>
                                            <div>
                                                <p style={{ fontSize: 11, color: "#9CA3AF" }}>Valor aplicado</p>
                                                <p style={{ fontWeight: 800, fontSize: 20, color: "#1A1D23" }}>R$ {inv.value.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</p>
                                            </div>
                                            <div style={{ padding: "5px 10px", borderRadius: 8, background: inv.change >= 0 ? "#E8FFF7" : "#FFF0F0", color: inv.change >= 0 ? "#00C896" : "#FF5C5C", fontWeight: 700, fontSize: 13 }}>
                                                {inv.change}%
                                            </div>
                                        </div>
                                        {activeCard === inv.id && (
                                            <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px dashed #EAECF0", fontSize: 13, color: "#4B5563" }}>
                                                <p style={{ fontWeight: 600, color: "#1A1D23" }}>O que significa?</p>
                                                {inv.description}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </section>

                        <div style={{ textAlign: "center" }}>
                            <button style={{ background: "#00C896", color: "#fff", border: "none", borderRadius: 16, padding: "18px 40px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
                                Simular novo investimento
                            </button>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
