<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Educação Financeira</title>
  
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased selection:bg-emerald-500/30">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const html = htm.bind(React.createElement);

    // DADOS HISTÓRICOS (Gráfico)
    const HISTORICO = [
      { mes: 'Jan', valor: 4000 },
      { mes: 'Fev', valor: 5500 },
      { mes: 'Mar', valor: 8200 },
      { mes: 'Abr', valor: 12000 },
      { mes: 'Mai', valor: 15500 },
      { mes: 'Jun', valor: 20550 },
    ];
    const MAX_VALOR = Math.max(...HISTORICO.map((h) => h.valor));

    // REGRAS DE ALOCAÇÃO
    const ALOCACAO = [
      { nome: 'Renda Fixa', pct: 0.5, cor: 'text-indigo-400' },
      { nome: 'FIIs (Imobiliário)', pct: 0.4, cor: 'text-emerald-400' },
      { nome: 'Ações', pct: 0.1, cor: 'text-amber-400' },
    ];

    // OPORTUNIDADES DA SEMANA (Com estado de clique)
    const OPORTUNIDADES = [
      { id: 'selic', nome: 'Tesouro Selic 2029', tipo: 'Renda Fixa', taxa: '10.5% a.a', desc: 'Ideal para reserva de emergência. Rendimento diário e segurança total pelo Governo Federal.' },
      { id: 'mxrf', nome: 'MXRF11 (FII)', tipo: 'FII', taxa: '9.8% a.a', desc: 'Um dos fundos imobiliários mais populares do mercado, focado em papéis de desenvolvimento imobiliário com dividendos mensais.' },
      { id: 'petr', nome: 'PETR4 (Ação)', tipo: 'Ação', taxa: 'Dividendo alto', desc: 'Empresa estatal com histórico de altos dividendos, mas sujeita a oscilações políticas do mercado.' }
    ];

    function App() {
      const [valor, setValor] = useState(() => localStorage.getItem('@minhasmoedinhas:aporte') || '');
      const [resultado, setResultado] = useState(null);
      const [ativoAberto, setAtivoAberto] = useState(null);

      const calcular = () => {
        const v = parseFloat(valor);
        if (Number.isNaN(v) || v <= 0) return;
        setResultado(v);
        localStorage.setItem('@minhasmoedinhas:aporte', valor);
      };

      useEffect(() => {
        if (valor) calcular();
      }, []);

      return html`
        <div class="max-w-2xl mx-auto p-4 md:p-6 min-h-screen flex flex-col justify-between space-y-6">
          
          <main class="space-y-6">
            <header class="py-2">
              <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">
                Minhas Moedinhas
              </h1>
              <p class="text-xs text-slate-400 mt-1">Busque a sua autonomia financeira investindo com propósito.</p>
            </header>

            <section class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
              <h2 class="text-sm font-semibold text-indigo-400 mb-4">Evolução do Patrimônio</h2>
              <div class="flex items-end justify-between h-36 gap-3 px-2 border-b border-l border-slate-800 pb-2 bg-slate-950/60 rounded-lg">
                ${HISTORICO.map((item) => {
                  const alturaPercentual = (item.valor / MAX_VALOR) * 100;
                  return html`
                    <div key=${item.mes} class="flex flex-col items-center group w-full relative">
                      <div
                        class="w-full bg-emerald-500 rounded-t-md hover:bg-emerald-400 transition-all duration-200 cursor-pointer"
                        style="height: ${alturaPercentual}%; min-height: 10px;"
                        title=${'R$ ' + item.valor.toLocaleString('pt-BR')}
                      ></div>
                      <span class="text-[10px] mt-2 text-slate-500 group-hover:text-emerald-400 font-medium">${item.mes}</span>
                    </div>
                  `;
                })}
              </div>
            </section>

            <section class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl space-y-4">
              <h2 class="text-sm font-semibold text-indigo-400">Simulador de Aporte</h2>
              
              <div class="flex gap-2">
                <input
                  type="number"
                  value=${valor}
                  onChange=${(e) => setValor(e.target.value)}
                  onKeyDown=${(e) => e.key === 'Enter' && calcular()}
                  placeholder="Quanto quer investir hoje? (R$)"
                  class="w-full p-3 bg-slate-950 rounded-xl border border-slate-800 focus:outline-none focus:border-emerald-500 text-slate-100 placeholder-slate-600 transition-colors text-sm"
                />
                <button
                  onClick=${calcular}
                  class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-6 rounded-xl font-bold transition-all duration-200 active:scale-95 text-sm"
                >
                  Simular
                </button>
              </div>

              ${resultado !== null && html`
                <div class="pt-2 space-y-2">
                  <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    ${ALOCACAO.map((a) => html`
                      <div key=${a.nome} class="bg-slate-950/80 p-3 rounded-xl border border-slate-800 text-center sm:text-left">
                        <p class="text-[11px] text-slate-400 font-medium">${a.nome} (${a.pct * 100}%)</p>
                        <p class="font-bold text-base ${a.cor} mt-0.5">R$ ${(resultado * a.pct).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                      </div>
                    `)}
                  </div>
                </div>
              `}
            </section>

            <section class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl space-y-3">
              <h2 class="text-sm font-semibold text-indigo-400">Top 3 Oportunidades da Semana</h2>
              <div class="space-y-2">
                ${OPORTUNIDADES.map((op) => {
                  const aberto = ativoAberto === op.id;
                  return html`
                    <div 
                      key=${op.id} 
                      onClick=${() => setAtivoAberto(aberto ? null : op.id)}
                      class="bg-slate-950/50 hover:bg-slate-950 p-3 rounded-xl border border-slate-800/80 cursor-pointer transition-colors space-y-2"
                    >
                      <div class="flex justify-between items-center">
                        <div>
                          <h3 class="text-xs font-bold text-slate-200">${op.nome}</h3>
                          <span class="text-[10px] text-slate-500">Clique para detalhes</span>
                        </div>
                        <span class="text-xs font-bold ${op.id === 'petr' ? 'text-emerald-400' : 'text-emerald-400'}">${op.taxa}</span>
                      </div>
                      ${aberto && html`
                        <p class="text-xs text-slate-400 pt-1 border-t border-slate-800/60 leading-relaxed animate-fade-in">
                          ${op.desc}
                        </p>
                      `}
                    </div>
                  `;
                })}
              </div>
            </section>
          </main>

          <footer class="pt-6 border-t border-slate-900 text-center space-y-2">
            <p class="text-[9px] text-slate-500 leading-relaxed max-w-md mx-auto">
              <strong>Aviso Legal:</strong> O <em>Minhas Moedinhas</em> é uma ferramenta exclusivamente educativa. Os cálculos e divisões não constituem recomendação de compra ou alocação de ativos. Investimentos envolvem riscos.
            </p>
            <p class="text-[8px] text-slate-600">
              Seus dados financeiros são processados localmente e pertencem apenas a você.
            </p>
          </footer>

        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
