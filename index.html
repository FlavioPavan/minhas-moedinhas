<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Se você ver o título da página mas a tela continua branca, 
        // o erro pode estar no conteúdo do React. 
        // Vamos colocar um teste simples:
        function App() {
            return (
                <div className="p-10 text-center">
                    <h1 className="text-3xl font-bold text-green-600">Funcionou!</h1>
                    <p className="mt-4">O React está carregando corretamente.</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
