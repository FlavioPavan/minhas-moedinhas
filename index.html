    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* Gráfico */
    .bar-animate { transition: height 0.55s cubic-bezier(0.16, 1, 0.3, 1); }
    .bar-proj    { background: linear-gradient(to top, #818cf8cc, #a5b4fcee); }
    .bar-hist    { background: #34d39980; }
    .bar-hist:hover { background: #34d399; }

    /* Acordeão */
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1); }
    .accordion-body.open { max-height: 520px; }

    /* Selic pulse */
    .pulse-dot { animation: pulse-ring 2s cubic-bezier(0.455,0.03,0.515,0.955) infinite; }

    .progress-fill { transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }

    /* Card hover glow */
    .card-glow:hover { box-shadow: 0 0 0 1px #34d39933, 0 8px 28px #34d39914; }

    /* Número sem seta */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* Micro-interações */
    .profile-btn { transition: all 0.18s ease; }
    .profile-btn:hover { transform: translateY(-1px); }
    .profile-btn:active { transform: scale(0.96); }

    .sim-btn { transition: all 0.15s ease; }
    .sim-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px #34d39940; }
    .sim-btn:active { transform: scale(0.97); box-shadow: none; }

    .tab-btn { transition: all 0.2s ease; }

    /* Auth */
    .auth-input { transition: border-color 0.2s, box-shadow 0.2s; }
    .auth-input:focus { outline: none; border-color: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,0.15); }

    .auth-btn { transition: all 0.18s ease; }
    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #34d39945; }
    .auth-btn:active { transform: scale(0.97); }

    .google-btn { transition: all 0.18s ease; }
    .google-btn:hover { transform: translateY(-1px); border-color: #475569; background: #1e293b; }
    .google-btn:active { transform: scale(0.97); }

    .signout-btn { transition: all 0.18s ease; }
    .signout-btn:hover { background: rgba(30,41,59,0.8); color: #94a3b8; }

    /* Tooltip gráfico */
    .bar-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-size: 9px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 6px;
      z-index: 10;
    }
    .bar-wrap:hover .bar-tooltip { opacity: 1; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Fade in */
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    /* Privacy blur */
    .privacy-blur {
      filter: blur(6px);
      transition: filter 0.25s ease;
      user-select: none;
      pointer-events: none;
    }
    .privacy-blur-hover:hover .privacy-blur {

    }

    /* Modal overlay */

    }
    .modal-card {

    async function dbLoad(userId) {
      try {
        const { data, error } = await sbClient
          .from('portfolios')
          .select('aporte, perfil')
          .eq('user_id', userId)
          .maybeSingle();
        if (error) throw error;
        return { aporte: data?.aporte ?? null, perfil: data?.perfil ?? 'moderado' };
      } catch (err) {
        console.error('[DB] erro ao carregar:', err.message);
        return { aporte: null, perfil: 'moderado' };
      }
    }

    function gerarHistoricoDinamico(aporteAtual, perfil, selicAnual) {
      const base = (aporteAtual && aporteAtual > 0) ? aporteAtual : 1000;
      const safePerfil = PERFIS[perfil] ? perfil : 'moderado';
      const alocacao = PERFIS[safePerfil].alocacao;
      const rfPct = alocacao[0].pct;
      const fiiPct = alocacao[1].pct;
      const acoesPct = alocacao[2].pct;

      const taxaMensalRF = Math.pow(1 + (selicAnual || SELIC_FALLBACK) / 100, 1 / 12) - 1;
      const fiiMensal = 0.006;
      const acoesMensal = 0.010;
      const rentMediaMensal = rfPct * taxaMensalRF + fiiPct * fiiMensal + acoesPct * acoesMensal;

      const meses = ['Jan','Fev','Mar','Abr','Mai','Jun'];
      const historico = [];
      let valor = base;

      for (let i = meses.length - 1; i >= 0; i--) {
        const mes = meses[i];
        if (i === meses.length - 1) {
          historico.push({ mes, valor });
        } else {
          valor = valor / (1 + rentMediaMensal);
          historico.push({ mes, valor });
        }
      }
      return historico.reverse();
    }

    function gerarProjecao(aporte, perfilObj, selicAnual) {
      if (!perfilObj || !perfilObj.alocacao) return [];
      const rfPct       = perfilObj.alocacao[0].pct;
      const fiiPct      = perfilObj.alocacao[1].pct;
      const acoesPct    = perfilObj.alocacao[2].pct;
      const taxaMensal  = Math.pow(1 + (selicAnual || SELIC_FALLBACK) / 100, 1 / 12) - 1;
      const fiiMensal   = 0.006;
      const acoesMensal = 0.010;
      const meses = ['Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar','Abr','Mai','Jun'];
      let rf = aporte * rfPct, fii = aporte * fiiPct, acoes = aporte * acoesPct;
      return meses.map(function(mes, i) {
        if (i > 0) { rf *= 1 + taxaMensal; fii *= 1 + fiiMensal; acoes *= 1 + acoesMensal; }
        return { mes, valor: rf + fii + acoes };
      });
    }

        return gerarHistoricoDinamico(resultado, safePerfil, selic);
      }, [resultado, safePerfil, selic]);

      const temAporte = resultado !== null && resultado > 0;
      const projecao  = temAporte ? gerarProjecao(resultado, PERFIS[safePerfil], selic) : [];
      const dados     = modo === 'historico' ? historicoDinamico : projecao;
      
      const maxVal    = (dados && dados.length > 0) ? Math.max(...dados.map(function(d) { return d.valor || 1; })) : 1;
      const modoHist  = modo === 'historico';

      const tabBase = 'tab-btn px-3 py-1 rounded-lg text-[10px] font-semibold border ';
      const tabHCls = tabBase + (modoHist
        ? 'bg-[#34d399]/15 border-[#34d399]/40 text-[#34d399]'
        : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400');
      const tabPCls = tabBase + (!modoHist
        ? 'bg-indigo-400/15 border-indigo-400/40 text-indigo-300'
        : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400');

      return html`
        <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">
              ${modoHist ? 'Evolução do Patrimônio' : 'Projeção — 12 meses'}
            </h2>
            <div class="flex gap-1 bg-[#0d1117]/50 p-0.5 rounded-lg border border-slate-800">
              <button class=${tabHCls} onClick=${function() { setModo('historico'); }}>Histórico</button>
              <button class=${tabPCls} onClick=${function() { setModo('projecao'); }}>12 meses</button>
            </div>
          </div>

          ${!modoHist && !temAporte
            ? html`
                <div class="h-24 flex flex-col items-center justify-center gap-2 border border-dashed border-slate-700/60 rounded-xl bg-[#0d1117]/30">
                  <span class="text-xl">💡</span>
                  <p class="text-[10px] text-slate-500 text-center leading-relaxed">
                    Digite um valor no simulador<br/>abaixo para ver a projeção.
                  </p>
                </div>`
            : html`
                <div class="flex items-end justify-between h-24 gap-1 px-0.5">
                  ${dados && dados.map(function(item) {
                    const pct    = Math.max(((item.valor || 0) / maxVal) * 100, 2);
                    const barCls = modoHist
                      ? 'bar-animate bar-hist w-full rounded-t-sm cursor-default hover:ring-1 hover:ring-[#34d399] hover:ring-inset'
                      : 'bar-animate bar-proj w-full rounded-t-sm cursor-default hover:ring-1 hover:ring-indigo-400 hover:ring-inset';
                    const valFmt = item.valor >= 1000
                      ? 'R$' + (item.valor / 1000).toFixed(1) + 'k'
                      : 'R$' + item.valor.toFixed(0);
                    const hSty   = { height: pct + '%', minHeight: '4px' };
                    return html`
                      <div key=${item.mes} class="bar-wrap flex flex-col items-center w-full relative">
                        <span class="bar-tooltip">${showValues ? valFmt : '••••'}</span>
                        <div class=${barCls} style=${hSty}></div>
                        <span class="text-[8px] mt-1 text-slate-600 font-medium">${item.mes}</span>
                      </div>`;
                  })}
                </div>`
          }

          <div class="mt-2 pt-2 border-t border-slate-800/60 flex items-center justify-between">
            ${modoHist
              ? html`
                  <span class="text-[9px] text-slate-500">Total acumulado</span>
                  <span class="text-sm font-bold text-[#34d399] ${showValues ? '' : 'privacy-blur'}">
                    ${showValues ? 'R$ ' + fmtBRL(historicoDinamico[historicoDinamico.length-1]?.valor) : 'R$ ••••'}
                  </span>`
              : temAporte
                ? html`
                    <span class="text-[9px] text-slate-500">Projeção em 12 meses</span>
                    <span class="text-sm font-bold text-indigo-300 ${showValues ? '' : 'privacy-blur'}">
                      ${showValues ? 'R$ ' + fmtBRL(projecao[projecao.length-1]?.valor) : 'R$ ••••'}
                    </span>`
                : html`<span></span>`
            }
          </div>
        </section>`;
    }

    function ResultadoAlocacao({ resultado, perfil, selic, selicIsLive, selicLoading, showValues }) {
      const safePerfil = PERFIS[perfil] ? perfil : 'moderado';
      const alocacao   = PERFIS[safePerfil].alocacao;
      const rfItem     = alocacao[0];
      const rendMensal = (resultado * (rfItem?.pct || 0) * (selic || SELIC_FALLBACK) / 100) / 12;

      return html`
        <div class="space-y-2.5">
          <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">

          ${alocacao.map(function(a) {
            const bruto    = resultado * (a.pct || 0);
            const pctLabel = Math.round((a.pct || 0) * 100);
            const isRF     = a === rfItem;
            const wSty     = { width: ((a.pct || 0) * 100) + '%' };
            const displayBruto = showValues ? 'R$ ' + fmtBRL(bruto) : 'R$ ••••';
            return html`

                    <div class="min-w-0">
                      <p class="text-xs text-slate-300 font-medium">${a.nome} (${pctLabel}%)</p>
                      ${isRF && !selicLoading && html`
                        <p class="text-[9px] text-slate-500 mt-0.5 ${showValues ? '' : 'privacy-blur'}">
                          ${showValues ? '≈ R$ ' + rendMensal.toFixed(2) + '/mês em juros' : '≈ R$ ••••/mês'}
                          ${!selicIsLive ? ' · média' : ''}
                        </p>`}
                    </div>
                  </div>
                  <span class=${'font-bold text-sm flex-shrink-0 ' + a.cor}>${displayBruto}</span>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                  <div class=${'h-full rounded-full progress-fill ' + a.bg} style=${wSty}></div>

    function LoginScreen() {
      const [modo,     setModo]     = useState('entrar'); 
      const [nome,     setNome]     = useState('');
      const [whatsapp, setWhatsapp] = useState('');
      const [email,    setEmail]    = useState('');
      const [senha,    setSenha]    = useState('');
      const [erro,     setErro]     = useState('');
      const [sucesso,  setSucesso]  = useState('');
      const [loading,  setLoading]  = useState(false);

      function limpar() { setErro(''); setSucesso(''); }

      async function handleEntrar() {
        if (!email || !senha) { setErro('Preencha e-mail e senha.'); return; }
        setLoading(true); limpar();
        try {
          const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
          if (error) throw error;
        } catch (err) {
          setErro(traduzirErro(err.message));
        } finally {
          setLoading(false);
        }
      }

      async function handleCadastrar() {
        if (!nome || !whatsapp || !email || !senha) { 
          setErro('Por favor, preencha todos os campos do cadastro.'); 
          return; 
        }
        setLoading(true); limpar();
        try {
          // 1. Cadastra as credenciais de autenticação no Supabase
          const { data, error } = await sbClient.auth.signUp({ email, password: senha });
          if (error) throw error;

          if (data?.user) {
            // 2. Salva Nome, WhatsApp e E-mail estruturados no banco de leads relacional
            await dbSaveProfile(data.user.id, nome, whatsapp, email);
          }
          setSucesso('Conta criada com sucesso! Verifique seu e-mail para confirmar.');
        } catch (err) {
          setErro(traduzirErro(err.message));
        } finally {
          setLoading(false);
        }
      }

      const isCad    = modo === 'cadastrar';
      const tabAtivo = 'flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-[#1a2233] text-[#34d399] border border-[#34d399]/30 shadow-sm';
      const tabOff   = 'flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-300';

      return html`
        <div class="min-h-screen bg-[#0d1117] flex items-center justify-center p-4">

            <div class="flex flex-col items-center mb-6 gap-2">

                <button class=${isCad ? tabAtivo : tabOff} onClick=${() => { setModo('cadastrar'); limpar(); }}>Cadastrar</button>

              <div class="space-y-3">

                  <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 font-semibold uppercase">WhatsApp com DDD</label>

                  </div>

                <div class="space-y-1">

                  <input type="email" value=${email} onChange=${e => setEmail(e.target.value)} placeholder="seu@email.com" class="auth-input w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 text-xs" />

      const [selicIsLive,  setSelicIsLive]  = useState(false);
      const [selicLoading, setSelicLoading] = useState(true);
      const [dbReady,      setDbReady]      = useState(false);
      const [saving,       setSaving]       = useState(false);
      const [showValues,   setShowValues]   = useState(true);

      const tickers = useTickersSimulados();

      useEffect(function() {
        let isMounted = true;
        (async function() {
          const data = await dbLoad(user.id);
          if (isMounted) {
            if (data.perfil && PERFIS[data.perfil]) setPerfil(data.perfil);
            if (data.aporte !== null && !isNaN(data.aporte) && data.aporte > 0) {
              setValor(String(data.aporte));
              setResultado(data.aporte);
            }
            setDbReady(true);
          }
        })();
        return () => { isMounted = false; };
      }, [user.id]);

      useEffect(function() {
        const ctrl = new AbortController();
        const tid  = setTimeout(function() { ctrl.abort(); }, 4000);
        (async function() {
          try {
            const res  = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json', { signal: ctrl.signal });
            const json = await res.json();
            const d = parseFloat(json[0]?.valor);
            if (!isNaN(d)) {
              setSelic(parseFloat(((Math.pow(1 + d / 100, 252) - 1) * 100).toFixed(2)));
              setSelicIsLive(true);
            }
          } catch (_) {
            setSelic(SELIC_FALLBACK);
            setSelicIsLive(false);
          } finally {
            clearTimeout(tid);
            setSelicLoading(false);
          }
        })();
        return () => ctrl.abort();
      }, []);

      const calcular = useCallback(async function() {
        const v = parseFloat(valor);
        if (isNaN(v) || v <= 0) return;
        setResultado(v);
        setSaving(true);
        await dbSave(user.id, v, perfil);
        setSaving(false);
      }, [valor, perfil, user.id]);

      async function handlePerfilChange(key) {
        setPerfil(key);
        setPerfilChanged(true);
        const v = parseFloat(valor);
        setSaving(true);
        await dbSave(user.id, isNaN(v) ? null : v, key);
        setSaving(false);
      }

      if (!dbReady) {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center bg-[#0d1117]">
            <${Spinner} size="w-6 h-6" />
          </div>`;

      const emailCurto = user.email ? user.email.split('@')[0] : 'investidor';
      const safePerfil = PERFIS[perfil] ? perfil : 'moderado';

      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col space-y-4 pb-10 fade-up">
          <header class="pt-2 flex flex-col gap-1">
            <div class="flex items-start justify-between">
              <div>
                <div class="flex items-center gap-2">
                  <${CoinLogo} size=${24} />
                  <h1 class="text-xl font-extrabold text-[#34d399]">Minhas Moedinhas</h1>
                </div>
                <p class="text-[11px] text-slate-500 mt-0.5">Olá, ${emailCurto} 👋</p>
              </div>
              <div class="flex flex-col items-end gap-1">
                <div class="flex items-center gap-2">
                  <button onClick=${() => setShowValues(!showValues)} class="text-xs">
                    ${showValues ? '👁️' : '🙈'}
                  </button>
                  <${SelicBadge} selic=${selic} isLive=${selicIsLive} loading=${selicLoading} />
                </div>
                <button onClick=${() => sbClient.auth.signOut()} class="text-[9px] text-slate-500 underline">Sair</button>
              </div>
            </div>
            <${TickersBar} tickers=${tickers} />
          </header>

          <${Conquistas} hasAporte=${resultado > 0} perfilChanged=${perfilChanged} hasHighAporte=${resultado > 100} />

          <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 space-y-3">
            <${PerfilSelector} perfil=${perfil} onChange=${handlePerfilChange} />
            <div class="flex gap-2">
              <input type="number" value=${valor} onChange=${e => setValor(e.target.value)} placeholder="0,00" class="flex-1 px-3 py-2 bg-[#0d1117] rounded-xl text-sm text-slate-100 focus:outline-none border border-slate-700" />
              <button onClick=${calcular} class="bg-[#34d399] text-slate-950 font-bold px-4 rounded-xl text-xs">Simular</button>
            </div>
            ${resultado !== null && html`
              <${ResultadoAlocacao} resultado=${resultado} perfil=${perfil} selic=${selic} selicIsLive=${selicIsLive} selicLoading=${selicLoading} showValues=${showValues} />
            `}
          </section>

          <${GraficoCard} resultado=${resultado} perfil=${perfil} selic=${selic} showValues=${showValues} />
          <${FluxoCaixa} setValorSimulador=${setValor} />
          <${SonhosCard} />
          <${MonetizationBanner} />

          <section class="space-y-2">
            ${PERFIS[safePerfil].oportunidades.map(function(op) {
              return html`<${OportunidadeCard} key=${op.id} op=${op} isOpen=${openCard === op.id} onToggle=${() => setOpenCard(openCard === op.id ? null : op.id)} />`;
            })}
          </section>

          <footer class="text-center pt-4 border-t border-slate-800 space-y-1">
            <${WhatsAppButton} />
            <p class="text-[8px] text-slate-600">© 2026 Minhas Moedinhas · Proteção de Dados Garantida</p>
          </footer>
        </div>`;
    }

    function Root() {
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [onboardingSeen, setOnboardingSeen] = useState(false);

      useEffect(function() {
        setOnboardingSeen(localStorage.getItem('onboarding_visto') === 'true');
        sbClient.auth.getSession().then(function(res) {
          setUser(res.data?.session?.user ?? false);
          setAuthReady(true);
        });
        const sub = sbClient.auth.onAuthStateChange(function(_ev, session) {
          setUser(session?.user ?? false);
          setAuthReady(true);
        });
        return function() {
          if (sub && typeof sub.unsubscribe === 'function') sub.unsubscribe();
        };
      }, []);

      if (!authReady) {
        return html`
          <div class="min-h-screen flex items-center justify-center bg-[#0d1117]">
            <${Spinner} size="w-6 h-6" />
          </div>`;
      }

      if (!user) return html`<${LoginScreen} />`;

      return html`
        <${MainApp} user=${user} onboardingSeen=${onboardingSeen} setOnboardingSeen=${setOnboardingSeen} />
        ${!onboardingSeen && html`<${OnboardingModal} onComplete=${() => { localStorage.setItem('onboarding_visto','true'); setOnboardingSeen(true); }} />`}
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root} />`);
  </script>
</body>
</html>
