    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .pulse-dot { animation: pulse-ring 2s cubic-bezier(0.455,0.03,0.515,0.955) infinite; }
    @keyframes pulse-ring { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .card-glow:hover { box-shadow: 0 0 0 1px #34d39933, 0 8px 28px #34d39914; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .profile-btn, .sim-btn, .tab-btn, .auth-btn, .google-btn, .signout-btn, .whatsapp-btn { transition: all 0.18s ease; }
    .profile-btn:hover, .sim-btn:hover, .auth-btn:hover, .google-btn:hover, .whatsapp-btn:hover { transform: translateY(-1px); }
    .profile-btn:active, .sim-btn:active, .auth-btn:active, .google-btn:active, .whatsapp-btn:active { transform: scale(0.97); }
    .sim-btn:hover { box-shadow: 0 4px 16px #34d39940; }
    .auth-input { transition: border-color 0.2s, box-shadow 0.2s; }
    .auth-input:focus { outline: none; border-color: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,0.15); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    .privacy-blur { filter: blur(6px); transition: filter 0.25s ease; user-select: none; pointer-events: none; }
    .modal-overlay { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(8px); animation: fadeUp 0.3s ease forwards; }
    .banner-glow { background: linear-gradient(135deg, rgba(52, 211, 153, 0.12), rgba(129, 140, 248, 0.12)); border: 1px solid rgba(52, 211, 153, 0.25); transition: all 0.3s ease; }
    .banner-glow:hover { border-color: rgba(52, 211, 153, 0.5); box-shadow: 0 0 24px rgba(52, 211, 153, 0.08); }
    .badge-off { filter: grayscale(1); opacity: 0.4; }
    .badge-on { filter: grayscale(0); opacity: 1; animation: pulse-badge 1.5s ease-in-out infinite; }
    @keyframes pulse-badge { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>
</head>
<body class="bg-[#0d1117] text-slate-100 antialiased">
  <div id="root"></div>
  <script>
    const { useState, useEffect, useCallback, useMemo } = React;
    const html = htm.bind(React.createElement);
    const SUPABASE_URL = 'https://gqpxxwfahnwnhklbjwxr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcHh4d2ZhaG53bmhrbGJqd3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjYyNjEsImV4cCI6MjA5NzI0MjI2MX0.ntq4ABMCXOhvjI-yU5XH7bclEGMVY0_72Admuid1Zn4';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const SELIC_FALLBACK = 10.5;

    function fmtBRL(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function traduzirErro(msg) {
      if (!msg) return 'Ocorreu um erro.';
      if (msg.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
      if (msg.includes('Email not confirmed')) return 'Verifique sua caixa de entrada para confirmar o e-mail.';
      if (msg.includes('User already registered')) return 'Este e-mail já possui cadastro.';
      if (msg.includes('Password should be')) return 'A senha deve ter pelo menos 6 caracteres.';
      return msg;
    }

    async function dbLoad(userId) {
      const { data, error } = await sbClient.from('portfolios').select('aporte, perfil').eq('user_id', userId).maybeSingle();
      if (error) return { aporte: null, perfil: 'moderado' };
      return { aporte: data?.aporte ?? null, perfil: data?.perfil ?? 'moderado' };
    }
    async function dbSave(userId, aporte, perfil) {
      await sbClient.from('portfolios').upsert({ user_id: userId, aporte, perfil }, { onConflict: 'user_id' });
    }
    async function carregarTransacoes(userId) {
      const { data, error } = await sbClient.from('transacoes').select('*').eq('user_id', userId).order('created_at', { ascending: false });
      return error ? [] : (data || []);
    }
    async function salvarTransacao(userId, descricao, valor, tipo) {
      await sbClient.from('transacoes').insert({ user_id: userId, descricao: descricao.trim(), valor: parseFloat(valor), tipo });
    }
    async function deletarTransacao(id) {
      await sbClient.from('transacoes').delete().eq('id', id);
    }

    const PERFIS = {
      conservador: { label: 'Conservador', emoji: '🛡️', alocacao: [{ nome: 'Renda Fixa', pct: 0.70, cor: 'text-indigo-400', bg: 'bg-indigo-400' }, { nome: 'FIIs', pct: 0.20, cor: 'text-purple-400', bg: 'bg-purple-400' }, { nome: 'Ações', pct: 0.10, cor: 'text-emerald-400', bg: 'bg-emerald-400' }], oportunidades: [{ emoji: '🏛️', titulo: 'Tesouro Selic 2029', tag: 'Pós-fixado', tagColor: 'bg-indigo-950 text-indigo-300 border border-indigo-800/50', descricao: 'Rendimento estável e seguro diário. Ideal para construir sua reserva.' }, { emoji: '🏢', titulo: 'FIIs de Recebíveis', tag: 'Dividendos', tagColor: 'bg-purple-950 text-purple-300 border border-purple-800/50', descricao: 'Fundos de papel focados em títulos de crédito imobiliário de baixo risco.' }, { emoji: '📊', titulo: 'Ações Valor', tag: 'Consolidadas', tagColor: 'bg-emerald-950 text-emerald-300 border border-emerald-800/50', descricao: 'Grandes empresas do mercado focadas em resiliência e estabilidade.' }] },
      moderado: { label: 'Moderado', emoji: '⚖️', alocacao: [{ nome: 'Renda Fixa', pct: 0.50, cor: 'text-indigo-400', bg: 'bg-indigo-400' }, { nome: 'FIIs', pct: 0.40, cor: 'text-purple-400', bg: 'bg-purple-400' }, { nome: 'Ações', pct: 0.10, cor: 'text-emerald-400', bg: 'bg-emerald-400' }], oportunidades: [{ emoji: '📈', titulo: 'Tesouro IPCA+', tag: 'Inflação', tagColor: 'bg-indigo-950 text-indigo-300 border border-indigo-800/50', descricao: 'Proteção real contra a inflação de longo prazo + taxa fixa garantida.' }, { emoji: '🏢', titulo: 'FIIs de Tijolo', tag: 'Renda Mensal', tagColor: 'bg-purple-950 text-purple-300 border border-purple-800/50', descricao: 'Investimento em imóveis físicos reais (shoppings e galpões logísticos).' }, { emoji: '📊', titulo: 'Ações Dividendos', tag: 'Geração Renda', tagColor: 'bg-emerald-950 text-emerald-300 border border-emerald-800/50', descricao: 'Empresas consolidadas com forte distribuição contínua de lucros.' }] },
      arrojado: { label: 'Arrojado', emoji: '🚀', alocacao: [{ nome: 'Renda Fixa', pct: 0.20, cor: 'text-indigo-400', bg: 'bg-indigo-400' }, { nome: 'FIIs', pct: 0.30, cor: 'text-purple-400', bg: 'bg-purple-400' }, { nome: 'Ações', pct: 0.50, cor: 'text-emerald-400', bg: 'bg-emerald-400' }], oportunidades: [{ emoji: '🏦', titulo: 'CDB Pré 12% a.a.', tag: 'Taxa Fixa', tagColor: 'bg-indigo-950 text-indigo-300 border border-indigo-800/50', descricao: 'Rentabilidade prefixada atrativa com proteção assegurada pelo FGC.' }, { emoji: '🏢', titulo: 'FIIs de Desenvolvimento', tag: 'Ganho Capital', tagColor: 'bg-purple-950 text-purple-300 border border-purple-800/50', descricao: 'Foco na construção de novos ativos imobiliários para revenda lucrativa.' }, { emoji: '🚀', titulo: 'Ações Growth', tag: 'Crescimento', tagColor: 'bg-emerald-950 text-emerald-300 border border-emerald-800/50', descricao: 'Empresas de tecnologia e inovação com alto potencial de valorização.' }] }
    };

    function useTickersSimulados() {
      const [tickers, setTickers] = useState({ cdi: 12.15, ibov: 126000, ifix: 3500 });
      useEffect(() => {
        const interval = setInterval(() => setTickers(prev => ({
          cdi: prev.cdi + (Math.random() - 0.5) * 0.02,
          ibov: prev.ibov + (Math.random() - 0.5) * 200,
          ifix: prev.ifix + (Math.random() - 0.5) * 5
        })), 5000);
        return () => clearInterval(interval);
      }, []);
      return tickers;
    }

    function Spinner({ size }) { const s = size || 'w-5 h-5'; return html`<svg class=${'spin ' + s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#1e293b" stroke-width="3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="#34d399" stroke-width="3" stroke-linecap="round"/></svg>`; }
    function CoinLogo({ size }) { const s = size || 28; return html`<svg width=${s} height=${s} viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#34d399" fill-opacity="0.12"/><circle cx="14" cy="14" r="10" fill="#34d399" fill-opacity="0.22"/><text x="14" y="18.5" text-anchor="middle" font-size="11" font-family="Inter,sans-serif" font-weight="800" fill="#34d399">$</text></svg>`; }
    
    function SelicBadge({ selic, isLive, loading }) {
      if (loading) return html`<div class="flex items-center gap-1.5 text-[10px] text-slate-500 bg-slate-800/60 px-2.5 py-1 rounded-full border border-slate-700/50"><span class="w-1.5 h-1.5 rounded-full bg-slate-600 pulse-dot"></span>Buscando...</div>`;
      const dotColor = isLive ? 'bg-emerald-400' : 'bg-amber-400';
      const textColor = isLive ? 'text-emerald-400' : 'text-amber-400';
      return html`<div class="flex items-center gap-1.5 text-[10px] bg-slate-800/60 px-2.5 py-1 rounded-full border border-slate-700/50"><span class=${'w-1.5 h-1.5 rounded-full pulse-dot inline-block ' + dotColor}></span><span class=${'font-semibold ' + textColor}>${selic.toFixed(2)}% a.a.</span><span class="text-slate-500">${isLive ? 'Ao vivo' : 'Média'}</span></div>`;
    }

    function TickersBar({ tickers }) {
      return html`<div class="flex flex-wrap gap-2 text-[9px] text-slate-400 bg-slate-800/40 px-2.5 py-1.5 rounded-full border border-slate-700/40 mt-1">
        <span class="flex items-center gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full bg-indigo-400/70"></span>CDI: <span class="text-indigo-300 font-medium">${tickers.cdi.toFixed(2)}%</span></span>
        <span class="flex items-center gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full bg-purple-400/70"></span>IFIX: <span class="text-purple-300 font-medium">${Math.round(tickers.ifix).toLocaleString('pt-BR')}</span></span>
        <span class="flex items-center gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400/70"></span>IBOV: <span class="text-emerald-300 font-medium">${Math.round(tickers.ibov).toLocaleString('pt-BR')}</span></span>
      </div>`;
    }

    function PerfilSelector({ perfil, onChange }) {
      return html`<div class="flex gap-1.5 bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800">
        ${['conservador','moderado','arrojado'].map(key => {
          const p = PERFIS[key], ativo = perfil === key, cls = ativo ? 'bg-[#1a2233] border-[#34d399]/50 text-[#34d399] shadow-sm' : 'bg-transparent border-transparent text-slate-500 hover:text-slate-300';
          return html`<button key=${key} class=${'profile-btn flex-1 flex flex-col items-center py-2 px-1 rounded-lg text-[10px] font-semibold cursor-pointer border ' + cls} onClick=${() => onChange(key)}><span class="text-base leading-none mb-0.5">${p.emoji}</span>${p.label}</button>`;
        })}
      </div>`;
    }

    function GraficoLinhasComparativo({ aporte, selic, showValues }) {
      const base = (aporte && aporte > 0) ? aporte : 100;
      const meses = 12;
      
      const calcularEvolucao = (taxaAnual) => {
        const taxaMensal = Math.pow(1 + taxaAnual / 100, 1 / 12) - 1;
        let pontos = [];
        let val = base;
        for (let i = 0; i <= meses; i++) {
          pontos.push(val);
          val += base + (val * taxaMensal);
        }
        return pontos;
      };

      const poupanca = calcularEvolucao(6.17);
      const rendaFixa = calcularEvolucao(selic);
      const fiis = calcularEvolucao(11.5);
      const acoes = calcularEvolucao(15.0);

      const maxVal = Math.max(poupanca[meses], rendaFixa[meses], fiis[meses], acoes[meses]);
      const width = 380;
      const height = 140;
      const padding = 20;

      const getPointsStr = (arr) => {
        return arr.map((val, i) => {
          const x = padding + (i * (width - 2 * padding) / meses);
          const y = height - padding - (val / maxVal * (height - 2 * padding));
          return `${x},${y}`;
        }).join(' ');
      };

      const legendaItem = (cor, label, valorFinal) => html`
        <div class="flex items-center justify-between bg-[#0d1117]/40 px-2.5 py-1.5 rounded-lg border border-slate-800/50">
          <div class="flex items-center gap-1.5"><span class=${'w-2 h-2 rounded-full ' + cor}></span><span class="text-[10px] text-slate-400 font-medium">${label}</span></div>
          <span class=${'text-[10px] font-bold ' + (showValues ? '' : 'privacy-blur')}>${showValues ? 'R$ ' + Math.round(valorFinal).toLocaleString('pt-BR') : 'R$ ••••'}</span>
        </div>
      `;

      return html`<div class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 space-y-3 shadow-inner">
        <div class="flex justify-between items-center"><h3 class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Evolução Projetada (12 Meses)</h3><span class="text-[9px] text-slate-500">Base: R$ ${base}/mês</span></div>
        <div class="relative bg-[#0d1117]/40 rounded-xl p-1 border border-slate-800/80">
          <svg viewBox=${`0 0 ${width} ${height}`} class="w-full h-auto overflow-visible">
            <!-- Linhas de Grade Horizontais -->
            <line x1=${padding} y1=${padding} x2=${width - padding} y2=${padding} stroke="#334155" stroke-width="0.5" stroke-dasharray="4" />
            <line x1=${padding} y1=${height/2} x2=${width - padding} y2=${height/2} stroke="#334155" stroke-width="0.5" stroke-dasharray="4" />
            <line x1=${padding} y1=${height - padding} x2=${width - padding} y2=${height - padding} stroke="#475569" stroke-width="1" />
            
            <!-- Linhas dos Ativos -->
            <polyline fill="none" stroke="#64748b" stroke-width="2.5" points=${getPointsStr(poupanca)} stroke-linecap="round" stroke-linejoin="round" />
            <polyline fill="none" stroke="#818cf8" stroke-width="2.5" points=${getPointsStr(rendaFixa)} stroke-linecap="round" stroke-linejoin="round" />
            <polyline fill="none" stroke="#c084fc" stroke-width="2.5" points=${getPointsStr(fiis)} stroke-linecap="round" stroke-linejoin="round" />
            <polyline fill="none" stroke="#34d399" stroke-width="2.5" points=${getPointsStr(acoes)} stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="grid grid-cols-2 gap-2">
          ${legendaItem('bg-slate-500', 'Poupança', poupanca[meses])}
          ${legendaItem('bg-indigo-400', 'Renda Fixa', rendaFixa[meses])}
          ${legendaItem('bg-purple-400', 'FIIs', fiis[meses])}
          ${legendaItem('bg-emerald-400', 'Ações / Bolsa', acoes[meses])}
        </div>
      </div>`;
    }

    function ResultadoAlocacao({ resultado, perfil, selic, selicLoading, showValues }) {
      const alocacao = PERFIS[perfil].alocacao;
      const rfItem = alocacao[0];
      const rendMensal = (resultado * rfItem.pct * selic / 100) / 12;
      return html`<div class="space-y-2"><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Divisão de Aporte Sugerida</p>${alocacao.map(a => { const bruto = resultado * a.pct; return html`<div key=${a.nome} class="bg-[#0d1117]/60 p-3 rounded-xl border border-slate-800 space-y-1.5"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><div class=${'w-1.5 h-4 rounded-full ' + a.bg}></div><p class="text-xs text-slate-300 font-medium">${a.nome} (${Math.round(a.pct * 100)}%)</p></div><span class=${'font-bold text-xs ' + a.cor}>${showValues ? 'R$ ' + fmtBRL(bruto) : 'R$ ••••'}</span></div><div class="h-1 bg-slate-800 rounded-full overflow-hidden"><div class=${'h-full rounded-full ' + a.bg} style=${`width: ${a.pct * 100}%`}></div></div>${a === rfItem && !selicLoading && html`<p class="text-[9px] text-slate-500 ${showValues ? '' : 'privacy-blur'}">${showValues ? '≈ R$ ' + rendMensal.toFixed(2) + '/mês em juros' : '≈ R$ ••••'}</p>`}</div>`; })}</div>`;
    }

    function OnboardingModal({ onComplete }) {
      const [step, setStep] = useState(1);
      return html`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay"><div class="bg-[#1a2233] rounded-2xl border border-slate-700/60 shadow-2xl max-w-sm w-full p-6 space-y-5">
        ${step === 1 ? html`<div class="text-center space-y-3"><div class="flex justify-center text-4xl">💡</div><h2 class="text-xl font-extrabold text-[#34d399]">O que é o Minhas Moedinhas?</h2><p class="text-sm text-slate-300">Um app gratuito para te guiar e ajudar a <strong class="text-[#34d399]">multiplicar seu patrimônio</strong>.</p><button onClick=${() => setStep(2)} class="bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 font-bold py-2.5 px-6 rounded-xl text-sm">Próximo →</button></div>` : html`<div class="text-center space-y-3"><div class="flex justify-center text-4xl">🚀</div><h2 class="text-xl font-extrabold text-[#34d399]">Como usar?</h2><div class="space-y-2 text-sm text-slate-300 text-left px-2"><p>1. Simule aportes e selecione o perfil.</p><p>2. Acompanhe os gráficos de evolução.</p><p>3. Registre lançamentos reais abaixo.</p></div><button onClick=${onComplete} class="bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 font-bold py-2.5 px-6 rounded-xl text-sm w-full mt-2">Começar!</button></div>`}
      </div></div>`;
    }

    function MonetizationBanner() {
      return html`<div class="banner-glow rounded-xl p-3 text-center space-y-1"><p class="text-xs text-slate-200 font-medium">💰 Pronto para dar o próximo passo?</p><p class="text-[10px] text-slate-400">Abra sua conta na plataforma parceira com <strong class="text-[#34d399]">taxa zero</strong>!</p><a href="https://www.xpi.com.br/" target="_blank" class="inline-block bg-[#34d399] text-slate-950 text-[9px] font-bold py-1 px-4 rounded-full mt-1">Garantir Benefício</a></div>`;
    }

    function Conquistas({ hasAporte, perfilChanged, hasHighAporte }) {
      const bItem = (emoji, label, act) => html`<div class="flex flex-col items-center gap-1 ${act ? 'badge-on' : 'badge-off'}"><span class="text-xl">${emoji}</span><span class="text-[8px] text-slate-400 font-medium">${label}</span></div>`;
      return html`<div class="bg-[#1a2233] p-3 rounded-2xl border border-slate-800 shadow-sm"><span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider px-1">Minhas Conquistas</span><div class="flex justify-around mt-2">${bItem('🪙', 'Aporte Inicial', hasAporte)}${bItem('🧠', 'Perfil Definido', perfilChanged)}${bItem('🚀', 'Grande Poupador', hasHighAporte)}</div></div>`;
    }

    function LoginScreen() {
      const [modo, setModo] = useState('entrar');
      const [nome, setNome] = useState(''), [whatsapp, setWhatsapp] = useState(''), [email, setEmail] = useState(''), [senha, setSenha] = useState('');
      const [erro, setErro] = useState(''), [sucesso, setSucesso] = useState(''), [loading, setLoading] = useState(false);

      const limpar = () => { setErro(''); setSucesso(''); };
      async function handleAuth(e) {
        e.preventDefault();
        if (!email || !senha || (modo === 'cadastrar' && (!nome || !whatsapp))) { setErro('Preencha os campos obrigatórios.'); return; }
        setLoading(true); limpar();
        if (modo === 'entrar') {
          const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
          if (error) setErro(traduzirErro(error.message));
        } else {
          const { error } = await sbClient.auth.signUp({ email, password: senha, options: { data: { display_name: nome.trim(), whatsapp: whatsapp.trim() } } });
          if (error) setErro(traduzirErro(error.message));
          else setSucesso('Cadastro realizado! Se o login automático não ocorreu, confirme o e-mail cadastrado.');
        }
        setLoading(false);
      }
      return html`<div class="min-h-screen bg-[#0d1117] flex items-center justify-center p-4"><div class="w-full max-w-sm space-y-6 fade-up">
        <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 rounded-2xl bg-[#1a2233] border border-slate-800 flex items-center justify-center shadow-md"><${CoinLogo} size=32 /></div><h1 class="text-xl font-extrabold text-[#34d399]">Minhas Moedinhas</h1></div>
        <form onSubmit=${handleAuth} class="bg-[#1a2233] rounded-2xl border border-slate-800 p-6 space-y-4 shadow-xl">
          <div class="flex bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800 gap-1"><button type="button" class=${'flex-1 py-1.5 rounded-lg text-xs font-bold ' + (modo==='entrar'?'bg-[#1a2233] text-[#34d399]':'text-slate-500')} onClick=${() => { setModo('entrar'); limpar(); }}>Entrar</button><button type="button" class=${'flex-1 py-1.5 rounded-lg text-xs font-bold ' + (modo==='cadastrar'?'bg-[#1a2233] text-[#34d399]':'text-slate-500')} onClick=${() => { setModo('cadastrar'); limpar(); }}>Criar Conta</button></div>
          <div class="space-y-3">
            ${modo === 'cadastrar' && html`<><input type="text" value=${nome} onChange=${e=>setNome(e.target.value)} placeholder="Nome Completo" class="auth-input w-full px-4 py-2.5 bg-[#0d1117] rounded-xl border border-slate-700 text-sm" required /><input type="tel" value=${whatsapp} onChange=${e=>setWhatsapp(e.target.value)} placeholder="WhatsApp: (11) 99999-9999" class="auth-input w-full px-4 py-2.5 bg-[#0d1117] rounded-xl border border-slate-700 text-sm" required /></>`}
            <input type="email" value=${email} onChange=${e=>setEmail(e.target.value)} placeholder="Seu e-mail" class="auth-input w-full px-4 py-2.5 bg-[#0d1117] rounded-xl border border-slate-700 text-sm" required />
            <input type="password" value=${senha} onChange=${e=>setSenha(e.target.value)} placeholder="Sua senha" class="auth-input w-full px-4 py-2.5 bg-[#0d1117] rounded-xl border border-slate-700 text-sm" required />
          </div>
          ${erro && html`<div class="bg-red-950/40 border border-red-900/50 rounded-xl p-3 text-xs text-red-300">${erro}</div>`}
          ${sucesso && html`<div class="bg-emerald-950/40 border border-emerald-900/50 rounded-xl p-3 text-xs text-emerald-300">${sucesso}</div>`}
          <button type="submit" disabled=${loading} class="auth-btn w-full bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 font-bold py-3 rounded-xl text-sm flex justify-center">${loading ? html`<${Spinner} size="w-4 h-4" />` : modo==='entrar' ? 'Entrar' : 'Cadastrar'}</button>
        </form>
      </div></div>`;
    }

    function MainApp({ user }) {
      const [valor, setValor] = useState('');
      const [resultado, setResultado] = useState(null);
      const [perfil, setPerfil] = useState('moderado');
      const [perfilChanged, setPerfilChanged] = useState(false);
      const [selic, setSelic] = useState(SELIC_FALLBACK);
      const [selicIsLive, setSelicIsLive] = useState(false);
      const [selicLoading, setSelicLoading] = useState(true);
      const [dbReady, setDbReady] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showValues, setShowValues] = useState(true);
      const [transacoes, setTransacoes] = useState([]);
      const [modalOpen, setModalOpen] = useState(false);
      const [modalDesc, setModalDesc] = useState(''), [modalValor, setModalValor] = useState(''), [modalTipo, setModalTipo] = useState('entrada'), [modalLoading, setModalLoading] = useState(false);
      const tickers = useTickersSimulados();

      useEffect(() => { (async () => { const data = await dbLoad(user.id); if (data.perfil && PERFIS[data.perfil]) setPerfil(data.perfil); if (data.aporte > 0) { setValor(String(data.aporte)); setResultado(data.aporte); } setTransacoes(await carregarTransacoes(user.id)); setDbReady(true); })(); }, [user.id]);
      useEffect(() => { const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 5000); (async () => { try { const res = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json', { signal: ctrl.signal }); if (!res.ok) throw new Error(); const json = await res.json(); const d = parseFloat(json[0]?.valor); if (!isNaN(d)) { setSelic(parseFloat(((Math.pow(1 + d / 100, 252) - 1) * 100).toFixed(2))); setSelicIsLive(true); } } catch { setSelic(SELIC_FALLBACK); } finally { clearTimeout(tid); setSelicLoading(false); } })(); return () => { ctrl.abort(); clearTimeout(tid); }; }, []);
      
      const calcular = useCallback(async () => { const v = parseFloat(valor); if (isNaN(v) || v <= 0) return; setResultado(v); setSaving(true); await dbSave(user.id, v, perfil); setSaving(false); }, [valor, perfil, user.id]);
      async function handlePerfilChange(key) { setPerfil(key); setPerfilChanged(true); const v = parseFloat(valor); setSaving(true); await dbSave(user.id, isNaN(v) ? null : v, key); setSaving(false); }
      async function handleNovaTransacao(e) { e.preventDefault(); if (!modalDesc.trim() || !modalValor || parseFloat(modalValor) <= 0) return; setModalLoading(true); try { await salvarTransacao(user.id, modalDesc, modalValor, modalTipo); setTransacoes(await carregarTransacoes(user.id)); setModalOpen(false); setModalDesc(''); setModalValor(''); setModalTipo('entrada'); } catch (err) { alert('Erro: ' + err.message); } setModalLoading(false); }
      async function handleDeletarTransacao(id) { if (!confirm('Remover?')) return; try { await deletarTransacao(id); setTransacoes(await carregarTransacoes(user.id)); } catch (err) { alert('Erro: ' + err.message); } }

      if (!dbReady) return html`<div class="min-h-screen flex items-center justify-center gap-3 bg-[#0d1117]"><${Spinner} size="w-7 h-7" /><p class="text-xs text-slate-500">Carregando…</p></div>`;
      
      const totalEntradas = transacoes.filter(t => t.tipo === 'entrada').reduce((acc, t) => acc + t.valor, 0);
      const totalSaidas = transacoes.filter(t => t.tipo === 'saida').reduce((acc, t) => acc + t.valor, 0);
      const saldoAtual = totalEntradas - totalSaidas;
      const primeiroNome = (user?.user_metadata?.display_name || user?.user_metadata?.name || user?.email || 'investidor').split(' ')[0];

      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col space-y-5 pb-10 fade-up">
          <header class="pt-2 flex flex-col gap-1.5"><div class="flex items-start justify-between gap-3"><div class="min-w-0"><div class="flex items-center gap-1.5"><${CoinLogo} size=24 /><h1 class="text-xl font-extrabold text-[#34d399] tracking-tight">Minhas Moedinhas</h1></div><p class="text-xs text-slate-500 mt-0.5 ml-7 truncate">Olá, ${primeiroNome} 👋</p></div><div class="flex flex-col items-end gap-1.5"><div class="flex items-center gap-1.5"><button onClick=${() => setShowValues(!showValues)} class="text-slate-400 hover:text-[#34d399] p-1 rounded-full">${showValues ? '👁️' : '🙈'}</button><${SelicBadge} selic=${selic} isLive=${selicIsLive} loading=${selicLoading} /></div><button onClick=${() => sbClient.auth.signOut()} class="signout-btn flex items-center gap-1 text-[9px] text-slate-600 px-2 py-0.5 rounded-full border border-slate-800/80">Sair</button></div></div><${TickersBar} tickers=${tickers} /></header>
          
          <!-- CARDS DE SALDO -->
          <div class="grid grid-cols-3 gap-2.5">
            <div class="bg-[#1a2233] p-3 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 font-bold uppercase">Saldo</p><p class=${'text-sm font-extrabold text-slate-200 mt-0.5 ' + (showValues ? '' : 'privacy-blur')}>${showValues ? 'R$ ' + fmtBRL(saldoAtual) : 'R$ ••••'}</p></div>
            <div class="bg-[#1a2233] p-3 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 font-bold uppercase">Entradas</p><p class=${'text-sm font-extrabold text-emerald-400 mt-0.5 ' + (showValues ? '' : 'privacy-blur')}>${showValues ? 'R$ ' + fmtBRL(totalEntradas) : 'R$ ••••'}</p></div>
            <div class="bg-[#1a2233] p-3 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 font-bold uppercase">Saídas</p><p class=${'text-sm font-extrabold text-red-400 mt-0.5 ' + (showValues ? '' : 'privacy-blur')}>${showValues ? 'R$ ' + fmtBRL(totalSaidas) : 'R$ ••••'}</p></div>
          </div>

          <!-- SIMULADOR E GRÁFICO COMPARATIVO -->
          <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 space-y-4 shadow-xl">
            <div class="flex items-center justify-between"><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Simulador de Aporte</h2>${saving && html`<${Spinner} size="w-3 h-3" />`}</div>
            <${PerfilSelector} perfil=${perfil} onChange=${handlePerfilChange} />
            <div class="flex gap-2"><div class="relative flex-1"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-semibold select-none">R$</span><input type="number" value=${valor} onChange=${e => setValor(e.target.value)} onTransform=${calcular} placeholder="0,00" min="0" class="w-full pl-9 pr-3 py-2.5 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 text-sm focus:border-[#34d399]" /></div><button onClick=${calcular} class="sim-btn bg-[#34d399] text-slate-950 px-4 rounded-xl font-bold text-xs">Simular</button></div>
            ${resultado !== null && html`<${ResultadoAlocacao} resultado=${resultado} perfil=${perfil} selic=${selic} selicLoading=${selicLoading} showValues=${showValues} />`}
          </section>

          <${GraficoLinhasComparativo} aporte=${resultado} selic=${selic} showValues=${showValues} />
          <${MonetizationBanner} />
          <${Conquistas} hasAporte=${resultado !== null && resultado > 0} perfilChanged=${perfilChanged} hasHighAporte=${resultado > 100} />

          <!-- TOP 3 OPORTUNIDADES -->
          <section class="space-y-2">
            <div class="flex items-center justify-between px-1"><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">🔥 Top 3 Oportunidades</h2></div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              ${PERFIS[perfil].oportunidades.map(op => html`
                <div key=${op.titulo} class="bg-[#1a2233] p-3 rounded-xl border border-slate-800 card-glow flex flex-col items-center text-center gap-1">
                  <span class="text-xl">${op.emoji}</span>
                  <p class="text-xs font-bold text-slate-200">${op.titulo}</p>
                  <span class=${'text-[8px] px-2 py-0.5 rounded-full font-bold ' + op.tagColor}>${op.tag}</span>
                  <p class="text-[9px] text-slate-400 mt-1">${op.descricao}</p>
                </div>
              `)}
            </div>
          </section>

          <!-- GERENCIADOR DE MOEDINHAS -->
          <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl space-y-3">
            <div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-md">🪙</span><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Gerenciador Financeiro</h2></div><button onClick=${() => setModalOpen(true)} class="bg-[#34d399] text-slate-950 font-bold px-3 py-1.5 rounded-xl text-[10px] flex items-center gap-1">+ Novo</button></div>
            <div class="space-y-2 max-h-48 overflow-y-auto pr-1">${transacoes.length === 0 ? html`<p class="text-center text-[11px] text-slate-600 py-4">Nenhum lançamento efetuado.</p>` : transacoes.map(t => html`<div key=${t.id} class="flex items-center justify-between bg-[#0d1117]/70 p-2.5 rounded-xl border border-slate-800"><div class="flex items-center gap-2.5 min-w-0"><span class="text-md">${t.tipo === 'entrada' ? '📈' : '📉'}</span><div class="min-w-0"><p class="text-xs font-medium text-slate-200 truncate">${t.descricao}</p><p class="text-[9px] text-slate-500">${new Date(t.created_at).toLocaleDateString('pt-BR')}</p></div></div><div class="flex items-center gap-2.5 flex-shrink-0"><span class=${'font-bold text-xs ' + (t.tipo === 'entrada' ? 'text-emerald-400' : 'text-red-400')}>${t.tipo === 'entrada' ? '+ ' : '- '}R$ ${fmtBRL(t.valor)}</span><button onClick=${() => handleDeletarTransacao(t.id)} class="text-slate-600 hover:text-red-400 transition-colors"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div></div>`)}</div>
          </section>
          
          <footer class="pt-4 text-center border-t border-slate-800/60 space-y-2">
            <p class="text-[9px] text-slate-600 max-w-xs mx-auto"><strong class="text-slate-500">Aviso:</strong> Simulador com fins estritamente pedagógicos e educacionais.</p>
            <p class="text-[8px] text-slate-700">© 2026 Minhas Moedinhas</p>
          </footer>
        </div>
        
        ${modalOpen && html`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick=${e => e.target === e.currentTarget && setModalOpen(false)}><div class="bg-[#1a2233] rounded-2xl border border-slate-700/60 shadow-2xl max-w-sm w-full p-5 space-y-4"><div class="flex items-center justify-between"><h2 class="text-sm font-bold text-[#34d399]">Novo Lançamento</h2><button onClick=${() => setModalOpen(false)} class="text-slate-500 text-xs">Fechar</button></div><form onSubmit=${handleNovaTransacao} class="space-y-3"><div><label class="text-[9px] text-slate-500 font-bold uppercase">Descrição</label><input type="text" value=${modalDesc} onChange=${e => setModalDesc(e.target.value)} placeholder="Ex: Salário" class="w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-sm" required /></div><div><label class="text-[9px] text-slate-500 font-bold uppercase">Valor (R$)</label><input type="number" value=${modalValor} onChange=${e => setModalValor(e.target.value)} placeholder="0,00" min="0.01" step="0.01" class="w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-sm" required /></div><div><label class="text-[9px] text-slate-500 font-bold uppercase">Tipo</label><div class="flex gap-4 mt-1"><label class="flex items-center gap-1.5 text-xs text-slate-300"><input type="radio" name="tipo" value="entrada" checked=${modalTipo === 'entrada'} onChange=${() => setModalTipo('entrada')} class="accent-[#34d399]" /> Entrada</label><label class="flex items-center gap-1.5 text-xs text-slate-300"><input type="radio" name="tipo" value="saida" checked=${modalTipo === 'saida'} onChange=${() => setModalTipo('saida')} class="accent-[#f87171]" /> Saída</label></div></div><button type="submit" disabled=${modalLoading} class="w-full bg-[#34d399] text-slate-950 font-bold py-2.5 rounded-xl text-xs flex justify-center">${modalLoading ? html`<${Spinner} size="w-4 h-4" />` : 'Confirmar Lançamento'}</button></form></div></div>`}
      `;
    }

    function Root() {
      const [user, setUser] = useState(null), [authReady, setAuthReady] = useState(false), [onboardingSeen, setOnboardingSeen] = useState(false);
      useEffect(() => {
        setOnboardingSeen(localStorage.getItem('onboarding_visto') === 'true');
        sbClient.auth.getSession().then(res => { setUser(res.data?.session?.user ?? null); setAuthReady(true); });
        const { data: { subscription } } = sbClient.auth.onAuthStateChange((_, session) => { setUser(session?.user ?? null); setAuthReady(true); });
        return () => subscription?.unsubscribe();
      }, []);
      if (!authReady) return html`<div class="min-h-screen flex items-center justify-center gap-3 bg-[#0d1117]"><${Spinner} size="w-8 h-8" /><p class="text-xs text-slate-500">Iniciando...</p></div>`;
      if (!user) return html`<${LoginScreen} />`;
      return html`<${MainApp} user=${user} />${!onboardingSeen && html`<${OnboardingModal} onComplete=${() => { localStorage.setItem('onboarding_visto', 'true'); setOnboardingSeen(true); }} />`}`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root} />`);
  </script>
</body>
</html>
