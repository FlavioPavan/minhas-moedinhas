<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.12/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ─── COMPONENTES DE ÍCONES (SVG) ───────────────────────────────────
        const EyeIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>;
        const EyeOffIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243"/></svg>;
        const TrendingUp = () => <svg className="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>;
        const TrendingDown = () => <svg className="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"/></svg>;

        // ─── BASE DE DADOS EXPANDIDA (FOCADA EM EDUCAÇÃO LEIGA) ─────────────
        const INVESTIMENTOS_DATA = [
            { id: 1, nome: "Tesouro Selic 2027", categoria: "Renda Fixa", valor: 5820.00, rentabilidade: "+10.75% a.a.", risco: "Muito Baixo", riscoCor: "text-emerald-600 bg-emerald-50", desc: "É o investimento mais seguro do país. Você está emprestando dinheiro para o Governo Federal em troca de juros. Ideal para sua reserva de emergência.", ondeComo: "Disponível em qualquer banco ou corretora de valores através do Tesouro Direto." },
            { id: 2, nome: "CDB Banco Seguro 110%", categoria: "Renda Fixa", valor: 2500.00, rentabilidade: "+11.50% a.a.", risco: "Baixo", riscoCor: "text-emerald-600 bg-emerald-50", desc: "Você empresta dinheiro para o banco financiar as atividades dele. É protegido pelo FGC (Fundo Garantidor de Crédito) em até R$ 250 mil se o banco quebrar.", ondeComo: "Contratado direto no aplicativo do seu banco digital ou corretora." },
            { id: 3, nome: "Fundo Multimercado Explorer", categoria: "Fundos", valor: 3140.50, rentabilidade: "+6.20% no ano", risco: "Médio", riscoCor: "text-amber-600 bg-amber-50", desc: "Um gestor profissional pega o dinheiro de várias pessoas e distribui em vários mercados (juros, ações, moedas) tentando buscar o melhor ganho possível.", ondeComo: "Plataformas de investimento como XP, Nu Invest, Inter ou BTG Pactual." },
            { id: 4, nome: "Ações Itaú (ITUB4)", categoria: "Ações", valor: 1980.00, rentabilidade: "-3.15% este mês", risco: "Alto", riscoCor: "text-rose-600 bg-rose-50", desc: "Ao comprar, você se torna sócio de uma das maiores empresas do país. Se o banco lucrar, você ganha dividendos; se o mercado cair, suas ações desvalorizam temporariamente.", ondeComo: "Comprado através do Home Broker de uma corretora de valores utilizando o código ITUB4." },
            { id: 5, nome: "Bitcoin (BTC)", categoria: "Cripto", valor: 850.00, rentabilidade: "+42.80% no ano", risco: "Muito Alto", riscoCor: "text-purple-600 bg-purple-50", desc: "Moeda digital 100% descentralizada. Tem um potencial de ganho gigantesco, mas pode cair 10% ou 20% em um único dia. Coloque apenas uma pequena parte das moedinhas.", ondeComo: "Comprado em corretoras especializadas de criptomoedas (Exchanges) ou fundos de índice (ETFs) na bolsa." }
        ];

        // ─── COMPONENTE PRINCIPAL ─────────────────────────────────────────
        function App() {
            const [mostrarSaldo, setMostrarSaldo] = useState(true);
            const [categoriaFiltro, setCategoriaFiltro] = useState("Todos");
            const [itemSelecionado, setItemSelecionado] = useState(INVESTIMENTOS_DATA[0]);

            // Cálculos Dinâmicos
            const totalSaldo = INVESTIMENTOS_DATA.reduce((acc, item) => acc + item.valor, 0);
            
            const categorias = ["Todos", "Renda Fixa", "Fundos", "Ações", "Cripto"];
            const listaFiltrada = categoriaFiltro === "Todos" 
                ? INVESTIMENTOS_DATA 
                : INVESTIMENTOS_DATA.filter(i => i.categoria === categoriaFiltro);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-emerald-500 text-white p-2 rounded-xl font-bold shadow-md shadow-emerald-200">🪙</div>
                                <span className="font-extrabold text-xl text-slate-800 tracking-tight">Minhas<span className="text-emerald-500">Moedinhas</span></span>
                            </div>
                            <span className="text-xs font-semibold bg-slate-100 text-slate-600 px-3 py-1 rounded-full">v2.0 — Modo Educativo</span>
                        </div>
                    </header>

                    {/* Dashboard */}
                    <main className="flex-1 max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                        
                        {/* Coluna da Esquerda e Centro (Painel de Controle e Lista) */}
                        <div className="md:col-span-2 space-y-6">
                            
                            {/* Card de Saldo */}
                            <div className="bg-slate-900 text-white rounded-3xl p-6 shadow-xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-sm text-slate-400 font-medium">Patrimônio Total Simulado</span>
                                    <button 
                                        onClick={() => setMostrarSaldo(!mostrarSaldo)}
                                        className="text-slate-400 hover:text-white flex items-center gap-1.5 text-xs bg-white/5 px-2.5 py-1.5 rounded-lg transition"
                                    >
                                        {mostrarSaldo ? <EyeOffIcon /> : <EyeIcon />}
                                        {mostrarSaldo ? "Ocultar" : "Mostrar"}
                                    </button>
                                </div>
                                <div className="text-3xl font-black tracking-tight mb-2">
                                    {mostrarSaldo ? `R$ ${totalSaldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : "R$ •••••••"}
                                </div>
                                <p className="text-xs text-emerald-400 flex items-center font-medium">
                                    <TrendingUp /> Dinheiro protegido e rendendo mais que a poupança convencional.
                                </p>
                            </div>

                            {/* Filtros por Categoria */}
                            <div className="space-y-2">
                                <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Filtrar por Tipo</h2>
                                <div className="flex flex-wrap gap-2">
                                    {categorias.map(cat => (
                                        <button
                                            key={cat}
                                            onClick={() => setCategoriaFiltro(cat)}
                                            className={`px-4 py-2 rounded-xl text-xs font-bold transition ${
                                                categoriaFiltro === cat 
                                                ? "bg-emerald-500 text-white shadow-md shadow-emerald-100" 
                                                : "bg-white border border-slate-200 text-slate-600 hover:bg-slate-50"
                                            }`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Lista de Ativos */}
                            <div className="space-y-3">
                                <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Onde o dinheiro está alocado</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {listaFiltrada.map(item => (
                                        <div 
                                            key={item.id}
                                            onClick={() => setItemSelecionado(item)}
                                            className={`bg-white p-4 rounded-2xl border-2 cursor-pointer transition flex flex-col justify-between h-36 ${
                                                itemSelecionado.id === item.id 
                                                ? "border-emerald-500 shadow-lg shadow-emerald-50/50 bg-emerald-50/10" 
                                                : "border-slate-100 hover:border-slate-200"
                                            }`}
                                        >
                                            <div>
                                                <div className="flex justify-between items-start mb-1">
                                                    <h3 className="font-bold text-slate-800 text-sm sm:text-base line-clamp-1">{item.nome}</h3>
                                                    <span className={`text-[10px] font-extrabold px-2 py-0.5 rounded-full ${item.riscoCor}`}>{item.risco}</span>
                                                </div>
                                                <span className="text-xs text-slate-400 font-medium">{item.categoria}</span>
                                            </div>
                                            <div className="flex justify-between items-end mt-4">
                                                <div>
                                                    <span className="text-[10px] text-slate-400 block uppercase font-bold tracking-wider">Valor aplicado</span>
                                                    <span className="font-extrabold text-slate-800 text-base">R$ {item.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                                                </div>
                                                <span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg">{item.rentabilidade}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>

                        {/* Coluna da Direita (Painel Educativo e Inteligente) */}
                        <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm flex flex-col justify-between">
                            <div>
                                <div className="flex items-center gap-2 mb-4">
                                    <span className="text-xl">💡</span>
                                    <h2 className="font-extrabold text-slate-800 text-lg">Guia Prático para Leigos</h2>
                                </div>

                                <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-4">
                                    <span className="text-[10px] uppercase font-bold text-slate-400 block mb-1">Ativo Selecionado</span>
                                    <h3 className="text-base font-black text-slate-800">{itemSelecionado.nome}</h3>
                                    <div className="mt-2 flex gap-2">
                                        <span className="text-xs font-semibold bg-slate-200 text-slate-700 px-2.5 py-0.5 rounded-md">{itemSelecionado.categoria}</span>
                                        <span className={`text-xs font-bold px-2.5 py-0.5 rounded-md ${itemSelecionado.riscoCor}`}>Risco {itemSelecionado.risco}</span>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">O que significa isso na prática?</h4>
                                        <p className="text-sm text-slate-600 leading-relaxed font-medium">{itemSelecionado.desc}</p>
                                    </div>
                                    <div>
                                        <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Como ou Onde investir?</h4>
                                        <p className="text-sm text-slate-600 leading-relaxed font-medium">{itemSelecionado.ondeComo}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-8 border-t border-slate-100 pt-4 text-center">
                                <p className="text-xs text-slate-400 font-medium">Toque em qualquer card de investimento para ver a análise em tempo real.</p>
                            </div>
                        </div>

                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-100 text-center py-4 text-xs text-slate-500 font-medium border-t border-slate-200 mt-8">
                        Minhas Moedinhas © 2026 — Inteligência de Mercado Simplificada.
                    </footer>
                </div>
            );
        }

        // Renderização Direta e Segura
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
