<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [valorSimulado, setValorSimulado] = useState('');
      
      return (
        <div className="max-w-4xl mx-auto p-8">
          <h1 className="text-3xl font-bold text-emerald-400 mb-8">Minhas Moedinhas - Versão Final</h1>
          
          <div className="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
            <h2 className="text-xl font-bold mb-4">Simulador de Aporte</h2>
            <input 
              type="number" 
              placeholder="Digite o valor que você quer investir (R$)" 
              className="w-full p-4 bg-slate-950 rounded-xl border border-slate-600 text-white mb-4"
              onChange={(e) => setValorSimulado(e.target.value)}
            />
            <p className="text-slate-400">O sistema está pronto para processar o valor de R$ {valorSimulado || '0,00'}.</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
