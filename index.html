    /* ═══════════════════════════════════════════════════════════════
       🔧  FUNÇÕES DE SIMULAÇÃO FINANCEIRA
       ═══════════════════════════════════════════════════════════════ */
    function gerarHistoricoDinamico(aporteAtual, perfil, selicAnual) {
      const base = (aporteAtual && aporteAtual > 0) ? aporteAtual : 1000;
      const alocacao = PERFIS[perfil].alocacao;
      const rfPct = alocacao[0].pct, fiiPct = alocacao[1].pct, acoesPct = alocacao[2].pct;
      const taxaMensalRF = Math.pow(1 + selicAnual / 100, 1 / 12) - 1;
      const rentMediaMensal = rfPct * taxaMensalRF + fiiPct * 0.006 + acoesPct * 0.010;
      const meses = ['Jan','Fev','Mar','Abr','Mai','Jun'];
      const historico = []; let valor = base;
      for (let i = meses.length - 1; i >= 0; i--) {
        const mes = meses[i];
        if (i === meses.length - 1) historico.push({ mes, valor });
        else { valor = valor / (1 + rentMediaMensal); historico.push({ mes, valor }); }
      }
      return historico.reverse();
    }
    function gerarProjecao(aporte, perfilObj, selicAnual) {
      const rfPct = perfilObj.alocacao[0].pct, fiiPct = perfilObj.alocacao[1].pct, acoesPct = perfilObj.alocacao[2].pct;
      const taxaMensal = Math.pow(1 + selicAnual / 100, 1 / 12) - 1;
      const meses = ['Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar','Abr','Mai','Jun'];
      let rf = aporte * rfPct, fii = aporte * fiiPct, acoes = aporte * acoesPct;
      return meses.map((mes, i) => {
        if (i > 0) { rf *= 1 + taxaMensal; fii *= 1 + 0.006; acoes *= 1 + 0.010; }
        return { mes, valor: rf + fii + acoes };
      });
    }

          ifix: prev.ifix + (Math.random() - 0.5) * 5

        return () => clearInterval(interval);

      return tickers;

    function SelicBadge({ selic, isLive, loading }) {

    function GraficoCard({ resultado, perfil, selic, showValues }) {

      const dados = modo === 'historico' ? historicoDinamico : projecao;
      const maxVal = dados.length > 0 ? Math.max(...dados.map(d => d.valor)) : 1;
      const modoHist = modo === 'historico';
      return html`<section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl">

          <div class="flex gap-1 bg-[#0d1117]/50 p-0.5 rounded-lg border border-slate-800"><button class=${'tab-btn px-3 py-1 rounded-lg text-[10px] font-semibold border ' + (modoHist ? 'bg-[#34d399]/15 border-[#34d399]/40 text-[#34d399]' : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400')} onClick=${() => setModo('historico')}>Histórico</button><button class=${'tab-btn px-3 py-1 rounded-lg text-[10px] font-semibold border ' + (!modoHist ? 'bg-indigo-400/15 border-indigo-400/40 text-indigo-300' : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400')} onClick=${() => setModo('projecao')}>12 meses</button></div>
        </div>
        ${!modoHist && !temAporte ? html`<div class="h-24 flex flex-col items-center justify-center gap-2 border border-dashed border-slate-700/60 rounded-xl bg-[#0d1117]/30"><span class="text-xl">💡</span><p class="text-[10px] text-slate-500 text-center">Digite um valor no simulador para ver a projeção.</p></div>` : html`<div class="flex items-end justify-between h-24 gap-1 px-0.5">${dados.map(item => { const pct = Math.max((item.valor / maxVal) * 100, 2); return html`<div key=${item.mes} class="bar-wrap flex flex-col items-center w-full relative"><span class="bar-tooltip">${showValues ? (item.valor >= 1000 ? 'R$' + (item.valor / 1000).toFixed(1) + 'k' : 'R$' + item.valor.toFixed(0)) : '••••'}</span><div class=${'bar-animate w-full rounded-t-sm cursor-default hover:ring-1 hover:ring-inset ' + (modoHist ? 'bar-hist hover:ring-[#34d399]' : 'bar-proj hover:ring-indigo-400')} style=${{ height: pct + '%', minHeight: '4px' }}></div><span class="text-[8px] mt-1 text-slate-600 font-medium">${item.mes}</span></div>`; })}</div>`}
        <div class="mt-2 pt-2 border-t border-slate-800/60 flex items-center justify-between">${modoHist ? html`<span class="text-[9px] text-slate-500">Total acumulado</span><span class="text-sm font-bold text-[#34d399] ${showValues ? '' : 'privacy-blur'}">${showValues ? 'R$ ' + fmtBRL(historicoDinamico[historicoDinamico.length-1].valor) : 'R$ ••••'}</span>` : temAporte ? html`<span class="text-[9px] text-slate-500">Projeção em 12 meses</span><span class="text-sm font-bold text-indigo-300 ${showValues ? '' : 'privacy-blur'}">${showValues ? 'R$ ' + fmtBRL(projecao[projecao.length-1].valor) : 'R$ ••••'}</span>` : html`<span></span>`}</div>

      useEffect(() => { const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 5000); (async () => { try { const res = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json', { signal: ctrl.signal }); if (!res.ok) throw new Error(); const json = await res.json(); const d = parseFloat(json[0]?.valor); if (!isNaN(d)) { setSelic(parseFloat(((Math.pow(1 + d / 100, 252) - 1) * 100).toFixed(2))); setSelicIsLive(true); } } catch { setSelic(SELIC_FALLBACK); } finally { clearTimeout(tid); setSelicLoading(false); } })(); return () => { ctrl.abort(); clearTimeout(tid); }; }, []);
      const calcular = useCallback(async () => { const v = parseFloat(valor); if (isNaN(v) || v <= 0) return; setResultado(v); setSaving(true); await dbSave(user.id, v, perfil); setSaving(false); }, [valor, perfil, user.id]);
      async function handlePerfilChange(key) { setPerfil(key); setPerfilChanged(true); const v = parseFloat(valor); setSaving(true); await dbSave(user.id, isNaN(v) ? null : v, key); setSaving(false); }

      if (!dbReady) return html`<div class="min-h-screen flex items-center justify-center gap-3 bg-[#0d1117]"><${Spinner} size="w-7 h-7" /><p class="text-xs text-slate-500">Carregando…</p></div>`;

      const primeiroNome = (user?.user_metadata?.display_name || user?.user_metadata?.name || user?.email || 'investidor').split(' ')[0];
      const hasAporte = resultado !== null && resultado > 0;
      const hasHighAporte = resultado !== null && resultado > 100;

      return html`<div class="max-w-md mx-auto p-4 min-h-screen flex flex-col space-y-5 pb-10 fade-up">
        <header class="pt-5 flex flex-col gap-2"><div class="flex items-start justify-between gap-3"><div class="min-w-0"><div class="flex items-center gap-2"><${CoinLogo} size=26 /><h1 class="text-2xl font-extrabold text-[#34d399] tracking-tight">Minhas Moedinhas</h1></div><p class="text-xs text-slate-500 mt-1 ml-8 truncate">Olá, ${primeiroNome} 👋</p></div><div class="flex flex-col items-end gap-1.5 flex-shrink-0"><div class="flex items-center gap-2"><button onClick=${() => setShowValues(!showValues)} class="text-slate-400 hover:text-[#34d399] transition-colors p-1.5 rounded-full hover:bg-slate-800/50">${showValues ? '👁️' : '🙈'}</button><${SelicBadge} selic=${selic} isLive=${selicIsLive} loading=${selicLoading} /></div><button onClick=${() => sbClient.auth.signOut()} class="signout-btn flex items-center gap-1 text-[10px] text-slate-600 px-2.5 py-1 rounded-full border border-slate-800/80"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>Sair</button></div></div><${TickersBar} tickers=${tickers} /></header>
        <${Conquistas} hasAporte=${hasAporte} perfilChanged=${perfilChanged} hasHighAporte=${hasHighAporte} />
        <section class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800 shadow-xl space-y-4"><div class="flex items-center justify-between"><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Simulador de Aporte</h2><div class="flex items-center gap-2">${saving && html`<${Spinner} size="w-3 h-3" />`}${!selicLoading && html`<span class="text-[9px] text-slate-600">Selic ${selic.toFixed(1)}% a.a.</span>`}</div></div><${PerfilSelector} perfil=${perfil} onChange=${handlePerfilChange} /><div class="flex gap-2"><div class="relative flex-1"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-semibold select-none">R$</span><input type="number" value=${valor} onChange=${e => setValor(e.target.value)} onKeyDown=${e => e.key === 'Enter' && calcular()} placeholder="0,00" min="0" class="w-full pl-10 pr-3 py-3 bg-[#0d1117] rounded-xl border border-slate-700 focus:border-[#34d399] text-slate-100 placeholder-slate-600 text-sm" /></div><button onClick=${calcular} class="sim-btn bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 px-5 rounded-xl font-bold text-sm">Simular</button></div>${resultado !== null && html`<${ResultadoAlocacao} resultado=${resultado} perfil=${perfil} selic=${selic} selicIsLive=${selicIsLive} selicLoading=${selicLoading} showValues=${showValues} />`}</section>
        <${GraficoCard} resultado=${resultado} perfil=${perfil} selic=${selic} showValues=${showValues} />
        <${FluxoCaixa} setValorSimulador=${setValor} />
        <${SonhosCard} />
        <${MonetizationBanner} />
        <section class="space-y-3"><div class="flex items-center justify-between px-1"><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">🔥 Top 3 Oportunidades</h2><span class="text-[9px] text-slate-600">Clique para saber mais</span></div>${PERFIS[perfil].oportunidades.map(op => html`<${OportunidadeCard} key=${op.id} op=${op} isOpen=${openCard === op.id} onToggle=${() => setOpenCard(p => p === op.id ? null : op.id)} />`)}</section>
        <footer class="pt-4 text-center border-t border-slate-800/60 space-y-2"><div class="flex justify-center"><${WhatsAppButton} /></div><p class="text-[9px] text-slate-600 max-w-xs mx-auto"><strong class="text-slate-500">Aviso Legal:</strong> Ferramenta educativa, não recomendação de investimento.</p><p class="text-[8px] text-slate-700">© 2026 Minhas Moedinhas</p></footer>
      </div>`;
    }

    function Root() {
      const [user, setUser] = useState(null), [authReady, setAuthReady] = useState(false), [onboardingSeen, setOnboardingSeen] = useState(false);
      useEffect(() => {
        setOnboardingSeen(localStorage.getItem('onboarding_visto') === 'true');
        sbClient.auth.getSession().then(res => { setUser(res.data?.session?.user ?? false); setAuthReady(true); });
        const sub = sbClient.auth.onAuthStateChange((_, session) => { setUser(session?.user ?? false); setAuthReady(true); });
        return () => { const s = sub?.data?.subscription ?? sub; if (s?.unsubscribe) s.unsubscribe(); };
      }, []);
      if (!authReady) return html`<div class="min-h-screen flex items-center justify-center gap-3 bg-[#0d1117]"><${Spinner} size="w-8 h-8" /><p class="text-xs text-slate-500">Carregando…</p></div>`;
      if (!user) return html`<${LoginScreen} />`;
      return html`<${MainApp} user=${user} />${!onboardingSeen && html`<${OnboardingModal} onComplete=${() => { localStorage.setItem('onboarding_visto', 'true'); setOnboardingSeen(true); }} />`}`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root} />`);
  </script>

  <!-- Vercel Web Analytics -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
