<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { green: '#34d399', greenLight: '#6ee7b7', dark: '#0d1117', card: '#1a2233' }
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          },
          animation: { 'fade-up': 'fadeUp 0.35s ease both' }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #0d1117; }
    .auth-input:focus { outline: none; border-color: #34d399 !important; box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.15); }
    .auth-btn { transition: background 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease; }
    .auth-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(52, 211, 153, 0.25); }
    .auth-btn:not(:disabled):active { transform: translateY(0); }
    .google-btn { transition: background 0.18s ease, border-color 0.18s ease; }
    .google-btn:hover { background: #161d2b !important; border-color: #475569 !important; }
    .fade-up { animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCRIPTS GLOBAIS UMD — ORDEM CRÍTICA (SEM BABEL)
       React → ReactDOM → htm → Supabase.
       ═══════════════════════════════════════════════════════════════════════ -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- htm (HyperScript) para JSX sem Babel -->
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin></script>
</head>

<body>
  <div id="root"></div>
  <noscript>
    <div style="color:#f87171;background:#0d1117;padding:2rem;font-family:sans-serif;">
      Esta aplicação requer JavaScript habilitado no navegador.
    </div>
  </noscript>

  <script>
    /* ════════════════════════════════════════════════════════════════════
       CAPTURA GLOBAL DE ERROS
       ════════════════════════════════════════════════════════════════════ */
    window.addEventListener('error', function (e) {
      const root = document.getElementById('root');
      if (!root) return;
      const jaTemApp = root.querySelector('[data-app-mounted]');
      if (jaTemApp) return;
      root.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1117;color:#fca5a5;font-family:monospace;padding:2rem;text-align:left;">
          <div style="max-width:640px;">
            <h1 style="font-size:1rem;margin-bottom:0.75rem;color:#f87171;">⚠ Erro ao carregar a aplicação</h1>
            <p style="color:#fca5a5;font-size:0.8rem;white-space:pre-wrap;background:#1a1010;padding:1rem;border-radius:8px;border:1px solid #7f1d1d;">${(e.message || 'Erro desconhecido')}${e.filename ? '\n\nArquivo: ' + e.filename + ':' + e.lineno : ''}</p>
            <p style="color:#94a3b8;font-size:0.75rem;margin-top:0.75rem;">Abra o DevTools (F12) → Console para mais detalhes.</p>
          </div>
        </div>`;
    });

    /* ════════════════════════════════════════════════════════════════════
       APP COMPILADO VIA HTM (TAGGED TEMPLATES)
       ════════════════════════════════════════════════════════════════════ */
    // 1. Vincular htm ao React
    const html = htm.bind(React.createElement);
    const { useState, useEffect } = React;

    /* ─── CONFIGURAÇÃO SUPABASE (PRESERVADAS) ──────────────────────────── */
    const SUPABASE_URL      = 'https://gqpxxwfahnwnhklbjwxr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcHh4d2ZhaG53bmhrbGJqd3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjYyNjEsImV4cCI6MjA5NzI0MjI2MX0.ntq4ABMCXOhvjI-yU5XH7bclEGMVY0_72Admuid1Zn4';
    /* ────────────────────────────────────────────────────────────────────── */

    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── Utilitários ─────────────────────────────────────────────────────── */
    function traduzirErro(msg) {
      if (!msg) return 'Ocorreu um erro inesperado.';
      const m = msg.toLowerCase();
      if (m.includes('invalid login credentials'))   return 'E-mail ou senha incorretos.';
      if (m.includes('user already registered'))     return 'Este e-mail já está cadastrado.';
      if (m.includes('password should be at least')) return 'A senha precisa ter no mínimo 6 caracteres.';
      if (m.includes('email not confirmed'))          return 'Confirme seu e-mail antes de entrar.';
      if (m.includes('unable to validate'))            return 'Link de confirmação expirado ou inválido.';
      if (m.includes('rate limit'))                    return 'Muitas tentativas. Aguarde alguns minutos.';
      return msg;
    }

    /* ── Ícone Moeda ─────────────────────────────────────────────────────── */
    function CoinLogo({ size = 24 }) {
      return html`
        <svg width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="9" />
          <line x1="12" y1="7" x2="12" y2="17" />
          <line x1="9" y1="12" x2="15" y2="12" />
        </svg>
      `;
    }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    function Spinner() {
      return html`
        <div class="spinner" style="width:16px;height:16px;border:2.5px solid rgba(0,0,0,0.15);border-top-color:#0d1117;border-radius:50%;"></div>
      `;
    }

    /* ── Tela de Login / Cadastro ─────────────────────────────────────────── */
    function LoginScreen() {
      const [modo, setModo] = useState('entrar');
      const [nome, setNome] = useState('');
      const [whatsapp, setWhatsapp] = useState('');
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [erro, setErro] = useState('');
      const [sucesso, setSucesso] = useState('');
      const [loading, setLoading] = useState(false);
      const [showPass, setShowPass] = useState(false);

      const isCad = modo === 'cadastrar';
      const limpar = () => { setErro(''); setSucesso(''); };

      async function handleEntrar() {
        if (!email || !senha) { setErro('Preencha e-mail e senha.'); return; }
        setLoading(true); limpar();
        const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
        if (error) setErro(traduzirErro(error.message));
        setLoading(false);
      }

      async function handleCadastrar() {
        if (!nome || !whatsapp || !email || !senha) {
          setErro('Preencha todos os campos: Nome, WhatsApp, E-mail e Senha.');
          return;
        }
        if (senha.length < 6) {
          setErro('A senha precisa ter no mínimo 6 caracteres.');
          return;
        }
        setLoading(true); limpar();
        const { error } = await sbClient.auth.signUp({
          email,
          password: senha,
          options: { data: { display_name: nome.trim(), whatsapp: whatsapp.trim() } }
        });
        if (error) {
          setErro(traduzirErro(error.message));
        } else {
          setSucesso('Conta criada! Verifique seu e-mail para confirmar o cadastro e liberar o painel.');
        }
        setLoading(false);
      }

      async function handleGoogle() {
        await sbClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin }
        });
      }

      function onKey(e) {
        if (e.key !== 'Enter') return;
        isCad ? handleCadastrar() : handleEntrar();
      }

      const tabBase = 'flex-1 py-2 rounded-lg text-xs font-bold transition-all duration-200 ';
      const tabAtivo = tabBase + 'bg-[#1a2233] text-[#34d399] border border-[#34d399]/30 shadow-sm';
      const tabOff = tabBase + 'text-slate-500 hover:text-slate-300';

      return html`
        <div class="min-h-screen bg-[#0d1117] flex items-center justify-center p-4">
          <div class="w-full max-w-sm fade-up">

            <div class="flex flex-col items-center mb-8 gap-3">
              <div class="w-16 h-16 rounded-2xl bg-[#1a2233] border border-slate-800 flex items-center justify-center shadow-xl">
                <${CoinLogo} size=38 />
              </div>
              <div class="text-center">
                <h1 class="text-2xl font-extrabold text-[#34d399] tracking-tight">Minhas Moedinhas</h1>
                <p class="text-xs text-slate-500 mt-1">Sua jornada para a autonomia financeira.</p>
              </div>
            </div>

            <div class="bg-[#1a2233] rounded-2xl border border-slate-800 shadow-2xl p-6 space-y-4">

              <div class="flex bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800 gap-1">
                <button class=${!isCad ? tabAtivo : tabOff} onClick=${() => { setModo('entrar'); limpar(); setNome(''); setWhatsapp(''); setSenha(''); setEmail(''); }}>Entrar</button>
                <button class=${isCad ? tabAtivo : tabOff} onClick=${() => { setModo('cadastrar'); limpar(); setSenha(''); setEmail(''); }}>Criar Conta</button>
              </div>

              <div class="space-y-3">
                ${isCad && html`
                  <>
                    <div class="space-y-1.5 fade-up">
                      <label class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Nome Completo</label>
                      <input type="text" value=${nome} onChange=${e => { setNome(e.target.value); limpar(); }} onKeyDown=${onKey} placeholder="Seu nome completo" autocomplete="name" class="auth-input w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm" />
                    </div>
                    <div class="space-y-1.5 fade-up">
                      <label class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">WhatsApp</label>
                      <input type="tel" value=${whatsapp} onChange=${e => { setWhatsapp(e.target.value); limpar(); }} onKeyDown=${onKey} placeholder="(11) 99999-9999" autocomplete="tel" class="auth-input w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm" />
                    </div>
                  </>
                `}

                <div class="space-y-1.5">
                  <label class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">E-mail</label>
                  <input type="email" value=${email} onChange=${e => { setEmail(e.target.value); limpar(); }} onKeyDown=${onKey} placeholder="voce@email.com" autocomplete="email" class="auth-input w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm" />
                </div>

                <div class="space-y-1.5">
                  <label class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Senha</label>
                  <div class="relative">
                    <input type=${showPass ? 'text' : 'password'} value=${senha} onChange=${e => { setSenha(e.target.value); limpar(); }} onKeyDown=${onKey} placeholder="••••••••" autocomplete=${isCad ? 'new-password' : 'current-password'} class="auth-input w-full px-4 py-3 pr-11 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm" />
                    <button type="button" onClick=${() => setShowPass(v => !v)} class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                      ${showPass ? html`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>` : html`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`}
                    </button>
                  </div>
                  ${isCad && html`<p class="text-[9px] text-slate-600 mt-0.5">Mínimo de 6 caracteres.</p>`}
                </div>
              </div>

              ${erro && html`
                <div class="flex items-start gap-2 bg-red-950/50 border border-red-800/50 rounded-xl px-3.5 py-3 fade-up">
                  <svg class="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                  <p class="text-xs text-red-300 leading-relaxed">${erro}</p>
                </div>
              `}

              ${sucesso && html`
                <div class="flex items-start gap-2 bg-emerald-950/50 border border-emerald-800/50 rounded-xl px-3.5 py-3 fade-up">
                  <svg class="w-4 h-4 text-emerald-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
                  <p class="text-xs text-emerald-300 leading-relaxed">${sucesso}</p>
                </div>
              `}

              <button onClick=${isCad ? handleCadastrar : handleEntrar} disabled=${loading} class="auth-btn w-full flex items-center justify-center gap-2 bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 font-bold py-3.5 rounded-xl text-sm disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none">
                ${loading ? html`<${Spinner} /> <span>${isCad ? 'Criando conta...' : 'Entrando...'}</span>` : (isCad ? 'Criar minha conta' : 'Entrar na minha conta')}
              </button>

              <div class="flex items-center gap-3">
                <div class="h-px flex-1 bg-slate-800"></div>
                <span class="text-[10px] text-slate-600 font-medium">ou continue com</span>
                <div class="h-px flex-1 bg-slate-800"></div>
              </div>

              <button onClick=${handleGoogle} disabled=${loading} class="google-btn w-full flex items-center justify-center gap-2.5 bg-[#0d1117] border border-slate-700 text-slate-200 font-semibold py-3 rounded-xl text-sm disabled:opacity-50">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar com Google
              </button>
            </div>
            <p class="text-[9px] text-slate-700 text-center mt-5 leading-relaxed">Ao continuar você concorda com os termos de uso.<br/>Seus dados são protegidos e nunca compartilhados.</p>
          </div>
        </div>
      `;
    }

    /* ── Dashboard ────────────────────────────────────────────────────────── */
    function Dashboard({ session, onLogout }) {
      const meta = (session && session.user && session.user.user_metadata) || {};
      const nomeExib = meta.display_name || meta.name || (session && session.user && session.user.email) || 'Usuário';
      const primeiroNome = nomeExib.split(' ')[0];

      const cards = [
        { label: 'Saldo Atual', valor: 'R$ 0,00', cor: '#34d399', icon: '💰' },
        { label: 'Entradas', valor: 'R$ 0,00', cor: '#60a5fa', icon: '↑' },
        { label: 'Saídas', valor: 'R$ 0,00', cor: '#f87171', icon: '↓' },
      ];

      return html`
        <div class="min-h-screen bg-[#0d1117] text-slate-100 flex flex-col">
          <header class="bg-[#1a2233] border-b border-slate-800 px-6 py-4 flex items-center justify-between shadow-md sticky top-0 z-10">
            <div class="flex items-center gap-2.5">
              <${CoinLogo} size=26 />
              <span class="font-bold text-lg text-[#34d399] tracking-tight leading-none">Minhas Moedinhas</span>
            </div>
            <div class="flex items-center gap-4">
              <span class="text-xs text-slate-400 hidden sm:block">Olá, <strong class="text-slate-200">${primeiroNome}</strong> 👋</span>
              <button onClick=${onLogout} class="text-xs bg-slate-800 hover:bg-red-950/40 text-slate-400 hover:text-red-400 font-semibold px-3 py-1.5 rounded-lg border border-slate-700 hover:border-red-900/50 transition-all">Sair</button>
            </div>
          </header>

          <main class="flex-1 p-6 max-w-4xl w-full mx-auto flex flex-col items-center justify-center text-center space-y-5 fade-up">
            <div class="w-20 h-20 rounded-full bg-[#34d399]/10 flex items-center justify-center border border-[#34d399]/20 shadow-inner"><${CoinLogo} size=42 /></div>
            <div class="max-w-md space-y-2">
              <h2 class="text-xl font-bold text-slate-100">Bem-vindo, ${primeiroNome}! 🎉</h2>
              <p class="text-sm text-slate-400 leading-relaxed">Sua conexão com o Supabase Auth está operacional.<br/>O painel está pronto para receber os lançamentos financeiros.</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full mt-4">
              ${cards.map(c => html`
                <div key=${c.label} class="bg-[#1a2233] border border-slate-800 rounded-2xl p-5 text-left hover:border-slate-700 transition-colors">
                  <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">${c.label}</span>
                    <span class="text-lg">${c.icon}</span>
                  </div>
                  <p class="text-2xl font-extrabold" style=${{ color: c.cor }}>${c.valor}</p>
                  <p class="text-[10px] text-slate-600 mt-1">Nenhum lançamento ainda</p>
                </div>
              `)}
            </div>

            <button class="auth-btn mt-2 inline-flex items-center gap-2 bg-[#34d399] text-slate-950 font-bold px-6 py-3 rounded-xl text-sm">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Novo Lançamento
            </button>
          </main>
        </div>
      `;
    }

    /* ── App Root ─────────────────────────────────────────────────────────── */
    function App() {
      const [session, setSession] = useState(null);
      const [inicializando, setInicializando] = useState(true);

      useEffect(() => {
        sbClient.auth.getSession().then(({ data }) => {
          setSession(data.session);
          setInicializando(false);
        });

        const { data: listener } = sbClient.auth.onAuthStateChange((_event, newSession) => {
          setSession(newSession);
        });

        return () => listener.subscription.unsubscribe();
      }, []);

      async function handleLogout() {
        await sbClient.auth.signOut();
      }

      if (inicializando) {
        return html`
          <div class="min-h-screen bg-[#0d1117] flex items-center justify-center">
            <div class="spinner" style="width:36px;height:36px;border:3px solid rgba(52,211,153,0.2);border-top-color:#34d399;border-radius:50%;"></div>
          </div>
        `;
      }

      return !session ? html`<${LoginScreen} />` : html`<${Dashboard} session=${session} onLogout=${handleLogout} />`;
    }

    /* ── Montagem na DOM — React 18 ──────────────────────────────────────── */
    const rootEl = document.getElementById('root');
    rootEl.setAttribute('data-app-mounted', 'true');
    const root = ReactDOM.createRoot(rootEl);
    root.render(html`<${App} />`);
  </script>
</body>
</html>
