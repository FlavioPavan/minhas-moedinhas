<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Cadastro</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0d1117] text-slate-100">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const html = htm.bind(React.createElement);

    // ⚠️ COLOQUE SUAS CREDENCIAIS AQUI
    const SUPABASE_URL = 'https://gqpxxwfahnwnhklbjwxr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcHh4d2ZhaG53bmhrbGJqd3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjYyNjEsImV4cCI6MjA5NzI0MjI2MX0.ntq4ABMCXOhvjI-yU5XH7bclEGMVY0_72Admuid1Zn4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function CadastroExtra({ user, onComplete }) {
      const [form, setForm] = useState({ nome: '', telefone: '' });
      const [loading, setLoading] = useState(false);

      const salvarDados = async () => {
        setLoading(true);
        const { error } = await supabase.from('profiles').upsert({
          id: user.id,
          nome: form.nome,
          telefone: form.telefone,
          email: user.email
        });
        if (!error) onComplete();
        setLoading(false);
      };

      return html`
        <div class="p-6 max-w-sm mx-auto bg-[#1a2233] rounded-2xl mt-10 border border-slate-800">
          <h2 class="text-xl font-bold mb-4 text-[#34d399]">Complete seu perfil</h2>
          <input class="w-full bg-[#0d1117] p-3 rounded-lg mb-3 border border-slate-700" placeholder="Seu Nome" onChange=${(e) => setForm({...form, nome: e.target.value})} />
          <input class="w-full bg-[#0d1117] p-3 rounded-lg mb-6 border border-slate-700" placeholder="Seu Telefone (WhatsApp)" onChange=${(e) => setForm({...form, telefone: e.target.value})} />
          <button class="w-full bg-[#34d399] text-black py-3 rounded-lg font-bold" onClick=${salvarDados}>
            ${loading ? 'Salvando...' : 'Finalizar Cadastro'}
          </button>
        </div>
      `;
    }

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [profile, setProfile] = useState(null);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user || null);
          setLoading(false);
        });
      }, []);

      if (loading) return html`<div class="p-10 text-center">Carregando...</div>`;
      if (!user) return html`<div class="p-10 text-center text-red-400">Por favor, faça login no seu porto seguro.</div>`;
      if (!profile) return html`<${CadastroExtra} user=${user} onComplete=${() => setProfile(true)} />`;

      return html`
        <div class="p-10 text-center">
          <h1 class="text-3xl font-bold text-[#34d399]">Bem-vindo, investidor!</h1>
          <p class="mt-4 text-slate-400">Seus dados já estão no banco de dados.</p>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
