<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script>
        const e = React.createElement;

        function App() {
            // Estrutura do seu Dashboard
            return e('div', { className: 'max-w-md mx-auto p-4' }, [
                e('header', { className: 'flex justify-between items-center mb-6' }, [
                    e('h1', { className: 'text-xl font-bold text-teal-600' }, 'MinhasMoedinhas'),
                    e('div', { className: 'w-8 h-8 bg-teal-100 rounded-full flex items-center justify-center text-teal-700 font-bold' }, 'JS')
                ]),
                e('div', { className: 'bg-gray-900 rounded-2xl p-6 text-white mb-6' }, [
                    e('p', { className: 'text-gray-400 text-xs uppercase' }, 'Seu dinheiro guardado'),
                    e('h2', { className: 'text-3xl font-bold my-2' }, 'R$ 10.940,50'),
                    e('button', { className: 'bg-gray-700 px-3 py-1 rounded text-xs' }, 'Ver saldo')
                ]),
                e('div', { className: 'bg-teal-50 border-l-4 border-teal-500 p-4 rounded mb-6' }, [
                    e('h3', { className: 'font-bold text-teal-800' }, 'Verde — Siga em frente'),
                    e('p', { className: 'text-sm text-teal-600' }, 'Momento tranquilo para investir.')
                ]),
                e('h3', { className: 'font-bold mb-4' }, 'Meus Investimentos'),
                e('div', { className: 'grid gap-4' }, [
                    e('div', { className: 'bg-white p-4 rounded-xl shadow-sm border' }, [
                        e('p', { className: 'font-bold' }, 'Tesouro Selic 2027'),
                        e('p', { className: 'text-lg font-bold text-gray-900' }, 'R$ 5.820,00')
                    ])
                ])
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
