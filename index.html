<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [valor, setValor] = useState('');
      const [simulacao, setSimulacao] = useState(null);
      const [cardAtivo, setCardAtivo] = useState(null);

      // Dados para o nosso gráfico personalizado
      const historico = [
        { mes: 'Jan', valor: 4000 },
        { mes: 'Fev', valor: 5500 },
        { mes: 'Mar', valor: 8200 },
        { mes: 'Abr', valor: 12000 },
        { mes: 'Mai', valor: 15500 },
        { mes: 'Jun', valor: 20550 }
      ];

      const calcular = () => {
        const v = parseFloat(valor);
        if (!v) return;
        setSimulacao({
          fiis: (v * 0.4).toFixed(2),
          rendaFixa: (v * 0.5).toFixed(2),
          acoes: (v * 0.1).toFixed(2)
        });
      };

      return (
        <div className="max-w-4xl mx-auto p-6">
          <h1 className="text-3xl font-bold text-emerald-400 mb-6">Minhas Moedinhas</h1>

          {/* Gráfico customizado (Sem dependências externas) */}
          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8">
            <h2 className="text-lg font-bold mb-6 text-indigo-400">Evolução do Patrimônio</h2>
            <div className="flex items-end justify-between h-40 gap-2 px-2 border-b border-l border-slate-700 pb-2">
              {historico.map((item, i) => (
                <div key={i} className="flex flex-col items-center group w-full">
                  <div 
                    className="w-full bg-emerald-500 rounded-t-sm hover:bg-emerald-400 transition-all" 
                    style={{ height: `${(item.valor / 22000) * 100}%` }}
                  ></div>
                  <span className="text-[10px] mt-2 text-slate-400">{item.mes}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Simulador */}
          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8">
            <h2 className="text-lg font-bold mb-4">Simulador de Aporte</h2>
            <div className="flex gap-2">
              <input type="number" onChange={(e) => setValor(e.target.value)} placeholder="Valor (R$)" className="w-full p-3 bg-slate-950 rounded-lg border border-slate-600"/>
              <button onClick={calcular} className="bg-indigo-600 px-6 rounded-lg font-bold hover:bg-indigo-500">Simular</button>
            </div>
            {simulacao && (
              <div className="mt-4 p-4 bg-slate-900 rounded-lg text-sm grid grid-cols-3 gap-2 text-center border border-slate-700">
                <div><p className="text-slate-400 text-xs">FIIs (40%)</p><p className="font-bold text-emerald-400">R$ {simulacao.fiis}</p></div>
                <div><p className="text-slate-400 text-xs">Renda Fixa (50%)</p><p className="font-bold text-emerald-400">R$ {simulacao.rendaFixa}</p></div>
                <div><p className="text-slate-400 text-xs">Ações (10%)</p><p className="font-bold text-emerald-400">R$ {simulacao.acoes}</p></div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
