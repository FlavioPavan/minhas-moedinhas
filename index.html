<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minhas Moedinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <h1 class="text-2xl font-bold text-gray-700">Carregando...</h1>
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        function App() {
            return (
                <div className="p-8 text-center">
                    <h1 className="text-4xl font-bold text-green-600 mb-4">Sucesso!</h1>
                    <p className="text-gray-600">O sistema está carregando corretamente.</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
