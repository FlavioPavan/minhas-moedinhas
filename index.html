<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Educação Financeira</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* Bar animations */
    .bar-animate { transition: height 0.55s cubic-bezier(0.16, 1, 0.3, 1); }
    .bar-proj     { background: linear-gradient(to top, #818cf8cc, #a5b4fcee); }
    .bar-hist     { background: #34d39980; }
    .bar-hist:hover { background: #34d399; }

    /* Accordion */
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1); }
    .accordion-body.open { max-height: 520px; }

    /* Selic pulse */
    .pulse-dot { animation: pulse-ring 2s cubic-bezier(0.455,0.03,0.515,0.955) infinite; }
    @keyframes pulse-ring { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* Progress bar */
    .progress-fill { transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }

    /* Card glow on hover */
    .card-glow:hover { box-shadow: 0 0 0 1px #34d39933, 0 8px 28px #34d39914; }

    /* Hide number spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* Profile button micro-interaction */
    .profile-btn { transition: all 0.18s ease; }
    .profile-btn:hover { transform: translateY(-1px); }
    .profile-btn:active { transform: scale(0.96); }

    /* Simulate button */
    .sim-btn { transition: all 0.15s ease; }
    .sim-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px #34d39940; }
    .sim-btn:active { transform: scale(0.97); box-shadow: none; }

    /* Tab toggle */
    .tab-btn { transition: all 0.2s ease; }

    /* Tooltip bar */
    .bar-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-size: 9px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 6px;
    }
    .bar-wrap:hover .bar-tooltip { opacity: 1; }
  </style>
</head>
<body class="bg-[#0d1117] text-slate-100 antialiased">
  <div id="root"></div>
  <script>
    const { useState, useEffect, useCallback } = React;
    const html = htm.bind(React.createElement);

    // ─────────────────────────────────────────────────────────────────────────
    // 🗄️  REPOSITORY PATTERN — troque os corpos abaixo por Supabase/Firebase
    // ─────────────────────────────────────────────────────────────────────────
    const DB_KEYS = {
      APORTE: '@minhasmoedinhas:aporte',
      PERFIL:  '@minhasmoedinhas:perfil',
    };

    async function saveToDatabase(key, data) {
      // FUTURO → supabase.from('portfolios').upsert({ [key]: data })
      try { localStorage.setItem(key, JSON.stringify(data)); return { ok: true }; }
      catch (err) { console.error('[DB] save:', err); return { ok: false }; }
    }

    async function loadFromDatabase(key) {
      // FUTURO → supabase.from('portfolios').select(key).single()
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; }
      catch (err) { console.error('[DB] load:', err); return null; }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // 📊  CONSTANTES E DADOS
    // ─────────────────────────────────────────────────────────────────────────
    const SELIC_FALLBACK = 10.5;

    const HISTORICO = [
      { mes: 'Jan', valor: 4000  },
      { mes: 'Fev', valor: 5500  },
      { mes: 'Mar', valor: 8200  },
      { mes: 'Abr', valor: 12000 },
      { mes: 'Mai', valor: 15500 },
      { mes: 'Jun', valor: 20550 },
    ];
    const HIST_MAX = Math.max(...HISTORICO.map(h => h.valor));

    // Perfis de investidor
    const PERFIS = {
      conservador: {
        label: 'Conservador',
        emoji: '🛡️',
        alocacao: [
          { nome: 'Renda Fixa',        pct: 0.70, cor: 'text-indigo-400',  bg: 'bg-indigo-400',  barColor: '#818cf8' },
          { nome: 'FIIs (Imobiliário)', pct: 0.20, cor: 'text-emerald-400', bg: 'bg-emerald-400', barColor: '#34d399' },
          { nome: 'Ações',             pct: 0.10, cor: 'text-amber-400',   bg: 'bg-amber-400',   barColor: '#fbbf24' },
        ],
      },
      moderado: {
        label: 'Moderado',
        emoji: '⚖️',
        alocacao: [
          { nome: 'Renda Fixa',        pct: 0.50, cor: 'text-indigo-400',  bg: 'bg-indigo-400',  barColor: '#818cf8' },
          { nome: 'FIIs (Imobiliário)', pct: 0.40, cor: 'text-emerald-400', bg: 'bg-emerald-400', barColor: '#34d399' },
          { nome: 'Ações',             pct: 0.10, cor: 'text-amber-400',   bg: 'bg-amber-400',   barColor: '#fbbf24' },
        ],
      },
      arrojado: {
        label: 'Arrojado',
        emoji: '🚀',
        alocacao: [
          { nome: 'Renda Fixa',        pct: 0.20, cor: 'text-indigo-400',  bg: 'bg-indigo-400',  barColor: '#818cf8' },
          { nome: 'FIIs (Imobiliário)', pct: 0.30, cor: 'text-emerald-400', bg: 'bg-emerald-400', barColor: '#34d399' },
          { nome: 'Ações',             pct: 0.50, cor: 'text-amber-400',   bg: 'bg-amber-400',   barColor: '#fbbf24' },
        ],
      },
    };

    const OPORTUNIDADES = [
      {
        id: 'tesouro', emoji: '🏛️', titulo: 'Tesouro Selic', subtitulo: 'Renda Fixa · Risco Baixo',
        tagColor: 'bg-indigo-900/60 text-indigo-300 border border-indigo-700/40',
        descricao: 'O ativo mais seguro do país: rentabilidade diária atrelada à Taxa Selic. Liquidez em D+1, ideal para reserva de emergência e primeiros aportes.',
        cta: 'Investir no Tesouro', href: 'https://www.tesourodireto.com.br/',
        destaque: 'A porta de entrada mais segura para o mundo dos investimentos.',
      },
      {
        id: 'fii', emoji: '🏢', titulo: 'Fundos Imobiliários (FIIs)', subtitulo: 'Renda Variável · Risco Médio',
        tagColor: 'bg-emerald-900/60 text-emerald-300 border border-emerald-700/40',
        descricao: 'Seja sócio de shoppings, galpões e escritórios com a partir de R$100. FIIs pagam dividendos mensais isentos de IR para pessoa física.',
        cta: 'Ver FIIs disponíveis', href: 'https://statusinvest.com.br/fundos-imobiliarios',
        destaque: 'Dividendos mensais + isenção de IR: o favorito dos investidores.',
      },
      {
        id: 'acoes', emoji: '📈', titulo: 'Ações — B3', subtitulo: 'Renda Variável · Risco Alto',
        tagColor: 'bg-amber-900/60 text-amber-300 border border-amber-700/40',
        descricao: 'Compre uma fatia de empresas reais como Petrobras, Vale ou Nubank. Oferecem alto potencial de crescimento no longo prazo.',
        cta: 'Abrir conta na corretora', href: 'https://www.xpi.com.br/',
        destaque: 'Para o horizonte longo: historicamente a maior rentabilidade real.',
      },
    ];

    // ─────────────────────────────────────────────────────────────────────────
    // 🔧  UTILIDADES
    // ─────────────────────────────────────────────────────────────────────────

    // Gera 12 meses de projeção com juros compostos na parcela de Renda Fixa
    function gerarProjecao(aporte, perfil, selicAnual) {
      const rfPct    = perfil.alocacao[0].pct;          // Renda Fixa
      const fiiPct   = perfil.alocacao[1].pct;          // FIIs
      const acoesPct = perfil.alocacao[2].pct;          // Ações

      const taxaMensal = Math.pow(1 + selicAnual / 100, 1 / 12) - 1;
      // FII: estimamos yield médio de ~0.6% ao mês (conservador, fixo)
      const fiiMensal  = 0.006;
      // Ações: estimamos crescimento médio de ~1% ao mês (otimista, fixo)
      const acoesMensal = 0.010;

      const meses = ['Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar','Abr','Mai','Jun'];
      let rf    = aporte * rfPct;
      let fii   = aporte * fiiPct;
      let acoes = aporte * acoesPct;

      return meses.map(function(mes, i) {
        if (i > 0) {
          rf    = rf    * (1 + taxaMensal);
          fii   = fii   * (1 + fiiMensal);
          acoes = acoes * (1 + acoesMensal);
        }
        return { mes, valor: rf + fii + acoes };
      });
    }

    function fmtBRL(v) {
      return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // ─────────────────────────────────────────────────────────────────────────
    // 🧩  COMPONENTES
    // ─────────────────────────────────────────────────────────────────────────

    // ── Badge Selic ───────────────────────────────────────────────────────────
    function SelicBadge({ selic, isLive, loading }) {
      if (loading) {
        return html`
          <div class="flex items-center gap-1.5 text-[10px] text-slate-500 bg-slate-800/60 px-2.5 py-1 rounded-full border border-slate-700/50">
            <span class="w-1.5 h-1.5 rounded-full bg-slate-600 pulse-dot inline-block"></span>
            Buscando Selic…
          </div>`;
      }
      const dotCls  = isLive ? 'bg-emerald-400' : 'bg-amber-400';
      const textCls = isLive ? 'text-emerald-400' : 'text-amber-400';
      const label   = isLive ? 'Selic ao vivo' : 'Média de mercado';
      return html`
        <div class="flex items-center gap-1.5 text-[10px] bg-slate-800/60 px-2.5 py-1 rounded-full border border-slate-700/50">
          <span class=${'w-1.5 h-1.5 rounded-full pulse-dot inline-block ' + dotCls}></span>
          <span class=${'font-semibold ' + textCls}>${selic.toFixed(2)}% a.a.</span>
          <span class="text-slate-500">${label}</span>
        </div>`;
    }

    // ── Seletor de Perfil ─────────────────────────────────────────────────────
    function PerfilSelector({ perfil, onChange }) {
      const perfilKeys = ['conservador', 'moderado', 'arrojado'];
      return html`
        <div class="flex gap-1.5 bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800">
          ${perfilKeys.map(function(key) {
            const p       = PERFIS[key];
            const ativo   = perfil === key;
            const baseCls = 'profile-btn flex-1 flex flex-col items-center py-2 px-1 rounded-lg text-[10px] font-semibold cursor-pointer border ';
            const atCls   = ativo
              ? 'bg-[#1a2233] border-[#34d399]/50 text-[#34d399] shadow-sm'
              : 'bg-transparent border-transparent text-slate-500 hover:text-slate-300';
            return html`
              <button key=${key} class=${baseCls + atCls} onClick=${function() { onChange(key); }}>
                <span class="text-base leading-none mb-0.5">${p.emoji}</span>
                ${p.label}
              </button>`;
          })}
        </div>`;
    }

    // ── Gráfico Bifuncional ───────────────────────────────────────────────────
    function GraficoCard({ resultado, perfil, selic }) {
      const [modo, setModo] = useState('historico'); // 'historico' | 'projecao'

      // Dados a exibir dependendo do modo
      const temAporte = resultado !== null && resultado > 0;
      const projecao  = temAporte ? gerarProjecao(resultado, PERFIS[perfil], selic) : [];
      const dados     = modo === 'historico' ? HISTORICO : projecao;
      const maxVal    = dados.length > 0 ? Math.max(...dados.map(function(d) { return d.valor; })) : 1;

      const modoHist = modo === 'historico';
      const tabBaseCls = 'tab-btn px-3 py-1 rounded-lg text-[10px] font-semibold border ';
      const tabHistCls = tabBaseCls + (modoHist
        ? 'bg-[#34d399]/15 border-[#34d399]/40 text-[#34d399]'
        : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400');
      const tabProjCls = tabBaseCls + (!modoHist
        ? 'bg-indigo-400/15 border-indigo-400/40 text-indigo-300'
        : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400');

      return html`
        <section class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800 shadow-xl">
          <!-- Cabeçalho com abas -->
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">
              ${modoHist ? 'Evolução do Patrimônio' : 'Projeção — 12 meses'}
            </h2>
            <div class="flex gap-1 bg-[#0d1117]/50 p-0.5 rounded-lg border border-slate-800">
              <button class=${tabHistCls} onClick=${function() { setModo('historico'); }}>Histórico</button>
              <button class=${tabProjCls} onClick=${function() { setModo('projecao'); }}>12 meses</button>
            </div>
          </div>

          <!-- Área do gráfico -->
          ${!modoHist && !temAporte
            ? html`
              <div class="h-28 flex flex-col items-center justify-center gap-2 border border-dashed border-slate-700/60 rounded-xl bg-[#0d1117]/30">
                <span class="text-xl">💡</span>
                <p class="text-[11px] text-slate-500 text-center leading-relaxed">
                  Digite um valor no simulador<br/>abaixo para ver a projeção.
                </p>
              </div>`
            : html`
              <div class="flex items-end justify-between h-28 gap-1 px-0.5">
                ${dados.map(function(item) {
                  const pct       = (item.valor / maxVal) * 100;
                  const pctStr    = String(Math.round(pct));
                  const barCls    = modoHist ? 'bar-animate bar-hist w-full rounded-t-sm cursor-default' : 'bar-animate bar-proj w-full rounded-t-sm cursor-default';
                  const valFmt    = item.valor >= 1000
                    ? 'R$' + (item.valor / 1000).toFixed(1) + 'k'
                    : 'R$' + item.valor.toFixed(0);
                  const heightSty = { height: pct + '%', minHeight: '6px' };
                  return html`
                    <div key=${item.mes} class="bar-wrap flex flex-col items-center w-full relative">
                      <span class="bar-tooltip">${valFmt}</span>
                      <div class=${barCls} style=${heightSty}></div>
                      <span class="text-[9px] mt-1.5 text-slate-600 font-medium">${item.mes}</span>
                    </div>`;
                })}
              </div>`
          }

          <!-- Rodapé do card -->
          <div class="mt-3 pt-3 border-t border-slate-800/60 flex items-center justify-between">
            ${modoHist
              ? html`
                  <span class="text-[10px] text-slate-500">Total acumulado</span>
                  <span class="text-sm font-bold text-[#34d399]">
                    R$ ${HISTORICO[HISTORICO.length - 1].valor.toLocaleString('pt-BR')}
                  </span>`
              : temAporte
                ? html`
                    <span class="text-[10px] text-slate-500">Projeção em 12 meses</span>
                    <span class="text-sm font-bold text-indigo-300">
                      R$ ${fmtBRL(projecao[projecao.length - 1].valor)}
                    </span>`
                : html`<span></span>`
            }
          </div>
        </section>`;
    }

    // ── Resultado da Simulação com barra de progresso ────────────────────────
    function ResultadoAlocacao({ resultado, perfil, selic, selicIsLive, selicLoading }) {
      const alocacao = PERFIS[perfil].alocacao;
      // Calcula rendimento mensal estimado da RF
      const rfItem     = alocacao[0];
      const rfBruto    = resultado * rfItem.pct;
      const rendMensal = (rfBruto * (selic / 100)) / 12;

      return html`
        <div class="space-y-2.5">
          <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">
            Divisão da carteira · Perfil ${PERFIS[perfil].emoji} ${PERFIS[perfil].label}
          </p>
          ${alocacao.map(function(a) {
            const bruto      = resultado * a.pct;
            const pctLabel   = Math.round(a.pct * 100);
            const isRF       = a === rfItem;
            const widthStyle = { width: a.pct * 100 + '%' };

            return html`
              <div key=${a.nome} class="bg-[#0d1117]/70 p-3.5 rounded-xl border border-slate-800 space-y-2">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2 min-w-0">
                    <div class=${'w-1.5 h-6 rounded-full flex-shrink-0 opacity-80 ' + a.bg}></div>
                    <div class="min-w-0">
                      <p class="text-xs text-slate-300 font-medium">${a.nome} (${pctLabel}%)</p>
                      ${isRF && !selicLoading && html`
                        <p class="text-[9px] text-slate-500 mt-0.5">
                          ${'≈ R$ ' + rendMensal.toFixed(2) + '/mês em juros'}
                          ${!selicIsLive ? ' · média' : ''}
                        </p>`}
                    </div>
                  </div>
                  <span class=${'font-bold text-sm flex-shrink-0 ' + a.cor}>
                    R$ ${fmtBRL(bruto)}
                  </span>
                </div>
                <!-- Mini barra de progresso -->
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                  <div class=${'h-full rounded-full progress-fill ' + a.bg} style=${widthStyle}></div>
                </div>
              </div>`;
          })}
          <p class="text-[9px] text-slate-600 text-center pt-1">
            Projeção RF com Selic ${selic.toFixed(1)}% a.a.
            ${selicIsLive ? ' (ao vivo)' : ' (média de mercado)'}
            · Não é recomendação de investimento.
          </p>
        </div>`;
    }

    // ── Card Oportunidade (Acordeão) ──────────────────────────────────────────
    function OportunidadeCard({ op, isOpen, onToggle }) {
      const borderCls = isOpen ? 'border-[#34d399]/40' : 'border-slate-800';
      const cardCls   = 'bg-[#1a2233] rounded-2xl border transition-all duration-300 card-glow overflow-hidden ' + borderCls;
      const bodyCls   = isOpen ? 'accordion-body open' : 'accordion-body';
      const svgCls    = 'w-4 h-4 text-slate-500 transition-transform duration-300 flex-shrink-0 ' + (isOpen ? 'rotate-180' : '');

      function handleCtaClick(e) { e.stopPropagation(); }

      return html`
        <div class=${cardCls}>
          <button class="w-full flex items-center justify-between p-4 text-left cursor-pointer" onClick=${onToggle} aria-expanded=${isOpen}>
            <div class="flex items-center gap-3">
              <span class="text-2xl leading-none">${op.emoji}</span>
              <div>
                <p class="text-sm font-bold text-slate-100">${op.titulo}</p>
                <span class=${'text-[10px] px-2 py-0.5 rounded-full font-medium mt-0.5 inline-block ' + op.tagColor}>${op.subtitulo}</span>
              </div>
            </div>
            <svg class=${svgCls} fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div class=${bodyCls}>
            <div class="px-4 pb-4 space-y-3">
              <div class="h-px bg-slate-700/50"></div>
              <p class="text-xs text-slate-300 leading-relaxed">${op.descricao}</p>
              <div class="bg-[#0d1117]/60 rounded-xl p-3 border border-slate-700/40">
                <p class="text-[10px] text-slate-500 uppercase tracking-wide font-semibold mb-1">Por que considerar?</p>
                <p class="text-xs text-[#34d399] font-medium">${op.destaque}</p>
              </div>
              <a
                href=${op.href}
                target="_blank"
                rel="noopener noreferrer"
                onClick=${handleCtaClick}
                class="flex items-center justify-center gap-2 w-full bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 text-xs font-bold py-3 rounded-xl transition-colors duration-200"
              >
                ${op.cta}
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
              </a>
              <p class="text-[9px] text-slate-600 text-center">Link de parceiro. Analise sempre antes de investir.</p>
            </div>
          </div>
        </div>`;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // 🚀  APP PRINCIPAL
    // ─────────────────────────────────────────────────────────────────────────
    function App() {
      const [valor,        setValor]        = useState('');
      const [resultado,    setResultado]    = useState(null);
      const [perfil,       setPerfil]       = useState('moderado');
      const [openCard,     setOpenCard]     = useState(null);
      const [selic,        setSelic]        = useState(SELIC_FALLBACK);
      const [selicIsLive,  setSelicIsLive]  = useState(false);
      const [selicLoading, setSelicLoading] = useState(true);

      // ── Hidratação do localStorage ────────────────────────────────────────
      useEffect(function() {
        (async function() {
          const savedAporte = await loadFromDatabase(DB_KEYS.APORTE);
          const savedPerfil = await loadFromDatabase(DB_KEYS.PERFIL);
          if (savedPerfil && PERFIS[savedPerfil]) setPerfil(savedPerfil);
          if (savedAporte !== null) {
            const v = parseFloat(savedAporte);
            if (!Number.isNaN(v) && v > 0) { setValor(String(savedAporte)); setResultado(v); }
          }
        })();
      }, []);

      // ── Fetch Selic ao vivo ───────────────────────────────────────────────
      useEffect(function() {
        const controller = new AbortController();
        const timeout    = setTimeout(function() { controller.abort(); }, 5000);
        (async function() {
          try {
            const res  = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json', { signal: controller.signal });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const json = await res.json();
            const taxaDiaria = parseFloat(json[0]?.valor);
            if (Number.isNaN(taxaDiaria)) throw new Error('invalido');
            const taxaAnual = (Math.pow(1 + taxaDiaria / 100, 252) - 1) * 100;
            setSelic(parseFloat(taxaAnual.toFixed(2)));
            setSelicIsLive(true);
          } catch (_) {
            setSelic(SELIC_FALLBACK);
            setSelicIsLive(false);
          } finally {
            clearTimeout(timeout);
            setSelicLoading(false);
          }
        })();
        return function() { controller.abort(); clearTimeout(timeout); };
      }, []);

      // ── Ações ─────────────────────────────────────────────────────────────
      const calcular = useCallback(async function() {
        const v = parseFloat(valor);
        if (Number.isNaN(v) || v <= 0) return;
        setResultado(v);
        await saveToDatabase(DB_KEYS.APORTE, valor);
      }, [valor]);

      function handlePerfilChange(key) {
        setPerfil(key);
        saveToDatabase(DB_KEYS.PERFIL, key);
      }

      function handleKeyDown(e) { if (e.key === 'Enter') calcular(); }

      function toggleCard(id) {
        setOpenCard(function(prev) { return prev === id ? null : id; });
      }

      // ── Render ────────────────────────────────────────────────────────────
      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col space-y-5 pb-10">

          <!-- HEADER -->
          <header class="pt-5 flex items-start justify-between">
            <div>
              <div class="flex items-center gap-2">
                <span class="text-2xl">🪙</span>
                <h1 class="text-2xl font-extrabold text-[#34d399] tracking-tight">Minhas Moedinhas</h1>
              </div>
              <p class="text-xs text-slate-500 mt-1 ml-8">Sua jornada para a autonomia financeira.</p>
            </div>
            <${SelicBadge} selic=${selic} isLive=${selicIsLive} loading=${selicLoading} />
          </header>

          <!-- GRÁFICO BIFUNCIONAL -->
          <${GraficoCard} resultado=${resultado} perfil=${perfil} selic=${selic} />

          <!-- SIMULADOR -->
          <section class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800 shadow-xl space-y-4">

            <!-- Título -->
            <div class="flex items-center justify-between">
              <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Simulador de Aporte</h2>
              ${!selicLoading && html`
                <span class="text-[9px] text-slate-600">Selic ${selic.toFixed(1)}% a.a.</span>`}
            </div>

            <!-- Seletor de Perfil -->
            <${PerfilSelector} perfil=${perfil} onChange=${handlePerfilChange} />

            <!-- Input + botão -->
            <div class="flex gap-2">
              <div class="relative flex-1">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-semibold select-none">R$</span>
                <input
                  type="number"
                  value=${valor}
                  onChange=${function(e) { setValor(e.target.value); }}
                  onKeyDown=${handleKeyDown}
                  placeholder="0,00"
                  min="0"
                  step="any"
                  class="w-full pl-10 pr-3 py-3 bg-[#0d1117] rounded-xl border border-slate-700 focus:outline-none focus:border-[#34d399] text-slate-100 placeholder-slate-600 text-sm transition-colors"
                />
              </div>
              <button onClick=${calcular} class="sim-btn bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 px-5 rounded-xl font-bold text-sm">
                Simular
              </button>
            </div>

            <!-- Resultado da Alocação -->
            ${resultado !== null && html`
              <${ResultadoAlocacao}
                resultado=${resultado}
                perfil=${perfil}
                selic=${selic}
                selicIsLive=${selicIsLive}
                selicLoading=${selicLoading}
              />`}
          </section>

          <!-- TOP 3 OPORTUNIDADES -->
          <section class="space-y-3">
            <div class="flex items-center justify-between px-1">
              <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">🔥 Top 3 Oportunidades</h2>
              <span class="text-[9px] text-slate-600">Clique para saber mais</span>
            </div>
            ${OPORTUNIDADES.map(function(op) {
              return html`
                <${OportunidadeCard}
                  key=${op.id}
                  op=${op}
                  isOpen=${openCard === op.id}
                  onToggle=${function() { toggleCard(op.id); }}
                />`;
            })}
          </section>

          <!-- FOOTER -->
          <footer class="pt-4 text-center border-t border-slate-800/60 space-y-1">
            <p class="text-[9px] text-slate-600 leading-relaxed max-w-xs mx-auto">
              <strong class="text-slate-500">Aviso Legal:</strong> O <em>Minhas Moedinhas</em> é uma ferramenta educativa e não configura recomendação de investimento. Rentabilidade passada não garante retorno futuro.
            </p>
            <p class="text-[8px] text-slate-700">© 2025 Minhas Moedinhas · Feito com 💚 no Brasil</p>
          </footer>

        </div>`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
