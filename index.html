<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [valor, setValor] = useState('');
      const [simulacao, setSimulacao] = useState(null);
      const [modal, setModal] = useState(null);

      const explicar = (tipo) => {
        const textos = {
          'FIIs': 'Fundos Imobiliários: É como ser dono de um pedacinho de grandes prédios e receber o aluguel todo mês na sua conta.',
          'Renda Fixa': 'Segurança: Você empresta dinheiro ao banco e ele te devolve com juros. É o lugar ideal para o seu dinheiro não perder valor.',
          'Ações': 'Sociedade: Você compra uma parte de uma empresa. É mais arriscado, mas pode crescer muito no longo prazo.'
        };
        setModal({ titulo: tipo, texto: textos[tipo] });
      };

      const calcular = () => {
        const v = parseFloat(valor);
        if (!v) return;
        setSimulacao({
          fiis: (v * 0.4).toFixed(2),
          rendaFixa: (v * 0.5).toFixed(2),
          acoes: (v * 0.1).toFixed(2)
        });
      };

      return (
        <div className="max-w-4xl mx-auto p-6">
          <h1 className="text-3xl font-bold text-emerald-400 mb-6">Minhas Moedinhas</h1>

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8">
            <h2 className="text-lg font-bold mb-4">Simulador de Aporte</h2>
            <div className="flex gap-2">
              <input type="number" onChange={(e) => setValor(e.target.value)} placeholder="Valor (R$)" className="w-full p-3 bg-slate-950 rounded-lg border border-slate-600"/>
              <button onClick={calcular} className="bg-indigo-600 px-6 rounded-lg font-bold hover:bg-indigo-500">Simular</button>
            </div>
            {simulacao && (
              <div className="mt-4 p-4 bg-slate-900 rounded-lg text-sm grid grid-cols-3 gap-2 text-center">
                <div><p className="text-slate-400">FIIs (40%)</p><p className="font-bold text-emerald-400">R$ {simulacao.fiis}</p></div>
                <div><p className="text-slate-400">Renda Fixa (50%)</p><p className="font-bold text-emerald-400">R$ {simulacao.rendaFixa}</p></div>
                <div><p className="text-slate-400">Ações (10%)</p><p className="font-bold text-emerald-400">R$ {simulacao.acoes}</p></div>
              </div>
            )}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {['FIIs', 'Renda Fixa', 'Ações'].map(item => (
              <div key={item} onClick={() => explicar(item)} className="bg-slate-800 p-4 rounded-xl border border-slate-700 cursor-pointer hover:border-indigo-500">
                <h3 className="font-bold text-indigo-400">{item}</h3>
                <p className="text-xs text-slate-400 mt-2">Clique para entender</p>
              </div>
            ))}
          </div>

          {modal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4" onClick={() => setModal(null)}>
              <div className="bg-slate-800 p-6 rounded-2xl max-w-sm border border-slate-600">
                <h3 className="text-xl font-bold text-emerald-400 mb-2">{modal.titulo}</h3>
                <p>{modal.texto}</p>
                <button className="mt-4 w-full bg-slate-700 py-2 rounded-lg" onClick={() => setModal(null)}>Entendi</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
