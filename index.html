<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Dashboard Pro</title>
  
  <!-- CDNs -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e2e8f0; }
    
    /* Componentes Customizados */
    .card-dash { background-color: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 16px; }
    .input-valor { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 12px 16px; color: white; font-weight: 600; width: 100%; }
    .input-valor:focus { border-color: #34d399; box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2); outline: none; }
    
    /* Animações */
    .fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
    
    .chart-container { position: relative; height: 160px; width: 100%; }
    
    /* Scroll Customizado */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #34d399; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef, useCallback } = React;
    const html = htm.bind(React.createElement);
    const sbClient = window.supabase.createClient('https://gqpxxwfahnwnhklbjwxr.supabase.co', 'sb_publishable_LiUY4XIO_xNS_aEqpmQlkQ_etMa1iB5');

    // ==========================================================
    // 1. MOTOR FINANCEIRO (Cálculos Puros e Isolados)
    // ==========================================================
    const MotorFinanceiro = {
      // Gera dados históricos para o gráfico com volatilidade
      gerarSerieTemporal: (dias, valorInicial, rentabilidadeAnual, volatilidadeDiaria) => {
        let historico = [];
        let valorAtual = valorInicial;
        // Taxa diária composta (252 dias úteis)
        const taxaDiaria = (1 + rentabilidadeAnual) ** (1/252) - 1;
        
        for (let i = 0; i < dias; i++) {
          // Ruído Gaussiano para simular mercado real
          const ruido = (Math.random() - 0.5) * volatilidadeDiaria * 2;
          valorAtual = valorAtual * (1 + taxaDiaria + ruido);
          historico.push(valorAtual);
        }
        return historico;
      },

      // Cálculo da divisão da carteira baseado no perfil
      calcularDivisao: (valorTotal, perfil) => {
        let rendaFixaPct = 0.50, fiisPct = 0.40, acoesPct = 0.10;
        // Exemplo: Arrojado pode mudar a alocação
        if (perfil === 'conservador') { rendaFixaPct = 0.70; fiisPct = 0.20; acoesPct = 0.10; }
        if (perfil === 'arrojado') { rendaFixaPct = 0.30; fiisPct = 0.40; acoesPct = 0.30; }

        return {
          rendaFixa: valorTotal * rendaFixaPct,
          fiis: valorTotal * fiisPct,
          acoes: valorTotal * acoesPct,
          labels: { rendaFixa: 'Renda Fixa (50%)', fiis: 'FIIs (Imobiliário) (40%)', acoes: 'Ações (10%)' },
          cores: { rendaFixa: 'bg-[#34d399]', fiis: 'bg-[#10b981]', acoes: 'bg-[#fbbf24]' }
        };
      }
    };

    // ==========================================================
    // 2. COMPONENTES DE UI
    // ==========================================================

    // 2.1 Gráfico de Evolução
    function ChartEvolucao({ valores }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (chartInstance.current) chartInstance.current.destroy();

        const ctx = chartRef.current.getContext('2d');
        // Cria dados simulados baseados no valor atual para dar "vida" ao gráfico
        // Usamos o motor para gerar os últimos 12 meses (apenas para visual)
        const base = valores?.find(v => v > 0) || 1000;
        const dataPoints = MotorFinanceiro.gerarSerieTemporal(12, base, 0.12, 0.015);
        
        chartInstance.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
            datasets: [{
              label: 'Patrimônio',
              data: dataPoints,
              borderColor: '#34d399',
              backgroundColor: 'rgba(52, 211, 153, 0.1)',
              fill: true,
              tension: 0.4,
              pointRadius: 0,
              borderWidth: 2
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
              y: { 
                grid: { color: 'rgba(255,255,255,0.05)' }, 
                ticks: { color: '#64748b', callback: (v) => `R$ ${(v/1000).toFixed(0)}k`, maxTicksLimit: 4 } 
              }, 
              x: { 
                grid: { display: false }, 
                ticks: { color: '#64748b', maxTicksLimit: 6 } 
              } 
            }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [valores]);

      return html`<div class="chart-container fade-up"><canvas ref=${chartRef}></canvas></div>`;
    }

    // 2.2 Top 3 Oportunidades (Layout Horizontal)
    function TopOportunidades() {
      const oportunidades = [
        { titulo: "Tesouro IPCA+ 2035", sub: "Renda Fixa", icon: "📈", cor: "text-[#818cf8]" },
        { titulo: "FIIs de Tijolo (IFIX)", sub: "Renda Variável", icon: "🏢", cor: "text-[#34d399]" },
        { titulo: "Ações Pagadoras", sub: "Renda Variável", icon: "📊", cor: "text-[#fbbf24]" }
      ];

      return html`
        <div class="grid grid-cols-3 gap-2">
          ${oportunidades.map((op, i) => html`
            <div key=${i} class="bg-[#0d1117] p-3 rounded-xl border border-[#30363d] hover:border-[#34d399]/30 transition-colors flex flex-col items-center text-center space-y-1">
              <span class="text-xl">${op.icon}</span>
              <h4 class="text-[10px] font-bold text-white leading-tight">${op.titulo}</h4>
              <span class="${op.cor} text-[8px] bg-[#1a2233] px-2 py-0.5 rounded-full border border-slate-800">${op.sub}</span>
              <p class="text-[8px] text-slate-500 mt-1">Clique para saber mais</p>
            </div>
          `)}
        </div>
      `;
    }

    // ==========================================================
    // 3. SIMULADOR DE APORTE (O Coração da Aplicação)
    // ==========================================================
    function SimuladorAporte({ onSimular }) {
      const [perfil, setPerfil] = useState('moderado');
      const [valor, setValor] = useState('100');
      const [resultado, setResultado] = useState(null);
      const [isAnimating, setIsAnimating] = useState(false);

      const perfis = [
        { id: 'conservador', label: 'Conservador', icon: '🛡️' },
        { id: 'moderado', label: 'Moderado', icon: '⚖️' },
        { id: 'arrojado', label: 'Arrojado', icon: '🚀' }
      ];

      const handleSimular = useCallback(() => {
        setIsAnimating(true);
        const valorNum = parseFloat(valor.replace(',', '.'));
        if (!valorNum || valorNum <= 0) return;

        // Chama o Motor Financeiro
        const divisao = MotorFinanceiro.calcularDivisao(valorNum, perfil);
        setResultado(divisao);
        onSimular(divisao);

        setTimeout(() => setIsAnimating(false), 300);
      }, [valor, perfil, onSimular]);

      return html`
        <div class="card-dash space-y-4 fade-up">
          <div class="flex justify-between items-center">
            <h2 class="text-sm font-bold text-slate-200">Simulador de Aporte</h2>
            <span class="text-[10px] text-slate-500">Selic 14,2% a.a.</span>
          </div>

          <div class="flex justify-between gap-2 bg-[#0d1117] p-1 rounded-xl border border-[#30363d]">
            ${perfis.map(p => html`
              <button 
                key=${p.id}
                onClick=${() => setPerfil(p.id)}
                class="flex-1 py-1.5 px-2 rounded-lg text-[10px] font-semibold transition-all flex flex-col items-center justify-center
                  ${perfil === p.id ? 'bg-[#1a2233] text-[#34d399] border border-[#34d399]/30 shadow-md' : 'text-slate-500 hover:text-slate-300'}"
              >
                <span class="text-sm">${p.icon}</span>
                <span>${p.label}</span>
              </button>
            `)}
          </div>

          <div class="flex gap-2 items-center">
            <div class="relative flex-1">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">R$</span>
              <input 
                type="text" 
                value=${valor}
                onChange=${(e) => setValor(e.target.value)}
                placeholder="0,00"
                class="input-valor pl-8"
              />
            </div>
            <button 
              onClick=${handleSimular}
              class="bg-[#34d399] text-[#0d1117] font-bold text-sm px-6 py-3 rounded-xl shadow-lg shadow-[#34d399]/20 hover:shadow-[#34d399]/40 transition-all"
            >
              ${isAnimating ? '⚡' : 'Simular'}
            </button>
          </div>

          ${resultado && html`
            <div class="fade-up space-y-2 pt-2 border-t border-[#30363d]">
              <h3 class="text-xs font-semibold text-[#818cf8]">Divisão da Carteira • Perfil ${perfil.charAt(0).toUpperCase() + perfil.slice(1)}</h3>
              
              <div class="space-y-2">
                <div class="flex justify-between text-xs text-slate-300">
                  <span>${resultado.labels.rendaFixa}</span>
                  <span class="font-bold text-white">R$ ${resultado.rendaFixa.toFixed(2)}</span>
                </div>
                <div class="w-full bg-[#0d1117] h-1.5 rounded-full overflow-hidden">
                  <div class="h-full bg-[#34d399] rounded-full" style=${{width: '50%'}}></div>
                </div>

                <div class="flex justify-between text-xs text-slate-300 mt-2">
                  <span>${resultado.labels.fiis}</span>
                  <span class="font-bold text-[#10b981]">R$ ${resultado.fiis.toFixed(2)}</span>
                </div>
                <div class="w-full bg-[#0d1117] h-1.5 rounded-full overflow-hidden">
                  <div class="h-full bg-[#10b981] rounded-full" style=${{width: '40%'}}></div>
                </div>

                <div class="flex justify-between text-xs text-slate-300 mt-2">
                  <span>${resultado.labels.acoes}</span>
                  <span class="font-bold text-[#fbbf24]">R$ ${resultado.acoes.toFixed(2)}</span>
                </div>
                <div class="w-full bg-[#0d1117] h-1.5 rounded-full overflow-hidden">
                  <div class="h-full bg-[#fbbf24] rounded-full" style=${{width: '10%'}}></div>
                </div>
              </div>
              <p class="text-[8px] text-slate-500 mt-2 text-center">Projeção RF com Selic 14,2% a.a. (Sao vidas) • Não é recomendação.</p>
            </div>
          `}
        </div>
      `;
    }

    // ==========================================================
    // 4. AUTH (Login/Cadastro) e APP (Estrutura Principal)
    // ==========================================================
    function LoginScreen() {
      const [modo, setModo] = useState('entrar');
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [erro, setErro] = useState('');

      async function handleAuth() {
        setErro('');
        try {
          if (modo === 'entrar') {
            const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;
          } else {
            const { error } = await sbClient.auth.signUp({ email, password: senha });
            if (error) throw error;
          }
        } catch (e) {
          setErro(e.message);
        }
      }

      return html`<div class="flex items-center justify-center min-h-screen p-4"><div class="w-full max-w-sm bg-[#161b22] p-6 rounded-2xl border border-[#30363d] space-y-4 fade-up">
        <h1 class="text-xl font-bold text-[#34d399] text-center">Minhas Moedinhas</h1>
        ${erro && html`<div class="bg-red-900/30 border border-red-500/50 p-2 rounded text-xs text-red-300 text-center">${erro}</div>`}
        <input type="email" placeholder="E-mail" onChange=${e => setEmail(e.target.value)} class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-[#30363d] text-sm focus:border-[#34d399] outline-none" />
        <input type="password" placeholder="Senha" onChange=${e => setSenha(e.target.value)} class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-[#30363d] text-sm focus:border-[#34d399] outline-none" />
        <button onClick=${handleAuth} class="w-full bg-[#34d399] py-3 rounded-xl font-bold text-slate-950 hover:opacity-90 transition">${modo === 'entrar' ? 'Entrar' : 'Cadastrar'}</button>
        <button onClick=${() => { setModo(modo === 'entrar' ? 'cadastrar' : 'entrar'); setErro(''); }} class="w-full text-xs text-slate-500 underline text-center">${modo === 'entrar' ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Faça login'}</button>
      </div></div>`;
    }

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [patrimonios, setPatrimonios] = useState([]); // Usado para alimentar o gráfico

      useEffect(() => {
        sbClient.auth.getSession().then(s => {
          setUser(s.data.session?.user);
          setLoading(false);
        });
        sbClient.auth.onAuthStateChange((_, session) => setUser(session?.user));
      }, []);

      // Callback para receber dados do simulador e atualizar o gráfico
      const handleNovaSimulacao = (divisao) => {
        const total = divisao.rendaFixa + divisao.fiis + divisao.acoes;
        setPatrimonios(prev => {
          const novo = [...prev, total];
          if(novo.length > 12) novo.shift(); // Mantém apenas 12 meses de histórico
          return novo;
        });
      };

      if (loading) return html`<div class="flex items-center justify-center min-h-screen text-[#34d399]">Carregando...</div>`;
      if (!user) return html`<${LoginScreen} />`;

      return html`
        <div class="max-w-md mx-auto p-4 pb-8 space-y-5 fade-up">
          <!-- Header e Top 3 -->
          <header class="flex justify-between items-center py-2">
            <h1 class="text-lg font-extrabold text-[#34d399]">Dashboard Pro</h1>
            <button onClick=${() => sbClient.auth.signOut()} class="text-[10px] text-slate-500 hover:text-red-400 uppercase font-bold">Sair</button>
          </header>

          <section class="card-dash">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-xs font-bold text-white">🔥 Top 3 Oportunidades</h3>
              <span class="text-[10px] text-slate-500">Clique para saber mais</span>
            </div>
            <${TopOportunidades} />
          </section>

          <!-- Simulador de Aporte (Motor Principal) -->
          <${SimuladorAporte} onSimular=${handleNovaSimulacao} />

          <!-- Evolução do Patrimônio (Gráfico + Total) -->
          <section class="card-dash space-y-3">
            <div class="flex justify-between items-center">
              <h2 class="text-sm font-bold text-slate-200">Evolução do Patrimônio</h2>
              <div class="flex gap-1 bg-[#0d1117] p-1 rounded-lg border border-[#30363d]">
                <button class="px-3 py-1 bg-[#161b22] text-[10px] text-[#34d399] rounded border border-[#34d399]/20">Histórico</button>
                <button class="px-3 py-1 text-[10px] text-slate-500">12 meses</button>
              </div>
            </div>
            
            <${ChartEvolucao} valores=${patrimonios} />
            
            <div class="flex justify-between items-center pt-2 border-t border-[#30363d]">
              <span class="text-xs text-slate-400">Total acumulado</span>
              <span class="text-lg font-bold text-[#34d399]">
                R$ ${(patrimonios.length > 0 ? patrimonios[patrimonios.length-1] : 0).toFixed(2)}
              </span>
            </div>
          </section>
          
          <!-- Aviso Legal (Compliance) -->
          <div class="text-[8px] text-center text-slate-600 leading-relaxed pt-2">
            <p>Este app é uma ferramenta educacional. As simulações não constituem recomendação de compra ou venda de ativos.</p>
          </div>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
