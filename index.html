<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Educação Financeira</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* Estilos Visuais e Animações do Layout Original index.html */
    .bar-animate { transition: height 0.55s cubic-bezier(0.16, 1, 0.3, 1), width 0.55s cubic-bezier(0.16, 1, 0.3, 1); }
    .bar-proj { background: linear-gradient(to top, #818cf8cc, #a5b4fcee); }
    .bar-hist { background: #34d39980; transition: background 0.2s; }
    
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .profile-btn, .sim-btn, .auth-btn, .time-btn { transition: all 0.18s ease; }
    .profile-btn:active, .sim-btn:active, .auth-btn:active, .time-btn:active { transform: scale(0.96); }

    .auth-input { transition: border-color 0.2s, box-shadow 0.2s; }
    .auth-input:focus { outline: none; border-color: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,0.15); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    .privacy-blur { filter: blur(6px); transition: filter 0.25s ease; user-select: none; pointer-events: none; }
    
    .banner-glow {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.1), rgba(129, 140, 248, 0.1));
      border: 1px solid rgba(52, 211, 153, 0.2);
    }
  </style>
</head>
<body class="bg-[#0d1117] text-slate-100 antialiased">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useMemo } = React;
    const html = htm.bind(React.createElement);

    // Configurações do Supabase extraídas do código ativo
    const SUPABASE_URL      = 'https://gqpxxwfahnwnhklbjwxr.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_LiUY4XIO_xNS_aEqpmQlkQ_etMa1iB5';

    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ═══════════════════════════════════════════════════════════════════════════
    // 🗄️ INTEGRAÇÃO E PERSISTÊNCIA BANCO DE DADOS
    // ═══════════════════════════════════════════════════════════════════════════
    async function dbLoad(userId) {
      try {
        const { data, error } = await sbClient
          .from('portfolios')
          .select('aporte, perfil')
          .eq('user_id', userId)
          .maybeSingle();
        if (error) throw error;
        return { aporte: data?.aporte ?? null, perfil: data?.perfil ?? 'moderado' };
      } catch (err) {
        console.error('[DB] Erro ao carregar carteira:', err.message);
        return { aporte: null, perfil: 'moderado' };
      }
    }

    async function dbSave(userId, aporte, perfil) {
      try {
        const { error } = await sbClient
          .from('portfolios')
          .upsert({ user_id: userId, aporte, perfil }, { onConflict: 'user_id' });
        if (error) throw error;
      } catch (err) {
        console.error('[DB] Erro ao salvar carteira:', err.message);
      }
    }

    async function dbSaveProfile(userId, nome, whatsapp, email) {
      try {
        const { error } = await sbClient
          .from('usuarios_leads')
          .upsert({ user_id: userId, nome, whatsapp, email }, { onConflict: 'user_id' });
        if (error) throw error;
      } catch (err) {
        console.error('[DB] Erro ao salvar informações do lead:', err.message);
      }
    }

    const SELIC_FALLBACK = 10.5;

    const PERFIS = {
      conservador: {
        label: 'Conservador', emoji: '🛡️',
        alocacao: [
          { nome: 'Renda Fixa',        pct: 0.70, cor: 'text-indigo-400',  bg: 'bg-indigo-400'  },
          { nome: 'FIIs (Imobiliário)', pct: 0.20, cor: 'text-emerald-400', bg: 'bg-emerald-400' },
          { nome: 'Ações',             pct: 0.10, cor: 'text-amber-400',   bg: 'bg-amber-400'   },
        ]
      },
      moderado: {
        label: 'Moderado', emoji: '⚖️',
        alocacao: [
          { nome: 'Renda Fixa',        pct: 0.50, cor: 'text-indigo-400',  bg: 'bg-indigo-400'  },
          { nome: 'FIIs (Imobiliário)', pct: 0.40, cor: 'text-emerald-400', bg: 'bg-emerald-400' },
          { nome: 'Ações',             pct: 0.10, cor: 'text-amber-400',   bg: 'bg-amber-400'   },
        ]
      },
      arrojado: {
        label: 'Arrojado', emoji: '🚀',
        alocacao: [
          { nome: 'Renda Fixa',        pct: 0.20, cor: 'text-indigo-400',  bg: 'bg-indigo-400'  },
          { nome: 'FIIs (Imobiliário)', pct: 0.30, cor: 'text-emerald-400', bg: 'bg-emerald-400' },
          { nome: 'Ações',             pct: 0.50, cor: 'text-amber-400',   bg: 'bg-amber-400'   },
        ]
      }
    };

    function fmtBRL(v) {
      if (typeof v !== 'number' || isNaN(v)) return '0,00';
      return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // 🧠 MOTOR DE CALCULO MULTICAMINHOS
    function calcularCenáriosComparativos(aporte, perfilKey, selicAnual, meses) {
      const base = (aporte && aporte > 0) ? aporte : 0;
      if (base === 0) return { poupanca: 0, cdi: 0, carteira: 0, diferenca: 0 };
      
      const taxaMensalPoupanca = 0.0051; 
      const finalPoupanca = base * Math.pow(1 + taxaMensalPoupanca, meses);

      const taxaMensalCDI = Math.pow(1 + (selicAnual || SELIC_FALLBACK) / 100, 1 / 12) - 1;
      const finalCDI = base * Math.pow(1 + taxaMensalCDI, meses);

      const alocacao = PERFIS[perfilKey]?.alocacao || PERFIS.moderado.alocacao;
      const rentFiiMensal = 0.0065;   
      const rentAcoesMensal = 0.0095; 
      const taxaMensalCarteira = (alocacao[0].pct * taxaMensalCDI) + (alocacao[1].pct * rentFiiMensal) + (alocacao[2].pct * rentAcoesMensal);
      const finalCarteira = base * Math.pow(1 + taxaMensalCarteira, meses);

      return {
        poupanca: finalPoupanca,
        cdi: finalCDI,
        carteira: finalCarteira,
        diferenca: finalCarteira - finalPoupanca
      };
    }

    function useTickersSimulados() {
      const [tickers, setTickers] = useState({ cdi: 12.15, ibov: 126000, ifix: 3500 });
      useEffect(() => {
        const interval = setInterval(() => {
          setTickers(prev => ({
            cdi: (prev.cdi || 12.15) + (Math.random() - 0.5) * 0.01,
            ibov: (prev.ibov || 126000) + (Math.random() - 0.5) * 120,
            ifix: (prev.ifix || 3500) + (Math.random() - 0.5) * 3
          }));
        }, 6000);
        return () => clearInterval(interval);
      }, []);
      return tickers;
    }

    function Spinner({ size }) {
      return html`
        <svg class=${'spin ' + (size || 'w-5 h-5')} viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#1e293b" stroke-width="3"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
        </svg>`;
    }

    function CoinLogo({ size }) {
      return html`
        <svg width=${size || 28} height=${size || 28} viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="14" fill="#34d399" fill-opacity="0.12"/>
          <circle cx="14" cy="14" r="10" fill="#34d399" fill-opacity="0.22"/>
          <text x="14" y="18.5" text-anchor="middle" font-size="12" font-weight="800" fill="#34d399">$</text>
        </svg>`;
    }

    function TickersBar({ tickers }) {
      return html`
        <div class="flex flex-wrap justify-between gap-1 text-[9px] text-slate-400 bg-slate-800/40 px-3 py-1.5 rounded-full border border-slate-700/40 mt-1">
          <span>CDI: <strong class="text-indigo-300">${tickers.cdi.toFixed(2)}%</strong></span>
          <span>IBOV: <strong class="text-emerald-300">${Math.round(tickers.ibov).toLocaleString('pt-BR')}</strong></span>
          <span>IFIX: <strong class="text-amber-300">${Math.round(tickers.ifix).toLocaleString('pt-BR')}</strong></span>
        </div>`;
    }

    // 📊 SEÇÃO DO GRÁFICO 100% INTEGRADO AO DESIGN DO INDEX
    function GraficoComparativoCard({ resultado, perfil, selic, showValues }) {
      const [meses, setMeses] = useState(12);

      const cenarios = useMemo(() => {
        return calcularCenáriosComparativos(resultado, perfil, selic, meses);
      }, [resultado, perfil, selic, meses]);

      const maxValor = Math.max(cenarios.poupanca, cenarios.cdi, cenarios.carteira, 1);
      const pctPoup = (cenarios.poupanca / maxValor) * 100;
      const pctCdi  = (cenarios.cdi / maxValor) * 100;
      const pctCart = (cenarios.carteira / maxValor) * 100;

      return html`
        <div class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 space-y-4 shadow-xl">
          <div class="flex items-center justify-between">
            <h3 class="text-xs font-bold text-indigo-400 uppercase tracking-wider">Simulação no Tempo</h3>
            <div class="flex gap-1 bg-[#0d1117]/60 p-0.5 rounded-xl border border-slate-800">
              ${[{label:'1 Mês',v:1},{label:'6 Meses',v:6},{label:'1 Ano',v:12}].map(t => {
                const ativo = meses === t.v;
                return html`
                  <button key=${t.v} class=${`time-btn px-2 py-0.5 rounded-lg text-[9px] font-bold ${ativo ? 'bg-[#34d399] text-slate-950' : 'text-slate-400'}`} onClick=${() => setMeses(t.v)}>
                    ${t.label}
                  </button>`;
              })}
            </div>
          </div>

          <div class="space-y-3">
            <div>
              <div class="flex justify-between text-[10px] text-slate-400 mb-1">
                <span>Poupança</span>
                <span class=${showValues ? '' : 'privacy-blur'}>${resultado > 0 ? 'R$ ' + fmtBRL(cenarios.poupanca) : 'R$ 0,00'}</span>
              </div>
              <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                <div class="bar-animate h-full bg-rose-500/70" style=${{ width: (resultado > 0 ? pctPoup : 0) + '%' }}></div>
              </div>
            </div>

            <div>
              <div class="flex justify-between text-[10px] text-slate-300 mb-1">
                <span>Tesouro Selic / CDI</span>
                <span class=${showValues ? '' : 'privacy-blur'}>${resultado > 0 ? 'R$ ' + fmtBRL(cenarios.cdi) : 'R$ 0,00'}</span>
              </div>
              <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                <div class="bar-animate h-full bg-indigo-400/80" style=${{ width: (resultado > 0 ? pctCdi : 0) + '%' }}></div>
              </div>
            </div>

            <div>
              <div class="flex justify-between text-[10px] text-[#34d399] font-bold mb-1">
                <span>Sua Carteira Recomendada ✨</span>
                <span class=${showValues ? '' : 'privacy-blur'}>${resultado > 0 ? 'R$ ' + fmtBRL(cenarios.carteira) : 'R$ 0,00'}</span>
              </div>
              <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                <div class="bar-animate h-full bg-[#34d399]" style=${{ width: (resultado > 0 ? pctCart : 0) + '%' }}></div>
              </div>
            </div>
          </div>

          ${resultado > 0 && html`
            <div class="bg-[#0d1117]/60 rounded-xl p-2.5 border border-slate-800 flex items-center justify-between text-[10px]">
              <span class="text-slate-400">Rendimento extra vs Poupança:</span>
              <span class=${`font-extrabold text-[#34d399] ${showValues ? '' : 'privacy-blur'}`}>+ R$ ${fmtBRL(cenarios.diferenca)}</span>
            </div>
          `}
        </div>`;
    }

    function PerfilSelector({ perfil, onChange }) {
      return html`
        <div class="flex gap-1 bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800">
          ${['conservador','moderado','arrojado'].map(key => {
            const p = PERFIS[key];
            const ativo = perfil === key;
            return html`
              <button key=${key} type="button" class=${`profile-btn flex-1 flex flex-col items-center py-2 rounded-lg text-[10px] font-bold ${ativo ? 'bg-[#1a2233] border-[#34d399]/40 text-[#34d399] border' : 'text-slate-500'}`} onClick=${() => onChange(key)}>
                <span class="text-base mb-0.5">${p.emoji}</span>
                ${p.label}
              </button>`;
          })}
        </div>`;
    }

    function ResultadoAlocacao({ resultado, perfil, showValues }) {
      const alocacao = PERFIS[perfil]?.alocacao || PERFIS.moderado.alocacao;
      return html`
        <div class="space-y-2 pt-2">
          ${alocacao.map(a => {
            const bruto = resultado * a.pct;
            return html`
              <div key=${a.nome} class="bg-[#0d1117]/50 p-3 rounded-xl border border-slate-800 space-y-1.5">
                <div class="flex items-center justify-between text-xs">
                  <span class="text-slate-300 font-medium">${a.nome} (${Math.round(a.pct*100)}%)</span>
                  <span class=${`font-bold ${a.cor} ${showValues ? '' : 'privacy-blur'}`}>
                    ${showValues ? 'R$ ' + fmtBRL(bruto) : 'R$ ••••'}
                  </span>
                </div>
                <div class="h-1 bg-slate-800 rounded-full overflow-hidden">
                  <div class=${`h-full rounded-full progress-fill ${a.bg}`} style=${{ width: (a.pct*100)+'%' }}></div>
                </div>
              </div>`;
          })}
        </div>`;
    }

    function WhatsAppButton() {
      const textoViral = "Olha que massa esse aplicativo gratuito que estou usando para simular meus investimentos e organizar minhas metas financeiras de forma inteligente! Dá uma olhada aqui:";
      const linkApp = window.location.href;
      const urlCompleta = `https://api.whatsapp.com/send?text=${encodeURIComponent(textoViral + " " + linkApp)}`;

      return html`
        <a href=${urlCompleta} target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2 text-xs font-bold text-slate-100 bg-[#25D366]/10 border border-[#25D366]/30 hover:bg-[#25D366]/20 transition-all rounded-xl py-2.5 px-4 w-full">
          <span>📢</span> Indicar Aplicativo no WhatsApp
        </a>`;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // 🔐 TELA DE LEADS / CADASTRO E LOGIN (100% FIEL AO INDEX)
    // ═══════════════════════════════════════════════════════════════════════════
    function LoginScreen() {
      const [modo,     setModo]     = useState('entrar'); 
      const [nome,     setNome]     = useState('');
      const [whatsapp, setWhatsapp] = useState('');
      const [email,    setEmail]    = useState('');
      const [senha,    setSenha]    = useState('');
      const [erro,     setErro]     = useState('');
      const [sucesso,  setSucesso]  = useState('');
      const [loading,  setLoading]  = useState(false);

      async function handleAuth() {
        setErro(''); setSucesso('');
        if (!email || !senha || (modo === 'cadastrar' && (!nome || !whatsapp))) {
          setErro('Preencha todos os campos obrigatórios.');
          return;
        }
        setLoading(true);
        try {
          if (modo === 'entrar') {
            const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;
          } else {
            const { data, error } = await sbClient.auth.signUp({ email, password: senha });
            if (error) throw error;
            if (data?.user) {
              await dbSaveProfile(data.user.id, nome, whatsapp, email);
            }
            setSucesso('Cadastro concluído! Verifique seu e-mail para confirmação.');
          }
        } catch (err) {
          setErro(err.message);
        } finally {
          setLoading(false);
        }
      }

      return html`
        <div class="min-h-screen bg-[#0d1117] flex items-center justify-center p-4">
          <div class="w-full max-w-sm space-y-6 fade-up">
            <div class="flex flex-col items-center gap-2">
              <${CoinLogo} size=${36} />
              <h1 class="text-xl font-extrabold text-[#34d399]">Minhas Moedinhas</h1>
            </div>

            <div class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800 shadow-2xl space-y-4">
              <div class="flex bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800 gap-1">
                <button class=${`flex-1 py-1.5 rounded-lg text-xs font-bold ${modo === 'entrar' ? 'bg-[#1a2233] text-[#34d399]' : 'text-slate-500'}`} onClick=${() => setModo('entrar')}>Entrar</button>
                <button class=${`flex-1 py-1.5 rounded-lg text-xs font-bold ${modo === 'cadastrar' ? 'bg-[#1a2233] text-[#34d399]' : 'text-slate-500'}`} onClick=${() => setModo('cadastrar')}>Cadastrar</button>
              </div>

              <div class="space-y-2.5">
                ${modo === 'cadastrar' && html`
                  <input type="text" value=${nome} onChange=${e => setNome(e.target.value)} placeholder="Seu nome" class="auth-input w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-xs text-slate-100" />
                  <input type="tel" value=${whatsapp} onChange=${e => setWhatsapp(e.target.value)} placeholder="WhatsApp com DDD" class="auth-input w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-xs text-slate-100" />
                `}
                <input type="email" value=${email} onChange=${e => setEmail(e.target.value)} placeholder="seu@email.com" class="auth-input w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-xs text-slate-100" />
                <input type="password" value=${senha} onChange=${e => setSenha(e.target.value)} placeholder="Senha (mínimo 6 dígitos)" class="auth-input w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-xs text-slate-100" />
              </div>

              ${erro && html`<div class="text-[11px] text-red-400 bg-red-950/30 p-2 rounded-lg border border-red-900/40">${erro}</div>`}
              ${sucesso && html`<div class="text-[11px] text-emerald-400 bg-emerald-950/30 p-2 rounded-lg border border-emerald-900/40">${sucesso}</div>`}

              <button onClick=${() => handleAuth()} disabled=${loading} class="auth-btn w-full bg-[#34d399] text-slate-950 font-extrabold py-2 rounded-xl text-xs flex justify-center">
                ${loading ? html`<${Spinner} size="w-4 h-4" />` : modo === 'entrar' ? 'Acessar Conta' : 'Criar Conta e Investir'}
              </button>
            </div>
          </div>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // 🕹️ CONTEÚDO PRINCIPAL (100% COMBINADO SEM DISTORÇÕES)
    // ═══════════════════════════════════════════════════════════════════════════
    function MainApp({ user }) {
      const [valor,      setValor]      = useState('');
      const [resultado,  setResultado]  = useState(null);
      const [perfil,     setPerfil]     = useState('moderado');
      const [selic,      setSelic]      = useState(SELIC_FALLBACK);
      const [dbReady,    setDbReady]    = useState(false);
      const [showValues, setShowValues] = useState(true);

      const tickers = useTickersSimulados();

      useEffect(() => {
        (async () => {
          const data = await dbLoad(user.id);
          if (data.perfil) setPerfil(data.perfil);
          if (data.aporte > 0) {
            setValor(String(data.aporte));
            setResultado(data.aporte);
          }
          setDbReady(true);
        })();
      }, [user.id]);

      useEffect(() => {
        fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json')
          .then(res => res.json())
          .then(json => {
            const diaria = parseFloat(json[0]?.valor);
            if (!isNaN(diaria)) {
              setSelic(parseFloat(((Math.pow(1 + diaria / 100, 252) - 1) * 100).toFixed(2)));
            }
          }).catch(() => setSelic(SELIC_FALLBACK));
      }, []);

      const salvarEcalcular = async () => {
        const v = parseFloat(valor);
        if (isNaN(v) || v <= 0) return;
        setResultado(v);
        await dbSave(user.id, v, perfil);
      };

      if (!dbReady) {
        return html`
          <div class="min-h-screen flex items-center justify-center bg-[#0d1117]">
            <${Spinner} size="w-6 h-6" />
          </div>`;
      }

      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col space-y-4 pb-8 fade-up">
          
          <header class="flex flex-col gap-1">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <${CoinLogo} size=${22} />
                <h1 class="text-base font-extrabold text-[#34d399]">Minhas Moedinhas</h1>
              </div>
              <div class="flex items-center gap-2">
                <button onClick=${() => setShowValues(!showValues)} class="text-xs p-1">
                  ${showValues ? '👁️' : '🙈'}
                </button>
                <span class="text-[9px] bg-slate-800 px-2 py-0.5 rounded-full text-slate-400 font-semibold border border-slate-700/60">
                  Selic: ${selic.toFixed(2)}% a.a.
                </span>
                <button onClick=${() => sbClient.auth.signOut()} class="text-[9px] text-slate-500 underline">Sair</button>
              </div>
            </div>
            <${TickersBar} tickers=${tickers} />
          </header>

          <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 space-y-3 shadow-xl">
            <${PerfilSelector} perfil=${perfil} onChange=${async k => { setPerfil(k); await dbSave(user.id, parseFloat(valor)||null, k); }} />
            
            <div class="flex gap-2">
              <input type="number" value=${valor} onChange=${e => setValor(e.target.value)} placeholder="Quanto quer poupar? (R$)" class="flex-1 px-3 py-2 bg-[#0d1117] rounded-xl text-xs text-slate-100 border border-slate-700 focus:outline-none" />
              <button onClick=${salvarEcalcular} class="bg-[#34d399] text-slate-950 text-xs font-bold px-4 rounded-xl sim-btn">Simular</button>
            </div>

            ${resultado > 0 && html`<${ResultadoAlocacao} resultado=${resultado} perfil=${perfil} showValues=${showValues} />`}
          </section>

          <${GraficoComparativoCard} resultado=${resultado} perfil=${perfil} selic=${selic} showValues=${showValues} />

          <div class="banner-glow rounded-2xl p-4 text-center space-y-1.5 shadow-md">
            <p class="text-xs text-slate-200 font-medium">🚀 Pronto para sair da simulação e lucrar de verdade?</p>
            <a href="https://www.xpi.com.br/" target="_blank" rel="noopener noreferrer" class="inline-block bg-[#34d399] text-slate-950 text-[10px] font-bold py-1.5 px-6 rounded-full shadow-lg">Abrir Conta Parceira</a>
          </div>

          <${WhatsAppButton} />

          <footer class="text-center pt-2">
            <p class="text-[8px] text-slate-600">© 2026 Minhas Moedinhas · Diadema, SP</p>
          </footer>
        </div>`;
    }

    function Root() {
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);

      useEffect(() => {
        sbClient.auth.getSession().then(res => {
          setUser(res.data?.session?.user ?? false);
          setReady(true);
        });
        const { data: { subscription } } = sbClient.auth.onAuthStateChange((_ev, session) => {
          setUser(session?.user ?? false);
        });
        return () => subscription.unsubscribe();
      }, []);

      if (!ready) return html`<div class="min-h-screen bg-[#0d1117] flex items-center justify-center"><${Spinner} size="w-6 h-6" /></div>`;
      return user ? html`<${MainApp} user=${user} />` : html`<${LoginScreen} />`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root} />`);
  </script>
</body>
</html>
