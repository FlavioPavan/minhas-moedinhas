<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Dashboard Pro</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e2e8f0; }
    .chart-container { position: relative; height: 250px; width: 100%; }
    .auth-input:focus { outline: none; border-color: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,0.15); }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef } = React;
    const html = htm.bind(React.createElement);
    const sbClient = window.supabase.createClient('https://gqpxxwfahnwnhklbjwxr.supabase.co', 'sb_publishable_LiUY4XIO_xNS_aEqpmQlkQ_etMa1iB5');

    // Novo Componente de Gráfico Profissional
    function PerformanceChart() {
      const chartRef = useRef(null);
      useEffect(() => {
        const ctx = chartRef.current.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
            datasets: [
              { label: 'Sua Carteira', data: [1000, 1050, 1120, 1200, 1310, 1450], borderColor: '#34d399', backgroundColor: '#34d39922', fill: true, tension: 0.4 },
              { label: 'CDI', data: [1000, 1012, 1025, 1038, 1052, 1065], borderColor: '#818cf8', borderDash: [5, 5], tension: 0.4 },
              { label: 'IBOV', data: [1000, 990, 1040, 1020, 1090, 1120], borderColor: '#fbbf24', borderDash: [5, 5], tension: 0.4 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
            scales: { y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } }
          }
        });
        return () => chart.destroy();
      }, []);
      return html`<div class="chart-container"><canvas ref=${chartRef}></canvas></div>`;
    }

    function LoginScreen() {
      const [modo, setModo] = useState('entrar');
      const [email, setEmail] = useState(''), [senha, setSenha] = useState('');
      async function handleAuth() {
        if (modo === 'entrar') await sbClient.auth.signInWithPassword({ email, password: senha });
        else await sbClient.auth.signUp({ email, password: senha });
      }
      return html`<div class="flex items-center justify-center min-h-screen p-4"><div class="w-full max-w-sm bg-[#1a2233] p-6 rounded-2xl border border-slate-800 space-y-4">
        <h1 class="text-xl font-bold text-[#34d399]">Minhas Moedinhas</h1>
        <input type="email" placeholder="E-mail" onChange=${e => setEmail(e.target.value)} class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-sm auth-input" />
        <input type="password" placeholder="Senha" onChange=${e => setSenha(e.target.value)} class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-sm auth-input" />
        <button onClick=${handleAuth} class="w-full bg-[#34d399] py-3 rounded-xl font-bold text-slate-950">${modo === 'entrar' ? 'Entrar' : 'Cadastrar'}</button>
        <button onClick=${() => setModo(modo === 'entrar' ? 'cadastrar' : 'entrar')} class="w-full text-xs text-slate-500 underline">Alternar entre Login/Cadastro</button>
      </div></div>`;
    }

    function App() {
      const [user, setUser] = useState(null);
      useEffect(() => {
        sbClient.auth.getSession().then(s => setUser(s.data.session?.user));
        sbClient.auth.onAuthStateChange((_, session) => setUser(session?.user));
      }, []);

      if (!user) return html`<${LoginScreen} />`;

      return html`
        <div class="max-w-md mx-auto p-4 space-y-6 fade-up">
          <header class="flex justify-between items-center py-4">
            <h1 class="text-xl font-extrabold text-[#34d399]">Dashboard Pro</h1>
            <button onClick=${() => sbClient.auth.signOut()} class="text-[10px] text-slate-500 hover:text-red-400 uppercase font-bold">Sair</button>
          </header>

          <section class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800 shadow-xl">
            <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider mb-4">Performance vs Mercado</h2>
            <${PerformanceChart} />
          </section>

          <section class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800">
             <h3 class="text-xs font-bold text-slate-300 mb-2">Metodologia</h3>
             <p class="text-[10px] text-slate-400 leading-relaxed">O gráfico compara sua rentabilidade contra o CDI e IBOV, refletindo o impacto real das suas decisões financeiras.</p>
          </section>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
