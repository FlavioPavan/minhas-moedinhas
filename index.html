<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas v6.0</title>
    <link rel="icon" href="https://fav.farm/🪙" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;

        // Dados Iniciais do Simulador (Caso o banco não mude ou esteja offline)
        const INVESTIMENTOS_PADRAO = [
            { id: 1, nome: "Tesouro Selic 2027", tipo: "Tesouro Direto", valor: 5820, rentabilidade: "10.75% a.a.", risco: "Muito Baixo" },
            { id: 2, nome: "CDB 110% Liquidez Diária", tipo: "CDB / CDI", valor: 2500, rentabilidade: "11.50% a.a.", risco: "Baixo" },
            { id: 3, nome: "LCA Banco do Brasil", tipo: "LCI / LCA", valor: 3200, rentabilidade: "9.20% a.a.", risco: "Muito Baixo" },
            { id: 4, nome: "KNCR11 (Fundo de Críton)", tipo: "FIIs", valor: 3500, rentabilidade: "0.95% ao mês", risco: "Baixo" },
            { id: 5, nome: "HGLG11 (Logística)", tipo: "FIIs", valor: 1200, rentabilidade: "0.82% ao mês", risco: "Baixo" },
            { id: 6, nome: "XPLG11 (Logística)", tipo: "FIIs", valor: 1500, rentabilidade: "0.85% ao mês", risco: "Baixo" },
            { id: 7, nome: "Itaú Unibanco (ITUB4)", tipo: "Ações", valor: 1980, rentabilidade: "14.30% a.a.", risco: "Alto" },
            { id: 8, nome: "Bitcoin (BTC)", tipo: "Cripto", valor: 850, rentabilidade: "42.80% a.a.", risco: "Muito Alto" }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [isCadastro, setIsCadastro] = useState(false); // Alterna entre Login e Cadastro
            const [email, setEmail] = useState("");
            const [senha, setSenha] = useState("");
            const [erro, setErro] = useState("");
            const [loading, setLoading] = useState(false);
            
            // Estados do Simulador
            const [investimentos, setInvestimentos] = useState(INVESTIMENTOS_PADRAO);
            const [filtro, setFiltro] = useState("Todos");
            const [periodo, setPeriodo] = useState("1M");
            const [investimentoSelecionado, setInvestimentoSelecionado] = useState(INVESTIMENTOS_PADRAO[0]);

            // Configuração Supabase
            const [supabase, setSupabase] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const sbUrl = urlParams.get("url") || "https://gqpxxwfahnwnhklbjwxr.supabase.co";
                const sbKey = urlParams.get("key");

                if (sbUrl && sbKey) {
                    try {
                        const client = supabase.createClient(sbUrl, sbKey);
                        setSupabase(client);
                        
                        // Verifica sessão ativa
                        client.auth.getSession().then(({ data: { session } }) => {
                            if (session) setUser(session.user);
                        });
                    } catch (e) {
                        console.error("Erro ao inicializar Supabase:", e);
                    }
                }
            }, []);

            // Função de Autenticação Dual (Login ou Cadastro)
            const handleAutenticacao = async (e) => {
                e.preventDefault();
                setErro("");
                setLoading(true);

                if (!supabase) {
                    setErro("Chaves de API ausentes na URL. Rodando em modo de simulação local.");
                    setLoading(false);
                    // Entra em modo demonstração local se não houver Supabase configurado na URL
                    setUser({ email: email || "usuario_demonstracao@teste.com" });
                    return;
                }

                try {
                    if (isCadastro) {
                        // Fluxo de Cadastro Explicito
                        const { data, error } = await supabase.auth.signUp({ email, password: senha });
                        if (error) throw error;
                        alert("Cadastro realizado com sucesso! Verifique seu e-mail se necessário ou faça login.");
                        setIsCadastro(false);
                    } else {
                        // Fluxo de Login
                        const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
                        if (error) throw error;
                        setUser(data.user);
                    }
                } catch (err) {
                    setErro(err.message || "Erro ao processar requisição.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSair = () => {
                if (supabase) supabase.auth.signOut();
                setUser(null);
                setEmail("");
                setSenha("");
            };

            // Cálculos do Patrimônio
            const patrimonioTotal = investimentos.reduce((acc, inv) => acc + inv.valor, 0);
            const investimentosFiltrados = filtro === "Todos" ? investimentos : investimentos.filter(i => i.tipo === filtro);

            // Simulador Dinâmico de Gráfico (Gera pontos baseados no período escolhido)
            const gerarPontosGrafico = () => {
                const baseValue = investimentoSelecionado ? investimentoSelecionado.valor : patrimonioTotal;
                const pontos = { "1D": 5, "5D": 6, "1M": 7, "6M": 8, "1A": 12 };
                const totalPontos = pontos[periodo] || 7;
                
                let resultado = [];
                for (let i = 0; i < totalPontos; i++) {
                    // Adiciona uma variação randômica controlada para não ser uma linha reta
                    const oscilacao = (Math.sin(i) * 0.02) + (i * 0.01);
                    resultado.push(baseValue * (1 - (totalPontos - i) * 0.015 + oscilacao));
                }
                resultado.push(baseValue); // O último ponto é o valor atual
                return resultado;
            };

            const pontosGrafico = gerarPontosGrafico();

            if (!user) {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4' },
                    React.createElement('div', { className: 'bg-slate-900 border border-slate-800 p-8 rounded-2xl w-full max-w-md shadow-2xl' },
                        React.createElement('div', { className: 'flex flex-col items-center mb-6' },
                            React.createElement('div', { className: 'bg-emerald-500/10 p-3 rounded-full mb-2' }, '🪙'),
                            React.createElement('h1', { className: 'text-2xl font-bold' }, 'Minhas', React.createElement('span', { className: 'text-emerald-400' }, 'Moedinhas')),
                            React.createElement('p', { className: 'text-slate-400 text-sm mt-1' }, isCadastro ? 'Crie sua conta para começar' : 'Insira seus dados para sincronizar sua carteira')
                        ),
                        React.createElement('form', { onSubmit: handleAutenticacao, className: 'space-y-4' },
                            React.createElement('div', null,
                                React.createElement('label', { className: 'text-xs uppercase font-bold text-slate-400 tracking-wider' }, 'E-mail'),
                                React.createElement('input', { type: 'email', required: true, value: email, onChange: e => setEmail(e.target.value), className: 'w-full bg-slate-950 border border-slate-800 rounded-xl p-3 mt-1 text-white focus:outline-none focus:border-emerald-500' })
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: 'text-xs uppercase font-bold text-slate-400 tracking-wider' }, 'Senha'),
                                React.createElement('input', { type: 'password', required: true, value: senha, onChange: e => setSenha(e.target.value), className: 'w-full bg-slate-950 border border-slate-800 rounded-xl p-3 mt-1 text-white focus:outline-none focus:border-emerald-500' })
                            ),
                            erro && React.createElement('div', { className: 'bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl text-center' }, erro),
                            React.createElement('button', { type: 'submit', disabled: loading, className: 'w-full bg-emerald-500 hover:bg-emerald-600 font-semibold p-3 rounded-xl text-slate-950 transition duration-200' }, loading ? 'Carregando...' : isCadastro ? 'Criar Conta (Cadastrar)' : 'Entrar na Carteira'),
                            React.createElement('div', { className: 'text-center mt-4' },
                                React.createElement('button', { type: 'button', onClick: () => { setIsCadastro(!isCadastro); setErro(""); }, className: 'text-sm text-emerald-400 hover:underline focus:outline-none' }, isCadastro ? 'Já tem uma conta? Faça Login' : 'Não tem conta? Clique aqui para Cadastrar')
                            )
                        )
                    )
                );
            }

            // Dashboard Principal (Simulador / Carteira Ativa)
            return React.createElement('div', { className: 'min-h-screen p-4 md:p-8 max-w-7xl mx-auto' },
                // Header
                React.createElement('header', { className: 'flex justify-between items-center mb-8 bg-slate-900 border border-slate-800 p-4 rounded-xl' },
                    React.createElement('div', { className: 'flex items-center gap-2' },
                        React.createElement('span', { className: 'text-xl' }, '🪙'),
                        React.createElement('h1', { className: 'text-xl font-bold' }, 'Minhas', React.createElement('span', { className: 'text-emerald-400' }, 'Moedinhas'))
                    ),
                    React.createElement('div', { className: 'flex items-center gap-4' },
                        React.createElement('span', { className: 'text-sm text-slate-400 hidden sm:inline' }, user.email),
                        React.createElement('button', { onClick: handleSair, className: 'bg-red-500/10 hover:bg-red-500/20 text-red-400 text-sm px-4 p-2 rounded-lg transition' }, 'Sair')
                    )
                ),

                // Layout de Grid
                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-6' },
                    // Coluna da Esquerda e Centro (Filtros e Cards)
                    React.createElement('div', { className: 'lg:col-span-2 space-y-6' },
                        // Card de Patrimônio Total
                        React.createElement('div', { className: 'bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden' },
                            React.createElement('p', { className: 'text-slate-400 text-sm' }, 'Patrimônio Total'),
                            React.createElement('h2', { className: 'text-4xl font-black mt-1 text-white' }, `R$ ${patrimonioTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`)
                        ),

                        // Filtros de Categoria
                        React.createElement('div', { className: 'flex flex-wrap gap-2' },
                            ["Todos", "Tesouro Direto", "CDB / CDI", "LCI / LCA", "FIIs", "Ações", "Cripto"].map(cat => 
                                React.createElement('button', { key: cat, onClick: () => setFiltro(cat), className: `px-4 py-2 text-xs font-medium rounded-xl transition ${filtro === cat ? 'bg-emerald-500 text-slate-950' : 'bg-slate-900 text-slate-400 border border-slate-800 hover:border-slate-700'}` }, cat)
                            )
                        ),

                        // Lista de Investimentos
                        React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4' },
                            investimentosFiltrados.map(inv => 
                                React.createElement('div', { 
                                    key: inv.id, 
                                    onClick: () => setInvestimentoSelecionado(inv),
                                    className: `p-4 rounded-xl border cursor-pointer transition flex flex-col justify-between h-32 ${investimentoSelecionado?.id === inv.id ? 'bg-emerald-950/20 border-emerald-500' : 'bg-slate-900 border-slate-800 hover:border-slate-700'}` 
                                },
                                    React.createElement('div', { className: 'flex justify-between items-start' },
                                        React.createElement('div', null,
                                            React.createElement('h3', { className: 'font-bold text-sm text-white' }, inv.nome),
                                            React.createElement('span', { className: 'text-[10px] text-slate-500 bg-slate-950 px-2 py-0.5 rounded-full uppercase tracking-wider' }, inv.tipo)
                                        ),
                                        React.createElement('span', { className: `text-[10px] px-2 py-0.5 rounded font-bold ${inv.risco === 'Alto' || inv.risco === 'Muito Alto' ? 'bg-red-500/10 text-red-400' : 'bg-emerald-500/10 text-emerald-400'}` }, inv.risco)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between items-end mt-4' },
                                        React.createElement('span', { className: 'text-xl font-bold' }, `R$ ${inv.valor.toLocaleString('pt-BR')}`),
                                        React.createElement('span', { className: 'text-xs text-emerald-400' }, `+${inv.rentabilidade}`)
                                    )
                                )
                            )
                        )
                    ),

                    // Coluna da Direita (Gráfico Avançado e Simulador Temporal)
                    React.createElement('div', { className: 'space-y-6' },
                        React.createElement('div', { className: 'bg-slate-900 border border-slate-800 p-6 rounded-2xl flex flex-col justify-between h-96' },
                            React.createElement('div', { className: 'flex justify-between items-center' },
                                React.createElement('div', null,
                                    React.createElement('h3', { className: 'font-bold text-sm text-white' }, investimentoSelecionado ? `Histórico: ${investimentoSelecionado.nome}` : 'Histórico Consolidado'),
                                    React.createElement('p', { className: 'text-xs text-slate-400' }, 'Simulação de rendimento com oscilação mercadológica')
                                ),
                                // Seletores de Período Temporal
                                React.createElement('div', { className: 'flex gap-1 bg-slate-950 p-1 rounded-lg border border-slate-800' },
                                    ["1D", "5D", "1M", "6M", "1A"].map(p => 
                                        React.createElement('button', { key: p, onClick: () => setPeriodo(p), className: `px-2 py-1 text-[10px] font-bold rounded ${periodo === p ? 'bg-emerald-500 text-slate-950' : 'text-slate-400 hover:text-white'}` }, p)
                                    )
                                )
                            ),

                            // Área Gráfica Dinâmica (Gera linhas proporcionais aos dados do array)
                            React.createElement('div', { className: 'h-48 flex items-end justify-between gap-1 pt-6 px-2 border-b border-slate-800 relative' },
                                pontosGrafico.map((v, idx) => {
                                    const min = Math.min(...pontosGrafico);
                                    const max = Math.max(...pontosGrafico);
                                    const delta = max - min || 1;
                                    // Calcula a altura percentual de forma proporcional para fugir da linha reta estática
                                    const alturaPercentual = ((v - min) / delta) * 80 + 10; 
                                    
                                    return React.createElement('div', { key: idx, className: 'flex-1 flex flex-col items-center h-full justify-end group relative' },
                                        // Tooltip ao passar o mouse
                                        React.createElement('span', { className: 'absolute bottom-full mb-2 bg-slate-950 border border-slate-800 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap z-10 pointer-events-none' }, 
                                            `R$ ${v.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}`
                                        ),
                                        // Barra/Ponto da Linha de Tendência
                                        React.createElement('div', { 
                                            style: { height: `${alturaPercentual}%` }, 
                                            className: 'w-full bg-gradient-to-t from-emerald-500/5 to-emerald-400 rounded-t-sm group-hover:from-emerald-500/20 transition-all duration-300' 
                                        })
                                    );
                                })
                            ),

                            // Calculadora de projeção simples no rodapé do card
                            React.createElement('div', { className: 'bg-slate-950 border border-slate-800 p-3 rounded-xl flex justify-between text-xs mt-2' },
                                React.createElement('div', null,
                                    React.createElement('span', { className: 'text-slate-500 block' }, 'Projeção Mensal:'),
                                    React.createElement('span', { className: 'font-bold text-emerald-400' }, `+ R$ ${(patrimonioTotal * 0.009).toLocaleString('pt-BR', { maximumFractionDigits: 2 })}`)
                                ),
                                React.createElement('div', { className: 'text-right' },
                                    React.createElement('span', { className: 'text-slate-500 block' }, 'Projeção 1 Ano:'),
                                    React.createElement('span', { className: 'font-bold text-emerald-400' }, `+ R$ ${(patrimonioTotal * 0.11).toLocaleString('pt-BR', { maximumFractionDigits: 2 })}`)
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
