<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const DESCRITIVOS = {
      'FIIs': 'Fundos Imobiliários: Você investe em prédios e recebe o aluguel mensalmente. Ótimo para quem quer renda passiva recorrente.',
      'Renda Fixa': 'Tesouro/CDB: Você empresta dinheiro ao governo ou banco. É a forma mais segura de investir, ideal para construir sua reserva de emergência.',
      'Ações': 'Você compra um pedacinho de uma empresa. Pode valorizar muito, mas tem mais risco de oscilação.'
    };

    function App() {
      const [valorSimulado, setValorSimulado] = useState('');
      const [ativoSelecionado, setAtivoSelecionado] = useState(null);

      return (
        <div className="max-w-4xl mx-auto p-6">
          <h1 className="text-3xl font-bold text-emerald-400 mb-6">Minhas Moedinhas</h1>

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8">
            <h2 className="text-lg font-bold mb-4">Simulador de Aporte</h2>
            <div className="flex gap-4">
              <input 
                type="number" 
                placeholder="Quanto deseja investir? (R$)" 
                className="bg-slate-900 p-3 rounded-lg border border-slate-600 w-full text-white"
                onChange={(e) => setValorSimulado(e.target.value)}
              />
              <button className="bg-indigo-600 px-6 py-2 rounded-lg font-bold hover:bg-indigo-500">Simular</button>
            </div>
            {valorSimulado && (
              <p className="mt-4 text-emerald-300 text-sm">
                Simulação para R$ {valorSimulado}: Foco em segurança e crescimento consistente.
              </p>
            )}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {['FIIs', 'Renda Fixa', 'Ações'].map((item) => (
              <div 
                key={item} 
                className="bg-slate-800 p-4 rounded-xl border border-slate-700 cursor-pointer hover:border-indigo-500 transition-colors"
                onClick={() => setAtivoSelecionado(item)}
              >
                <h3 className="font-bold text-indigo-400">{item}</h3>
                <p className="text-xs text-slate-400 mt-2">Clique para entender</p>
              </div>
            ))}
          </div>

          {ativoSelecionado && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4" onClick={() => setAtivoSelecionado(null)}>
              <div className="bg-slate-800 p-6 rounded-2xl max-w-sm border border-slate-600">
                <h3 className="text-xl font-bold mb-3">{ativoSelecionado}</h3>
                <p className="text-slate-300">{DESCRITIVOS[ativoSelecionado]}</p>
                <button className="mt-6 w-full bg-slate-700 py-2 rounded-lg hover:bg-slate-600" onClick={() => setAtivoSelecionado(null)}>Fechar</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
