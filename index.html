    // ── Gera histórico dinâmico com regressão de juros compostos ─────────────
    function gerarHistoricoDinamico(aporteAtual, perfil, selicAnual) {
      const base = (aporteAtual && aporteAtual > 0) ? aporteAtual : 1000;
      const alocacao = PERFIS[perfil].alocacao;
      const rfPct = alocacao[0].pct;
      const fiiPct = alocacao[1].pct;
      const acoesPct = alocacao[2].pct;

      // Rentabilidades médias mensais (usadas para regressão)
      const taxaMensalRF = Math.pow(1 + selicAnual / 100, 1 / 12) - 1;
      const fiiMensal = 0.006;
      const acoesMensal = 0.010;

      // Rentabilidade média ponderada do portfólio (usada para regressão)
      const rentMediaMensal = rfPct * taxaMensalRF + fiiPct * fiiMensal + acoesPct * acoesMensal;

      // Nomes dos meses (últimos 6 meses)
      const meses = ['Jan','Fev','Mar','Abr','Mai','Jun'];
      const historico = [];
      let valor = base;

      // Regredimos mês a mês (do mês mais recente para o mais antigo)
      for (let i = meses.length - 1; i >= 0; i--) {
        const mes = meses[i];
        // No último mês, o valor é o base
        if (i === meses.length - 1) {
          historico.push({ mes, valor });
        } else {
          // Regredimos: valor_anterior = valor_atual / (1 + rentMediaMensal)
          valor = valor / (1 + rentMediaMensal);
          historico.push({ mes, valor });
        }
      }
      // Inverte para ficar em ordem cronológica
      return historico.reverse();
    }

    // ── Gerar projeção (12 meses) ─────────────────────────────────────────────
    function gerarProjecao(aporte, perfilObj, selicAnual) {
      const rfPct       = perfilObj.alocacao[0].pct;
      const fiiPct      = perfilObj.alocacao[1].pct;
      const acoesPct    = perfilObj.alocacao[2].pct;
      const taxaMensal  = Math.pow(1 + selicAnual / 100, 1 / 12) - 1;
      const fiiMensal   = 0.006;
      const acoesMensal = 0.010;
      const meses = ['Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar','Abr','Mai','Jun'];
      let rf = aporte * rfPct, fii = aporte * fiiPct, acoes = aporte * acoesPct;
      return meses.map(function(mes, i) {
        if (i > 0) { rf *= 1 + taxaMensal; fii *= 1 + fiiMensal; acoes *= 1 + acoesMensal; }
        return { mes, valor: rf + fii + acoes };
      });
    }

        <div class="flex gap-1.5 bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800">
          ${['conservador','moderado','arrojado'].map(function(key) {
            const p     = PERFIS[key];
            const ativo = perfil === key;
            const base  = 'profile-btn flex-1 flex flex-col items-center py-2 px-1 rounded-lg text-[10px] font-semibold cursor-pointer border ';
            const cls   = ativo
              ? 'bg-[#1a2233] border-[#34d399]/50 text-[#34d399] shadow-sm'
              : 'bg-transparent border-transparent text-slate-500 hover:text-slate-300';
            return html`
              <button key=${key} class=${base + cls} onClick=${function() { onChange(key); }}>
                <span class="text-base leading-none mb-0.5">${p.emoji}</span>
                ${p.label}
              </button>`;
          })}
        </div>`;
    }

    // ── Gráfico Bifuncional com Histórico Dinâmico ──────────────────────────
    function GraficoCard({ resultado, perfil, selic, showValues }) {
      const [modo, setModo] = useState('historico');

      // Histórico dinâmico baseado no aporte atual (ou R$ 1.000 se vazio)
      const historicoDinamico = useMemo(() => {
        return gerarHistoricoDinamico(resultado, perfil, selic);
      }, [resultado, perfil, selic]);

      const temAporte = resultado !== null && resultado > 0;
      const projecao  = temAporte ? gerarProjecao(resultado, PERFIS[perfil], selic) : [];
      const dados     = modo === 'historico' ? historicoDinamico : projecao;
      const maxVal    = dados.length > 0 ? Math.max(...dados.map(function(d) { return d.valor; })) : 1;
      const modoHist  = modo === 'historico';

      const tabBase = 'tab-btn px-3 py-1 rounded-lg text-[10px] font-semibold border ';
      const tabHCls = tabBase + (modoHist
        ? 'bg-[#34d399]/15 border-[#34d399]/40 text-[#34d399]'
        : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400');
      const tabPCls = tabBase + (!modoHist
        ? 'bg-indigo-400/15 border-indigo-400/40 text-indigo-300'
        : 'bg-transparent border-transparent text-slate-500 hover:text-slate-400');

      return html`
        <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">
              ${modoHist ? 'Evolução do Patrimônio' : 'Projeção — 12 meses'}
            </h2>
            <div class="flex gap-1 bg-[#0d1117]/50 p-0.5 rounded-lg border border-slate-800">
              <button class=${tabHCls} onClick=${function() { setModo('historico'); }}>Histórico</button>
              <button class=${tabPCls} onClick=${function() { setModo('projecao'); }}>12 meses</button>
            </div>
          </div>

          ${!modoHist && !temAporte
            ? html`
                <div class="h-24 flex flex-col items-center justify-center gap-2 border border-dashed border-slate-700/60 rounded-xl bg-[#0d1117]/30">
                  <span class="text-xl">💡</span>
                  <p class="text-[10px] text-slate-500 text-center leading-relaxed">
                    Digite um valor no simulador<br/>abaixo para ver a projeção.
                  </p>
                </div>`
            : html`
                <div class="flex items-end justify-between h-24 gap-1 px-0.5">
                  ${dados.map(function(item) {
                    const pct    = Math.max((item.valor / maxVal) * 100, 2);
                    const barCls = modoHist
                      ? 'bar-animate bar-hist w-full rounded-t-sm cursor-default hover:ring-1 hover:ring-[#34d399] hover:ring-inset'
                      : 'bar-animate bar-proj w-full rounded-t-sm cursor-default hover:ring-1 hover:ring-indigo-400 hover:ring-inset';
                    const valFmt = item.valor >= 1000
                      ? 'R$' + (item.valor / 1000).toFixed(1) + 'k'
                      : 'R$' + item.valor.toFixed(0);
                    const hSty   = { height: pct + '%', minHeight: '4px' };
                    return html`
                      <div key=${item.mes} class="bar-wrap flex flex-col items-center w-full relative">
                        <span class="bar-tooltip">${showValues ? valFmt : '••••'}</span>
                        <div class=${barCls} style=${hSty}></div>
                        <span class="text-[8px] mt-1 text-slate-600 font-medium">${item.mes}</span>
                      </div>`;
                  })}
                </div>`
          }

          <div class="mt-2 pt-2 border-t border-slate-800/60 flex items-center justify-between">
            ${modoHist
              ? html`
                  <span class="text-[9px] text-slate-500">Total acumulado</span>
                  <span class="text-sm font-bold text-[#34d399] ${showValues ? '' : 'privacy-blur'}">
                    ${showValues ? 'R$ ' + fmtBRL(historicoDinamico[historicoDinamico.length-1].valor) : 'R$ ••••'}
                  </span>`
              : temAporte
                ? html`
                    <span class="text-[9px] text-slate-500">Projeção em 12 meses</span>
                    <span class="text-sm font-bold text-indigo-300 ${showValues ? '' : 'privacy-blur'}">
                      ${showValues ? 'R$ ' + fmtBRL(projecao[projecao.length-1].valor) : 'R$ ••••'}
                    </span>`
                : html`<span></span>`
            }
          </div>
        </section>`;
    }

    // ── Resultado da Alocação ─────────────────────────────────────────────────
    function ResultadoAlocacao({ resultado, perfil, selic, selicIsLive, selicLoading, showValues }) {
      const alocacao   = PERFIS[perfil].alocacao;
      const rfItem     = alocacao[0];
      const rendMensal = (resultado * rfItem.pct * selic / 100) / 12;

      return html`
        <div class="space-y-2.5">
          <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">
            Divisão da carteira · Perfil ${PERFIS[perfil].emoji} ${PERFIS[perfil].label}
          </p>
          ${alocacao.map(function(a) {
            const bruto    = resultado * a.pct;
            const pctLabel = Math.round(a.pct * 100);
            const isRF     = a === rfItem;
            const wSty     = { width: (a.pct * 100) + '%' };
            const displayBruto = showValues ? 'R$ ' + fmtBRL(bruto) : 'R$ ••••';
            return html`
              <div key=${a.nome} class="bg-[#0d1117]/70 p-3.5 rounded-xl border border-slate-800 space-y-2">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2 min-w-0">
                    <div class=${'w-1.5 h-6 rounded-full flex-shrink-0 opacity-80 ' + a.bg}></div>
                    <div class="min-w-0">
                      <p class="text-xs text-slate-300 font-medium">${a.nome} (${pctLabel}%)</p>
                      ${isRF && !selicLoading && html`
                        <p class="text-[9px] text-slate-500 mt-0.5 ${showValues ? '' : 'privacy-blur'}">
                          ${showValues ? '≈ R$ ' + rendMensal.toFixed(2) + '/mês em juros' : '≈ R$ ••••/mês'}
                          ${!selicIsLive ? ' · média' : ''}
                        </p>`}
                    </div>
                  </div>
                  <span class=${'font-bold text-sm flex-shrink-0 ' + a.cor}>${displayBruto}</span>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                  <div class=${'h-full rounded-full progress-fill ' + a.bg} style=${wSty}></div>
                </div>
              </div>`;
          })}
          <p class="text-[9px] text-slate-600 text-center pt-1">
            Projeção RF com Selic ${selic.toFixed(1)}% a.a.
            ${selicIsLive ? ' (ao vivo)' : ' (média de mercado)'}
            · Não é recomendação de investimento.
          </p>
        </div>`;
    }

    // ── Componente "Meus Sonhos" ──────────────────────────────────────────────
    function SonhosCard() {
      const [nome, setNome] = useState('');
      const [valorTotal, setValorTotal] = useState('');
      const [guardarMensal, setGuardarMensal] = useState('');
      const [meses, setMeses] = useState(null);
      const [calculado, setCalculado] = useState(false);

      function calcular() {
        const total = parseFloat(valorTotal);
        const mensal = parseFloat(guardarMensal);
        if (!nome.trim() || isNaN(total) || total <= 0 || isNaN(mensal) || mensal <= 0) {
          setMeses(null);
          setCalculado(false);
          return;
        }
        const m = Math.ceil(total / mensal);
        setMeses(m);
        setCalculado(true);
      }

      return html`
        <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl space-y-3">
          <div class="flex items-center gap-2">
            <span class="text-lg">🎯</span>
            <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Meus Sonhos</h2>
          </div>
          <div class="space-y-2">
            <input
              type="text"
              value=${nome}
              onChange=${function(e) { setNome(e.target.value); setCalculado(false); }}
              placeholder="Nome do sonho (ex: Trocar pneus)"
              class="w-full px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-xs"
            />
            <div class="flex gap-2">
              <input
                type="number"
                value=${valorTotal}
                onChange=${function(e) { setValorTotal(e.target.value); setCalculado(false); }}
                placeholder="Valor total (R$)"
                min="0"
                step="any"
                class="w-1/2 px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-xs"
              />
              <input
                type="number"
                value=${guardarMensal}
                onChange=${function(e) { setGuardarMensal(e.target.value); setCalculado(false); }}
                placeholder="Guardar por mês (R$)"
                min="0"
                step="any"
                class="w-1/2 px-3 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-xs"
              />
            </div>
            <button
              onClick=${calcular}
              class="w-full bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 text-xs font-bold py-2 rounded-xl transition-colors"
            >
              Calcular tempo
            </button>
            ${calculado && meses !== null && html`
              <div class="text-center text-xs text-slate-300 bg-[#0d1117]/50 p-2 rounded-xl border border-slate-700/40">
                <p>
                  Faltam <strong class="text-[#34d399]">${meses} ${meses === 1 ? 'mês' : 'meses'}</strong>
                  para você realizar o sonho de <strong class="text-slate-100">${nome}</strong>!
                  Você consegue! 💪
                </p>
              </div>
            `}
          </div>
        </section>`;
    }

    // ── Componente Gerenciador de Moedinhas (Fluxo) ──────────────────────────
    function FluxoCaixa({ setValorSimulador }) {
      const [entrou, setEntrou] = useState('');
      const [saiu, setSaiu] = useState('');
      const [sobra, setSobra] = useState(null);

      function atualizarSobra() {
        const e = parseFloat(entrou) || 0;
        const s = parseFloat(saiu) || 0;
        const diff = e - s;
        setSobra(diff);
        if (diff > 0) {
          setValorSimulador(String(diff));
        } else {
          setValorSimulador('');
        }
      }

      return html`
        <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl space-y-3">
          <div class="flex items-center gap-2">
            <span class="text-lg">🪙</span>
            <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Gerenciador de Moedinhas</h2>
          </div>
          <div class="space-y-2">
            <div class="flex gap-2">
              <div class="relative flex-1">
                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-[10px] select-none">+</span>
                <input
                  type="number"
                  value=${entrou}
                  onChange=${function(e) { setEntrou(e.target.value); setSobra(null); }}
                  placeholder="Entrou"
                  min="0"
                  step="any"
                  class="w-full pl-6 pr-2 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-xs"
                />
              </div>
              <div class="relative flex-1">
                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-[10px] select-none">-</span>
                <input
                  type="number"
                  value=${saiu}
                  onChange=${function(e) { setSaiu(e.target.value); setSobra(null); }}
                  placeholder="Saiu"
                  min="0"
                  step="any"
                  class="w-full pl-6 pr-2 py-2 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-xs"
                />
              </div>
              <button
                onClick=${atualizarSobra}
                class="bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 text-xs font-bold px-3 py-2 rounded-xl transition-colors"
              >
                Atualizar
              </button>
            </div>
            ${sobra !== null && html`
              <div class="text-center text-xs text-slate-300 bg-[#0d1117]/50 p-2 rounded-xl border border-slate-700/40">
                <p>
                  Sobra do mês: <strong class=${sobra >= 0 ? 'text-[#34d399]' : 'text-red-400'}>
                    ${sobra >= 0 ? 'R$ ' + fmtBRL(sobra) : '-R$ ' + fmtBRL(Math.abs(sobra))}
                  </strong>
                  ${sobra > 0 ? ' 🎉' : sobra < 0 ? ' 😅' : ''}
                </p>
              </div>
            `}
          </div>
        </section>`;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // 🔐  TELA DE LOGIN
    // ═══════════════════════════════════════════════════════════════════════════
    function LoginScreen() {
      const [modo,    setModo]    = useState('entrar'); // 'entrar' | 'cadastrar'
      const [email,   setEmail]   = useState('');
      const [senha,   setSenha]   = useState('');
      const [erro,    setErro]    = useState('');
      const [sucesso, setSucesso] = useState('');
      const [loading, setLoading] = useState(false);

      function limpar() { setErro(''); setSucesso(''); }

      async function handleEntrar() {
        if (!email || !senha) { setErro('Preencha e-mail e senha.'); return; }
        setLoading(true); limpar();
        const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
        if (error) { setErro(traduzirErro(error.message)); setLoading(false); }
      }

      async function handleCadastrar() {
        if (!email || !senha) { setErro('Preencha e-mail e senha.'); return; }
        setLoading(true); limpar();
        const { error } = await sbClient.auth.signUp({ email, password: senha });
        if (error) { setErro(traduzirErro(error.message)); }
        else { setSucesso('Conta criada! Verifique seu e-mail para confirmar o cadastro.'); }
        setLoading(false);
      }

      async function handleGoogle() {
        setLoading(true); limpar();
        const { error } = await sbClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin },
        });
        if (error) { setErro(traduzirErro(error.message)); setLoading(false); }
      }

      function onKey(e) {
        if (e.key !== 'Enter') return;
        if (modo === 'entrar') handleEntrar(); else handleCadastrar();
      }

      const isCad    = modo === 'cadastrar';
      const tabBase  = 'flex-1 py-2 rounded-lg text-xs font-bold transition-all ';
      const tabAtivo = tabBase + 'bg-[#1a2233] text-[#34d399] border border-[#34d399]/30 shadow-sm';
      const tabOff   = tabBase + 'text-slate-500 hover:text-slate-300';

      return html`
        <div class="min-h-screen bg-[#0d1117] flex items-center justify-center p-4">
          <div class="w-full max-w-sm fade-up">

            <!-- Marca -->
            <div class="flex flex-col items-center mb-8 gap-3">
              <div class="w-16 h-16 rounded-2xl bg-[#1a2233] border border-slate-800 flex items-center justify-center shadow-xl">
                <${CoinLogo} size=${38} />
              </div>
              <div class="text-center">
                <h1 class="text-2xl font-extrabold text-[#34d399] tracking-tight">Minhas Moedinhas</h1>
                <p class="text-xs text-slate-500 mt-1">Sua jornada para a autonomia financeira.</p>
              </div>
            </div>

            <!-- Card -->
            <div class="bg-[#1a2233] rounded-2xl border border-slate-800 shadow-2xl p-6 space-y-4">

              <!-- Abas Entrar / Criar Conta -->
              <div class="flex bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800 gap-1">
                <button class=${!isCad ? tabAtivo : tabOff} onClick=${function() { setModo('entrar'); limpar(); }}>
                  Entrar
                </button>
                <button class=${isCad ? tabAtivo : tabOff} onClick=${function() { setModo('cadastrar'); limpar(); }}>
                  Criar Conta
                </button>
              </div>

              <!-- Campos -->
              <div class="space-y-3">
                <div class="space-y-1.5">
                  <label class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">E-mail</label>
                  <input
                    type="email"
                    value=${email}
                    onChange=${function(e) { setEmail(e.target.value); limpar(); }}
                    onKeyDown=${onKey}
                    placeholder="voce@email.com"
                    autocomplete="email"
                    class="auth-input w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm"
                  />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Senha</label>
                  <input
                    type="password"
                    value=${senha}
                    onChange=${function(e) { setSenha(e.target.value); limpar(); }}
                    onKeyDown=${onKey}
                    placeholder="••••••••"
                    autocomplete=${isCad ? 'new-password' : 'current-password'}
                    class="auth-input w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm"
                  />
                  ${isCad && html`<p class="text-[9px] text-slate-600 mt-0.5">Mínimo de 6 caracteres.</p>`}
                </div>
              </div>

              <!-- Mensagem de erro -->
              ${erro && html`
                <div class="flex items-start gap-2 bg-red-950/50 border border-red-800/50 rounded-xl px-3.5 py-3">
                  <svg class="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                  </svg>
                  <p class="text-xs text-red-300">${erro}</p>
                </div>`}

              <!-- Mensagem de sucesso (cadastro) -->
              ${sucesso && html`
                <div class="flex items-start gap-2 bg-emerald-950/50 border border-emerald-800/50 rounded-xl px-3.5 py-3">
                  <svg class="w-4 h-4 text-emerald-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                  <p class="text-xs text-emerald-300">${sucesso}</p>
                </div>`}

              <!-- Botão principal (Entrar / Criar conta) -->
              <button
                onClick=${isCad ? handleCadastrar : handleEntrar}
                disabled=${loading}
                class="auth-btn w-full flex items-center justify-center gap-2 bg-[#34d399] hover:bg-[#6ee7b7] disabled:opacity-60 disabled:cursor-not-allowed text-slate-950 font-bold py-3.5 rounded-xl text-sm"
              >
                ${loading
                  ? html`<${Spinner} size="w-4 h-4" />`
                  : isCad ? 'Criar minha conta' : 'Entrar na minha conta'
                }
              </button>

              <!-- Separador + Google OAuth -->
              <div class="flex items-center gap-3">
                <div class="h-px flex-1 bg-slate-800"></div>
                <span class="text-[10px] text-slate-600 font-medium">ou continue com</span>
                <div class="h-px flex-1 bg-slate-800"></div>
              </div>
              <button
                onClick=${handleGoogle}
                disabled=${loading}
                class="google-btn w-full flex items-center justify-center gap-2.5 bg-[#0d1117] border border-slate-700 text-slate-200 font-semibold py-3 rounded-xl text-sm disabled:opacity-50"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar com Google
              </button>

            </div>

            <p class="text-[9px] text-slate-700 text-center mt-5 leading-relaxed">
              Ao continuar você concorda com os termos de uso.<br/>
              Seus dados são protegidos e nunca compartilhados.
            </p>
          </div>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // 🏠  APP PRINCIPAL
    // ═══════════════════════════════════════════════════════════════════════════
    function MainApp({ user, onboardingSeen, setOnboardingSeen }) {
      const [valor,        setValor]        = useState('');
      const [resultado,    setResultado]    = useState(null);
      const [perfil,       setPerfil]       = useState('moderado');
      const [perfilChanged, setPerfilChanged] = useState(false);
      const [openCard,     setOpenCard]     = useState(null);
      const [selic,        setSelic]        = useState(SELIC_FALLBACK);
      const [selicIsLive,  setSelicIsLive]  = useState(false);
      const [selicLoading, setSelicLoading] = useState(true);
      const [dbReady,      setDbReady]      = useState(false);
      const [saving,       setSaving]       = useState(false);
      const [showValues,   setShowValues]   = useState(true);

      const tickers = useTickersSimulados();

      // ── Carrega portfolio ao montar ───────────────────────────────────────
      useEffect(function() {
        (async function() {
          const data = await dbLoad(user.id);
          if (data.perfil && PERFIS[data.perfil]) setPerfil(data.perfil);
          if (data.aporte !== null && !isNaN(data.aporte) && data.aporte > 0) {
            setValor(String(data.aporte));
            setResultado(data.aporte);
          }
          setDbReady(true);
        })();
      }, [user.id]);

      // ── Selic ao vivo ─────────────────────────────────────────────────────
      useEffect(function() {
        var ctrl = new AbortController();
        var tid  = setTimeout(function() { ctrl.abort(); }, 5000);
        (async function() {
          try {
            var res  = await fetch(
              'https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json',
              { signal: ctrl.signal }
            );
            if (!res.ok) throw new Error('HTTP ' + res.status);
            var json = await res.json();
            var d = parseFloat(json[0]?.valor);
            if (isNaN(d)) throw new Error('inválido');
            setSelic(parseFloat(((Math.pow(1 + d / 100, 252) - 1) * 100).toFixed(2)));
            setSelicIsLive(true);
          } catch (_) {
            setSelic(SELIC_FALLBACK);
            setSelicIsLive(false);
          } finally {
            clearTimeout(tid);
            setSelicLoading(false);
          }
        })();
        return function() { ctrl.abort(); clearTimeout(tid); };
      }, []);

      // ── Simular ───────────────────────────────────────────────────────────
      var calcular = useCallback(async function() {
        var v = parseFloat(valor);
        if (isNaN(v) || v <= 0) return;
        setResultado(v);
        setSaving(true);
        await dbSave(user.id, v, perfil);
        setSaving(false);
      }, [valor, perfil, user.id]);

      // ── Mudar perfil ──────────────────────────────────────────────────────
      async function handlePerfilChange(key) {
        setPerfil(key);
        setPerfilChanged(true);
        var v = parseFloat(valor);
        setSaving(true);
        await dbSave(user.id, isNaN(v) ? null : v, key);
        setSaving(false);
      }

      function handleKeyDown(e) { if (e.key === 'Enter') calcular(); }
      function toggleCard(id)   { setOpenCard(function(p) { return p === id ? null : id; }); }

      // Loading do DB
      if (!dbReady) {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center gap-3 bg-[#0d1117]">
            <${Spinner} size="w-7 h-7" />
            <p class="text-xs text-slate-500">Carregando sua carteira…</p>
          </div>`;
      }

      var emailCurto = user.email ? user.email.split('@')[0] : 'investidor';
      var hasAporte = resultado !== null && resultado > 0;
      var hasHighAporte = resultado !== null && resultado > 100;

      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col space-y-5 pb-10 fade-up">

          <!-- HEADER -->
          <header class="pt-5 flex flex-col gap-2">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2">
                  <${CoinLogo} size=${26} />
                  <h1 class="text-2xl font-extrabold text-[#34d399] tracking-tight">Minhas Moedinhas</h1>
                </div>
                <p class="text-xs text-slate-500 mt-1 ml-8 truncate">Olá, ${emailCurto} 👋</p>
              </div>
              <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
                <div class="flex items-center gap-2">
                  <button
                    onClick=${function() { setShowValues(!showValues); }}
                    class="text-slate-400 hover:text-[#34d399] transition-colors p-1.5 rounded-full hover:bg-slate-800/50"
                    aria-label=${showValues ? 'Ocultar valores' : 'Mostrar valores'}
                  >
                    ${showValues ? '👁️' : '🙈'}
                  </button>
                  <${SelicBadge} selic=${selic} isLive=${selicIsLive} loading=${selicLoading} />
                </div>
                <button
                  onClick=${function() { sbClient.auth.signOut(); }}
                  class="signout-btn flex items-center gap-1 text-[10px] text-slate-600 px-2.5 py-1 rounded-full border border-slate-800/80"
                >
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
                  </svg>
                  Sair
                </button>
              </div>
            </div>
            <${TickersBar} tickers=${tickers} />
          </header>

          <!-- CONQUISTAS -->
          <${Conquistas} hasAporte=${hasAporte} perfilChanged=${perfilChanged} hasHighAporte=${hasHighAporte} />

          <!-- SIMULADOR -->
          <section class="bg-[#1a2233] p-5 rounded-2xl border border-slate-800 shadow-xl space-y-4">
            <div class="flex items-center justify-between">
              <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Simulador de Aporte</h2>
              <div class="flex items-center gap-2">
                ${saving && html`<${Spinner} size="w-3 h-3" />`}
                ${!selicLoading && html`<span class="text-[9px] text-slate-600">Selic ${selic.toFixed(1)}% a.a.</span>`}
              </div>
            </div>

            <${PerfilSelector} perfil=${perfil} onChange=${handlePerfilChange} />

            <div class="flex gap-2">
              <div class="relative flex-1">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-semibold select-none">R$</span>
                <input
                  type="number"
                  value=${valor}
                  onChange=${function(e) { setValor(e.target.value); }}
                  onKeyDown=${handleKeyDown}
                  placeholder="0,00"
                  min="0"
                  step="any"
                  class="w-full pl-10 pr-3 py-3 bg-[#0d1117] rounded-xl border border-slate-700 focus:outline-none focus:border-[#34d399] text-slate-100 placeholder-slate-600 text-sm transition-colors"
                />
              </div>
              <button onClick=${calcular} class="sim-btn bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 px-5 rounded-xl font-bold text-sm">
                Simular
              </button>
            </div>

            ${resultado !== null && html`
              <${ResultadoAlocacao}
                resultado=${resultado}
                perfil=${perfil}
                selic=${selic}
                selicIsLive=${selicIsLive}
                selicLoading=${selicLoading}
                showValues=${showValues}
              />`}
          </section>

          <!-- GRÁFICO (movido para baixo do simulador) -->
          <${GraficoCard} resultado=${resultado} perfil=${perfil} selic=${selic} showValues=${showValues} />

          <!-- GERENCIADOR DE MOEDINHAS -->
          <${FluxoCaixa} setValorSimulador=${setValor} />

          <!-- MEUS SONHOS -->
          <${SonhosCard} />

          <!-- BANNER DE MONETIZAÇÃO -->
          <${MonetizationBanner} />

          <!-- OPORTUNIDADES DINÂMICAS POR PERFIL -->
          <section class="space-y-3">
            <div class="flex items-center justify-between px-1">
              <h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">🔥 Top 3 Oportunidades</h2>
              <span class="text-[9px] text-slate-600">Clique para saber mais</span>
            </div>
            ${PERFIS[perfil].oportunidades.map(function(op) {
              return html`
                <${OportunidadeCard}
                  key=${op.id}
                  op=${op}
                  isOpen=${openCard === op.id}
                  onToggle=${function() { toggleCard(op.id); }}
                />`;
            })}
          </section>

          <!-- FOOTER -->
          <footer class="pt-4 text-center border-t border-slate-800/60 space-y-2">
            <div class="flex justify-center">
              <${WhatsAppButton} />
            </div>
            <p class="text-[9px] text-slate-600 leading-relaxed max-w-xs mx-auto">
              <strong class="text-slate-500">Aviso Legal:</strong> O <em>Minhas Moedinhas</em> é uma ferramenta educativa e não configura recomendação de investimento. Rentabilidade passada não garante retorno futuro.
            </p>
            <p class="text-[8px] text-slate-700">© 2025 Minhas Moedinhas · Feito com 💚 no Brasil</p>
          </footer>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // 🏗️  ROOT — orquestra sessão, onboarding e decide qual tela renderizar
    // ═══════════════════════════════════════════════════════════════════════════
    function Root() {
      var [user,      setUser]      = useState(null);
      var [authReady, setAuthReady] = useState(false);
      var [onboardingSeen, setOnboardingSeen] = useState(false);

      useEffect(function() {
        // Verifica se o onboarding já foi visto
        const seen = localStorage.getItem('onboarding_visto') === 'true';
        setOnboardingSeen(seen);

        // 1) Lê sessão existente
        sbClient.auth.getSession().then(function(res) {
          setUser(res.data?.session?.user ?? false);
          setAuthReady(true);
        });

        // 2) Escuta mudanças em tempo real
        var sub = sbClient.auth.onAuthStateChange(function(_event, session) {
          setUser(session?.user ?? false);
          setAuthReady(true);
        });

        return function() {
          var subscription = sub?.data?.subscription ?? sub;
          if (subscription && typeof subscription.unsubscribe === 'function') {
            subscription.unsubscribe();
          }
        };
      }, []);

      function handleOnboardingComplete() {
        localStorage.setItem('onboarding_visto', 'true');
        setOnboardingSeen(true);
      }

      if (!authReady) {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center gap-3 bg-[#0d1117]">
            <${Spinner} size="w-8 h-8" />
            <p class="text-xs text-slate-500">Carregando…</p>
          </div>`;
      }

      if (!user) return html`<${LoginScreen} />`;

      // Se o usuário ainda não viu o onboarding, mostramos o modal sobreposto ao MainApp
      return html`
        <${MainApp} user=${user} onboardingSeen=${onboardingSeen} setOnboardingSeen=${setOnboardingSeen} />
        ${!onboardingSeen && html`<${OnboardingModal} onComplete=${handleOnboardingComplete} />`}
      `;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // 🚀  INICIALIZAÇÃO DO REACT
    // ═══════════════════════════════════════════════════════════════════════════
    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root} />`);
  </script>
</body>
</html>
