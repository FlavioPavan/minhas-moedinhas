<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas</title>
  <script crossorigin integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin integrity="sha384-toVdrLSMaw7Y55MowcKqkmFL/Ek6Sky62NOk0b5sDDZBu2wcoPyyQUt9unDVjXhL" src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <div id="root"></div>

  <script>
    const { useState } = React;
    const html = htm.bind(React.createElement);

    const HISTORICO = [
      { mes: 'Jan', valor: 4000 },
      { mes: 'Fev', valor: 5500 },
      { mes: 'Mar', valor: 8200 },
      { mes: 'Abr', valor: 12000 },
      { mes: 'Mai', valor: 15500 },
      { mes: 'Jun', valor: 20550 },
    ];
    const MAX_VALOR = Math.max(...HISTORICO.map((h) => h.valor));

    const ALOCACAO = [
      { nome: 'FIIs', pct: 0.4 },
      { nome: 'Renda Fixa', pct: 0.5 },
      { nome: 'Ações', pct: 0.1 },
    ];

    function App() {
      const [valor, setValor] = useState('');
      const [resultado, setResultado] = useState(null);

      const calcular = () => {
        const v = parseFloat(valor);
        if (Number.isNaN(v) || v <= 0) return;
        setResultado(v);
      };

      return html`
        <div className="max-w-4xl mx-auto p-6">
          <h1 className="text-3xl font-bold text-emerald-400 mb-6">Minhas Moedinhas</h1>

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8">
            <h2 className="text-lg font-bold mb-6 text-indigo-400">Evolução do Patrimônio</h2>
            <div className="flex items-end justify-between h-40 gap-4 px-2 border-b border-l border-slate-700 pb-2">
              ${HISTORICO.map((item) => html`
                <div key=${item.mes} className="flex flex-col items-center group w-full relative">
                  <div
                    className="w-full min-w-[30px] bg-emerald-500 rounded-t-sm hover:bg-emerald-300 transition-all cursor-pointer"
                    style=${{ height: `${(item.valor / MAX_VALOR) * 100}%` }}
                    title=${'R$ ' + item.valor.toLocaleString('pt-BR')}
                  ></div>
                  <span className="text-xs mt-2 text-slate-400 group-hover:text-emerald-400 font-bold">${item.mes}</span>
                </div>
              `)}
            </div>
          </div>

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8">
            <h2 className="text-lg font-bold mb-4">Simulador de Aporte</h2>
            <div className="flex gap-2">
              <input
                type="number"
                min="0"
                value=${valor}
                onChange=${(e) => setValor(e.target.value)}
                onKeyDown=${(e) => e.key === 'Enter' && calcular()}
                placeholder="Valor (R$)"
                className="w-full p-3 bg-slate-950 rounded-lg border border-slate-600 focus:outline-none focus:border-emerald-500"
              />
              <button
                onClick=${calcular}
                className="bg-indigo-600 px-6 rounded-lg font-bold hover:bg-indigo-500 transition-colors"
              >Simular</button>
            </div>

            ${resultado !== null && html`
              <div className="mt-4 p-4 bg-slate-900 rounded-lg text-sm grid grid-cols-3 gap-2 text-center border border-slate-700 animate-in fade-in duration-500">
                ${ALOCACAO.map((a) => html`
                  <div key=${a.nome}>
                    <p className="text-slate-400 text-xs">${a.nome} (${a.pct * 100}%)</p>
                    <p className="font-bold text-emerald-400">R$ ${(resultado * a.pct).toFixed(2)}</p>
                  </div>
                `)}
              </div>
            `}
          </div>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
