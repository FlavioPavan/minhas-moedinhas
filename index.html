    .pulse-dot { animation: pulse-ring 2s cubic-bezier(0.455,0.03,0.515,0.955) infinite; }
    @keyframes pulse-ring { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .progress-fill { transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
    .card-glow:hover { box-shadow: 0 0 0 1px #34d39933, 0 8px 28px #34d39914; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .profile-btn, .sim-btn, .tab-btn, .auth-btn, .google-btn, .signout-btn, .whatsapp-btn { transition: all 0.18s ease; }
    .profile-btn:hover, .sim-btn:hover, .auth-btn:hover, .google-btn:hover, .whatsapp-btn:hover { transform: translateY(-1px); }
    .profile-btn:active, .sim-btn:active, .auth-btn:active, .google-btn:active, .whatsapp-btn:active { transform: scale(0.97); }
    .auth-input { transition: border-color 0.2s, box-shadow 0.2s; }
    .auth-input:focus { outline: none; border-color: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,0.15); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    .privacy-blur { filter: blur(6px); transition: filter 0.25s ease; user-select: none; pointer-events: none; }
    .modal-overlay { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(8px); animation: fadeUp 0.3s ease forwards; }
    .banner-glow { background: linear-gradient(135deg, rgba(52, 211, 153, 0.12), rgba(129, 140, 248, 0.12)); border: 1px solid rgba(52, 211, 153, 0.25); transition: all 0.3s ease; }
    .banner-glow:hover { border-color: rgba(52, 211, 153, 0.5); box-shadow: 0 0 24px rgba(52, 211, 153, 0.08); }
    .badge-off { filter: grayscale(1); opacity: 0.4; transition: all 0.4s ease; }
    .badge-on { filter: grayscale(0); opacity: 1; transition: all 0.4s ease; }
    .badge-pulse { animation: pulse-badge 1.5s ease-in-out infinite; }
    @keyframes pulse-badge { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>

<body class="bg-[#0d1117] text-slate-100 antialiased">
  <div id="root"></div>
  <script>
    /* ════════ CONFIGURAÇÃO GLOBAL E SUPABASE ════════ */
    const { useState, useEffect, useCallback } = React;
    const html = htm.bind(React.createElement);
    const SUPABASE_URL = 'https://gqpxxwfahnwnhklbjwxr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcHh4d2ZhaG53bmhrbGJqd3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjYyNjEsImV4cCI6MjA5NzI0MjI2MX0.ntq4ABMCXOhvjI-yU5XH7bclEGMVY0_72Admuid1Zn4';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const SELIC_FALLBACK = 10.5;

    function fmtBRL(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function traduzirErro(msg) {
      if (!msg) return 'Ocorreu um erro.';
      if (msg.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
      if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail.';
      if (msg.includes('User already registered')) return 'Este e-mail já possui cadastro.';
      if (msg.includes('Password should be')) return 'A senha deve ter pelo menos 6 caracteres.';
      return msg;
    }

    /* ════════ CAMADA DE DADOS ════════ */
    async function dbLoad(userId) {
      const { data, error } = await sbClient.from('portfolios').select('aporte, perfil').eq('user_id', userId).maybeSingle();
      if (error) return { aporte: null, perfil: 'moderado' };
      return { aporte: data?.aporte ?? null, perfil: data?.perfil ?? 'moderado' };
    }
    async function dbSave(userId, aporte, perfil) {
      await sbClient.from('portfolios').upsert({ user_id: userId, aporte, perfil }, { onConflict: 'user_id' });
    }
    async function carregarTransacoes(userId) {
      const { data, error } = await sbClient.from('transacoes').select('*').eq('user_id', userId);
      if (error) return [];
      return data || [];
    }
    async function salvarTransacao(userId, descricao, valor, tipo) {
      await sbClient.from('transacoes').insert({ user_id: userId, descricao: descricao.trim(), valor: parseFloat(valor), tipo });
    }
    async function deletarTransacao(id) {
      await sbClient.from('transacoes').delete().eq('id', id);
    }

    /* ════════ DADOS ESTÁTICOS ════════ */
    const PERFIS = {
      conservador: {
        label: 'Conservador', emoji: '🛡️',
        alocacao: [
          { nome: 'Renda Fixa', pct: 0.70, cor: 'text-indigo-400', bg: 'bg-indigo-400' },
          { nome: 'FIIs', pct: 0.20, cor: 'text-emerald-400', bg: 'bg-emerald-400' },
          { nome: 'Ações', pct: 0.10, cor: 'text-amber-400', bg: 'bg-amber-400' }
        ],
        oportunidades: [
          { id: 'tesouro-selic', emoji: '🏛️', titulo: 'Tesouro Selic 2029', tag: 'Renda Fixa · Risco Baixíssimo', tagColor: 'bg-indigo-900/60 text-indigo-300 border border-indigo-700/40', desc: 'O título público mais seguro. Ideal para reserva de emergência.' },
          { id: 'cdb-105', emoji: '🏦', titulo: 'CDB 105% do CDI', tag: 'Renda Fixa · Risco Baixo', tagColor: 'bg-indigo-900/60 text-indigo-300 border border-indigo-700/40', desc: 'Certificado de Depósito com 105% do CDI e proteção do FGC.' },
          { id: 'lci-lca', emoji: '🏛️', titulo: 'LCI/LCA de Bancão', tag: 'Renda Fixa · Risco Baixo', tagColor: 'bg-indigo-900/60 text-indigo-300 border border-indigo-700/40', desc: 'Letras de Crédito Imobiliário e do Agronegócio, com isenção de IR.' }
        ]
      },
      moderado: {
        label: 'Moderado', emoji: '⚖️',
        alocacao: [
          { nome: 'Renda Fixa', pct: 0.50, cor: 'text-indigo-400', bg: 'bg-indigo-400' },
          { nome: 'FIIs', pct: 0.40, cor: 'text-emerald-400', bg: 'bg-emerald-400' },
          { nome: 'Ações', pct: 0.10, cor: 'text-amber-400', bg: 'bg-amber-400' }
        ],
        oportunidades: [
          { id: 'tesouro-ipca', emoji: '📈', titulo: 'Tesouro IPCA+ 2035', tag: 'Renda Fixa · Risco Médio', tagColor: 'bg-indigo-900/60 text-indigo-300 border border-indigo-700/40', desc: 'Título que paga a inflação (IPCA) mais um juro real.' },
          { id: 'fii-tijolo', emoji: '🏢', titulo: 'FIIs de Tijolo', tag: 'Renda Variável · Risco Médio', tagColor: 'bg-emerald-900/60 text-emerald-300 border border-emerald-700/40', desc: 'Fundos Imobiliários que investem em imóveis físicos, com dividendos isentos.' },
          { id: 'acoes-dividendos', emoji: '📊', titulo: 'Ações Pagadoras', tag: 'Renda Variável · Risco Médio', tagColor: 'bg-amber-900/60 text-amber-300 border border-amber-700/40', desc: 'Ações de empresas maduras com histórico de pagamento de dividendos.' }
        ]
      },
      arrojado: {
        label: 'Arrojado', emoji: '🚀',
        alocacao: [
          { nome: 'Renda Fixa', pct: 0.20, cor: 'text-indigo-400', bg: 'bg-indigo-400' },
          { nome: 'FIIs', pct: 0.30, cor: 'text-emerald-400', bg: 'bg-emerald-400' },
          { nome: 'Ações', pct: 0.50, cor: 'text-amber-400', bg: 'bg-amber-400' }
        ],
        oportunidades: [
          { id: 'acoes-smallcaps', emoji: '🚀', titulo: 'Ações Small Caps', tag: 'Renda Variável · Risco Alto', tagColor: 'bg-amber-900/60 text-amber-300 border border-amber-700/40', desc: 'Empresas de pequena capitalização com alto potencial de crescimento.' },
          { id: 'etf-ivvb11', emoji: '🌎', titulo: 'ETF Internacional IVVB11', tag: 'Renda Variável · Risco Alto', tagColor: 'bg-amber-900/60 text-amber-300 border border-amber-700/40', desc: 'ETF que replica o índice S&P 500, exposição aos EUA.' },

        ]
      }
    };

    function useTickersSimulados() {
      const [tickers, setTickers] = useState({ cdi: 12.15, ibov: 126000, ifix: 3500 });
      useEffect(() => {
        const interval = setInterval(() => setTickers(prev => ({
          cdi: prev.cdi + (Math.random() - 0.5) * 0.02, ibov: prev.ibov + (Math.random() - 0.5) * 200, ifix: prev.ifix + (Math.random() - 0.5) * 5
        })), 5000);
        return () => clearInterval(interval);
      }, []);
      return tickers;
    }

    /* ════════ NOVO GRÁFICO DE LINHAS MATEMÁTICO (SVG) ════════ */
    function GraficoLinhas({ resultado, selic }) {
      if (!resultado || resultado <= 0) return html`<div class="h-32 flex items-center justify-center border border-dashed border-slate-700/60 rounded-xl bg-[#0d1117]/30"><p class="text-[10px] text-slate-500">Simule um valor para ver o gráfico</p></div>`;
      
      const meses = ['Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar','Abr','Mai','Jun'];
      const taxaMensalRF = Math.pow(1 + selic / 100, 1 / 12) - 1;
      const proj = [];
      let rf = resultado * 0.5, fii = resultado * 0.4, acoes = resultado * 0.1, poup = resultado;
      for (let i = 0; i < meses.length; i++) {
        if (i > 0) { rf *= 1 + taxaMensalRF; fii *= 1 + 0.006; acoes *= 1 + 0.010; poup *= 1 + 0.005; }
        proj.push({ mes: meses[i], rf, fii, acoes, poup });
      }
      const maxVal = Math.max(...proj.flatMap(d => [d.rf, d.fii, d.acoes, d.poup]));
      const h = 130, w = 260, pad = 20;
      const escala = (v) => h - ((v / maxVal) * (h - pad));
      const geraPath = (tipo) => proj.map((d, i) => {
        const x = pad + (i / (proj.length - 1)) * (w - pad * 2);
        const y = escala(d[tipo]);
        return i === 0 ? `M ${x} ${y}` : `L ${x} ${y}`;
      }).join(' ');
      const last = proj[proj.length - 1];

      return html`
        <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl mt-4">
          <div class="flex items-center justify-between mb-2"><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Comparativo de Rendimentos</h2></div>
          <div class="relative w-full flex justify-center">
            <svg viewBox="0 0 280 160" class="w-full max-w-full h-36">
              <defs><linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2233"/><stop offset="100%" stop-color="#0d1117"/></linearGradient></defs>
              <rect width="280" height="160" fill="url(#bgGrad)" rx="8" />
              ${proj.map((d, i) => html`<line key=${i} x1=${pad + (i / (proj.length - 1)) * (w - pad * 2)} y1=${h - pad} x2=${pad + (i / (proj.length - 1)) * (w - pad * 2)} y2=${h - pad + 8} stroke="#334155" stroke-width="1.5" />`)}
              <path d=${geraPath('poup')} fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
              <path d=${geraPath('rf')} fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d=${geraPath('fii')} fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d=${geraPath('acoes')} fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              ${proj.map((d, i) => html`<circle key=${i} cx=${pad + (i / (proj.length - 1)) * (w - pad * 2)} cy=${escala(d.acoes)} r="2.5" fill="#34d399" />`)}
            </svg>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-1 text-[9px]">
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-1 rounded-full bg-[#94a3b8]"></span>Poupança: <strong>R$ ${fmtBRL(last.poup)}</strong></div>
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-1 rounded-full bg-[#60a5fa]"></span>R. Fixa: <strong>R$ ${fmtBRL(last.rf)}</strong></div>
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-1 rounded-full bg-[#a78bfa]"></span>FIIs: <strong>R$ ${fmtBRL(last.fii)}</strong></div>
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-1 rounded-full bg-[#34d399]"></span>Ações: <strong>R$ ${fmtBRL(last.acoes)}</strong></div>
          </div>
        </section>`;
    }

    /* ════════ COMPONENTES ATÔMICOS ════════ */
    function Spinner({ size }) { const s = size || 'w-5 h-5'; return html`<svg class=${'spin ' + s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#1e293b" stroke-width="3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="#34d399" stroke-width="3" stroke-linecap="round"/></svg>`; }
    function CoinLogo({ size }) { const s = size || 28; return html`<svg width=${s} height=${s} viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#34d399" fill-opacity="0.12"/><circle cx="14" cy="14" r="10" fill="#34d399" fill-opacity="0.22"/><circle cx="14" cy="14" r="7" fill="#34d399" fill-opacity="0.18"/><text x="14" y="18.5" text-anchor="middle" font-size="11" font-family="Inter,sans-serif" font-weight="800" fill="#34d399">$</text></svg>`; }
    function SelicBadge({ selic, isLive, loading }) {
      let dotColor = 'bg-slate-600', textColor = 'text-slate-600', label = 'Buscando...';
      if (!loading) { dotColor = isLive ? 'bg-emerald-400' : 'bg-amber-400'; textColor = isLive ? 'text-emerald-400' : 'text-amber-400'; label = isLive ? 'Selic ao vivo' : 'Média de mercado'; }
      return html`<div class="flex items-center gap-1.5 text-[10px] bg-slate-800/60 px-2.5 py-1 rounded-full border border-slate-700/50">${loading ? html`<span class="w-1.5 h-1.5 rounded-full bg-slate-600 pulse-dot"></span>` : html`<span class=${'w-1.5 h-1.5 rounded-full pulse-dot inline-block ' + dotColor}></span>`}<span class=${'font-semibold ' + textColor}>${!loading ? selic.toFixed(2) + '% a.a.' : 'Carregando...'}</span><span class="text-slate-500">${label}</span></div>`;
    }
    function TickersBar({ tickers }) { return html`<div class="flex flex-wrap gap-2 text-[9px] text-slate-400 bg-slate-800/40 px-2.5 py-1.5 rounded-full border border-slate-700/40 mt-1"><span class="flex items-center gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full bg-indigo-400/70"></span>CDI: <span class="text-indigo-300 font-medium">${tickers.cdi.toFixed(2)}%</span></span><span class="flex items-center gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400/70"></span>IBOV: <span class="text-emerald-300 font-medium">${Math.round(tickers.ibov).toLocaleString('pt-BR')}</span></span><span class="flex items-center gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full bg-amber-400/70"></span>IFIX: <span class="text-amber-300 font-medium">${Math.round(tickers.ifix).toLocaleString('pt-BR')}</span></span></div>`; }
    function PerfilSelector({ perfil, onChange }) { return html`<div class="flex gap-1.5 bg-[#0d1117]/60 p-1 rounded-xl border border-slate-800">${['conservador','moderado','arrojado'].map(key => { const p = PERFIS[key], ativo = perfil === key; return html`<button key=${key} class=${'profile-btn flex-1 flex flex-col items-center py-2 px-1 rounded-lg text-[10px] font-semibold cursor-pointer border ' + (ativo ? 'bg-[#1a2233] border-[#34d399]/50 text-[#34d399] shadow-sm' : 'bg-transparent border-transparent text-slate-500 hover:text-slate-300')} onClick=${() => onChange(key)}><span class="text-base leading-none mb-0.5">${p.emoji}</span>${p.label}</button>`; })}</div>`; }
    function ResultadoAlocacao({ resultado, perfil, selic, selicIsLive, selicLoading, showValues }) {
      const alocacao = PERFIS[perfil].alocacao, rfItem = alocacao[0], rendMensal = (resultado * rfItem.pct * selic / 100) / 12;
      return html`<div class="space-y-2.5"><p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Divisão da carteira · Perfil ${PERFIS[perfil].emoji} ${PERFIS[perfil].label}</p>${alocacao.map(a => { const bruto = resultado * a.pct; return html`<div key=${a.nome} class="bg-[#0d1117]/70 p-3.5 rounded-xl border border-slate-800 space-y-2"><div class="flex items-center justify-between"><div class="flex items-center gap-2 min-w-0"><div class=${'w-1.5 h-6 rounded-full flex-shrink-0 opacity-80 ' + a.bg}></div><div><p class="text-xs text-slate-300 font-medium">${a.nome} (${Math.round(a.pct * 100)}%)</p></div></div><span class=${'font-bold text-sm flex-shrink-0 ' + a.cor}>${showValues ? 'R$ ' + fmtBRL(bruto) : 'R$ ••••'}</span></div><div class="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div class=${'h-full rounded-full progress-fill ' + a.bg} style=${`width: ${a.pct * 100}%`}></div></div></div>`; })}<p class="text-[9px] text-slate-600 text-center pt-1">Projeção RF com Selic ${selic.toFixed(1)}% a.a. ${selicIsLive ? ' (ao vivo)' : ' (média)'}</p></div>`;
    }
    function MonetizationBanner() { return html`<div class="banner-glow rounded-2xl p-4 text-center space-y-1.5"><p class="text-xs text-slate-200 font-medium">🚀 Quer multiplicar suas moedas?</p><p class="text-xs text-slate-400">Abra sua conta na corretora parceira com <strong class="text-[#34d399]">taxa zero</strong>!</p><a href="https://www.xpi.com.br/" target="_blank" rel="noopener noreferrer" class="inline-block mt-1 bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 text-[10px] font-bold py-1.5 px-5 rounded-full">Conhecer agora</a></div>`; }
    function WhatsAppButton() { const url = encodeURIComponent('Descobri esse app gratuito que ajuda a planejar investimentos: https://minhas-moedinhas.vercel.app/'); return html`<a href="https://api.whatsapp.com/send?text=${url}" target="_blank" class="whatsapp-btn flex items-center gap-1.5 text-xs text-slate-300 bg-[#25D366]/10 hover:bg-[#25D366]/20 border border-[#25D366]/30 rounded-full px-3 py-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-[#25D366]"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Ajudar um amigo</a>`; }
    function Badge({ emoji, label, active }) { const cls = active ? 'badge-on badge-pulse' : 'badge-off'; return html`<div class="flex flex-col items-center gap-1 ${cls}"><span class="text-2xl">${emoji}</span><span class="text-[8px] text-slate-400 font-medium">${label}</span></div>`; }

    /* ════════ DASHBOARD PRINCIPAL (Nova Ordem) ════════ */

      const [selic, setSelic] = useState(SELIC_FALLBACK);

      const [selicLoading, setSelicLoading] = useState(true);
      const [dbReady, setDbReady] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showValues, setShowValues] = useState(true);
      const [transacoes, setTransacoes] = useState([]);
      const [modalOpen, setModalOpen] = useState(false);
      const [modalDesc, setModalDesc] = useState(''), [modalValor, setModalValor] = useState(''), [modalTipo, setModalTipo] = useState('entrada'), [modalLoading, setModalLoading] = useState(false);
      const tickers = useTickersSimulados();

      useEffect(() => { (async () => { const data = await dbLoad(user.id); if (data.perfil && PERFIS[data.perfil]) setPerfil(data.perfil); if (data.aporte > 0) { setValor(String(data.aporte)); setResultado(data.aporte); } setTransacoes(await carregarTransacoes(user.id)); setDbReady(true); })(); }, [user.id]);
      useEffect(() => { const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 5000); (async () => { try { const res = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json', { signal: ctrl.signal }); if (!res.ok) throw new Error(); const json = await res.json(); const d = parseFloat(json[0]?.valor); if (!isNaN(d)) { setSelic(parseFloat(((Math.pow(1 + d / 100, 252) - 1) * 100).toFixed(2))); setSelicIsLive(true); } } catch { setSelic(SELIC_FALLBACK); } finally { clearTimeout(tid); setSelicLoading(false); } })(); return () => { ctrl.abort(); clearTimeout(tid); }; }, []);
      const calcular = useCallback(async () => { const v = parseFloat(valor); if (isNaN(v) || v <= 0) return; setResultado(v); setSaving(true); await dbSave(user.id, v, perfil); setSaving(false); }, [valor, perfil, user.id]);
      async function handlePerfilChange(key) { setPerfil(key); setPerfilChanged(true); const v = parseFloat(valor); setSaving(true); await dbSave(user.id, isNaN(v) ? null : v, key); setSaving(false); }

      async function handleDeletarTransacao(id) { if (!confirm('Remover?')) return; try { await deletarTransacao(id); setTransacoes(await carregarTransacoes(user.id)); } catch (err) { alert('Erro: ' + err.message); } }

      const saldoAtual = totalEntradas - totalSaidas;

          <!-- 5. GERENCIADOR DE MOEDINHAS -->
          <section class="bg-[#1a2233] p-4 rounded-2xl border border-slate-800 shadow-xl space-y-3"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-lg">🪙</span><h2 class="text-xs font-semibold text-[#818cf8] uppercase tracking-wider">Gerenciador de Moedinhas</h2></div><button onClick=${() => setModalOpen(true)} class="auth-btn flex items-center gap-1.5 bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 font-bold px-3 py-1.5 rounded-xl text-xs"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo Lançamento</button></div>
            <div class="space-y-2 max-h-56 overflow-y-auto pr-1">${transacoes.length === 0 ? html`<p class="text-center text-xs text-slate-600 py-4">Nenhum lançamento ainda.</p>` : transacoes.map(t => html`<div key=${t.id} class="flex items-center justify-between bg-[#0d1117]/70 p-3 rounded-xl border border-slate-800 hover:border-slate-700 transition-colors"><div class="flex items-center gap-3 min-w-0"><span class=${t.tipo === 'entrada' ? 'text-emerald-400 text-lg' : 'text-red-400 text-lg'}>${t.tipo === 'entrada' ? '📈' : '📉'}</span><div class="min-w-0"><p class="text-sm font-medium text-slate-200 truncate">${t.descricao}</p><p class="text-[10px] text-slate-500">${new Date(t.created_at).toLocaleDateString('pt-BR')}</p></div></div><div class="flex items-center gap-3 flex-shrink-0"><span class=${'font-bold text-sm ' + (t.tipo === 'entrada' ? 'text-emerald-400' : 'text-red-400')}>${t.tipo === 'entrada' ? '+ ' : '- '}R$ ${fmtBRL(t.valor)}</span><button onClick=${() => handleDeletarTransacao(t.id)} class="text-slate-600 hover:text-red-400 transition-colors"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div></div>`)}</div>
          </section>
          <footer class="pt-4 text-center border-t border-slate-800/60 space-y-2"><div class="flex justify-center"><${WhatsAppButton} /></div><p class="text-[9px] text-slate-600 max-w-xs mx-auto"><strong class="text-slate-500">Aviso Legal:</strong> Ferramenta educativa, não recomendação.</p><p class="text-[8px] text-slate-700">© 2026 Minhas Moedinhas</p></footer>
        </div>
        
        ${modalOpen && html`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick=${e => { if (e.target === e.currentTarget) setModalOpen(false); }}><div class="bg-[#1a2233] rounded-2xl border border-slate-700/60 shadow-2xl max-w-sm w-full p-6 modal-card space-y-4"><div class="flex items-center justify-between"><h2 class="text-lg font-bold text-[#34d399]">Novo Lançamento</h2><button onClick=${() => setModalOpen(false)} class="text-slate-500 hover:text-slate-300"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div><form onSubmit=${handleNovaTransacao} class="space-y-3"><div><label class="text-[10px] text-slate-500 font-semibold uppercase">Descrição</label><input type="text" value=${modalDesc} onChange=${e => setModalDesc(e.target.value)} placeholder="Ex: Salário" class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm focus:border-[#34d399]" required /></div><div><label class="text-[10px] text-slate-500 font-semibold uppercase">Valor (R$)</label><input type="number" value=${modalValor} onChange=${e => setModalValor(e.target.value)} placeholder="0,00" min="0.01" step="0.01" class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-slate-700 text-slate-100 placeholder-slate-600 text-sm focus:border-[#34d399]" required /></div><div><label class="text-[10px] text-slate-500 font-semibold uppercase">Tipo</label><div class="flex gap-4 mt-1"><label class="flex items-center gap-2 text-xs text-slate-300"><input type="radio" name="tipo" value="entrada" checked=${modalTipo === 'entrada'} onChange=${() => setModalTipo('entrada')} class="accent-[#34d399] w-4 h-4" /> Entrada</label><label class="flex items-center gap-2 text-xs text-slate-300"><input type="radio" name="tipo" value="saida" checked=${modalTipo === 'saida'} onChange=${() => setModalTipo('saida')} class="accent-[#f87171] w-4 h-4" /> Saída</label></div></div><button type="submit" disabled=${modalLoading} class="w-full auth-btn bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 font-bold py-3 rounded-xl text-sm disabled:opacity-60 flex items-center justify-center gap-2">${modalLoading ? html`<${Spinner} size="w-4 h-4" />Salvando...` : 'Salvar Lançamento'}</button></form></div></div>`}
      `;
    }

    /* ════════ ROOT (CORREÇÃO DO CLEANUP) ════════ */
    function Root() {
      const [user, setUser] = useState(null), [authReady, setAuthReady] = useState(false), [onboardingSeen, setOnboardingSeen] = useState(false);
      useEffect(() => {
        setOnboardingSeen(localStorage.getItem('onboarding_visto') === 'true');
        sbClient.auth.getSession().then(res => { setUser(res.data?.session?.user ?? false); setAuthReady(true); });
        const { data: { subscription } } = sbClient.auth.onAuthStateChange((_, session) => { setUser(session?.user ?? false); setAuthReady(true); });
        return () => { subscription.unsubscribe(); };
      }, []);
      if (!authReady) return html`<div class="min-h-screen flex items-center justify-center gap-3 bg-[#0d1117]"><${Spinner} size="w-8 h-8" /><p class="text-xs text-slate-500">Carregando…</p></div>`;
      if (!user) return html`<${LoginScreen} />`;
      return html`<${MainApp} user=${user} />${!onboardingSeen && html`<${OnboardingModal} onComplete=${() => { localStorage.setItem('onboarding_visto', 'true'); setOnboardingSeen(true); }} />`}`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root} />`);
  </script>
</body>
</html>
