<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Atalhos para o React não precisar de Babel
        const e = React.createElement;
        const useState = React.useState;

        // ─── BASE DE DADOS ──────────────────────────────────────────────────
        const INVESTIMENTOS_DATA = [
            { id: 1, nome: "Tesouro Selic 2027", categoria: "Renda Fixa", valor: 5820.00, rentabilidade: "+10.75% a.a.", risco: "Muito Baixo", riscoCor: "bg-emerald-100 text-emerald-800", desc: "É o investimento mais seguro do país. Você empresta dinheiro para o Governo em troca de juros. Perfeito para reservas de emergência.", ondeComo: "Disponível em qualquer banco ou corretora via Tesouro Direto." },
            { id: 2, nome: "CDB Banco 110%", categoria: "Renda Fixa", valor: 2500.00, rentabilidade: "+11.50% a.a.", risco: "Baixo", riscoCor: "bg-emerald-100 text-emerald-800", desc: "Você empresta para o banco. É protegido pelo FGC (Fundo Garantidor) em até R$ 250 mil caso o banco tenha problemas.", ondeComo: "Direto no app do seu banco ou corretora de preferência." },
            { id: 3, nome: "Fundo Multimercado", categoria: "Fundos", valor: 3140.50, rentabilidade: "+6.20% no ano", risco: "Médio", riscoCor: "bg-amber-100 text-amber-800", desc: "Um gestor profissional distribui o dinheiro em vários mercados buscando o melhor ganho. Pode oscilar um pouco.", ondeComo: "Plataformas como XP, BTG, Inter ou Nu Invest." },
            { id: 4, nome: "Ações Itaú (ITUB4)", categoria: "Ações", valor: 1980.00, rentabilidade: "-3.15% mên", risco: "Alto", riscoCor: "bg-rose-100 text-rose-800", desc: "Você se torna sócio da empresa. Se ela lucrar, você ganha; se a bolsa cair, elas desvalorizam temporariamente.", ondeComo: "Comprado no Home Broker usando o código ITUB4." },
            { id: 5, nome: "Bitcoin (BTC)", categoria: "Cripto", valor: 850.00, rentabilidade: "+42.80% no ano", risco: "Muito Alto", riscoCor: "bg-purple-100 text-purple-800", desc: "Moeda digital descentralizada. Alto potencial de ganho, mas pode variar muito em um único dia. Cuidado e moderação!", ondeComo: "Corretoras de cripto (Exchanges) ou via ETFs na Bolsa." }
        ];

        // ─── COMPONENTE PRINCIPAL (EM RECT PURO) ───────────────────────────
        function App() {
            const [mostrarSaldo, setMostrarSaldo] = useState(true);
            const [categoriaFiltro, setCategoriaFiltro] = useState("Todos");
            const [itemSelecionado, setItemSelecionado] = useState(INVESTIMENTOS_DATA[0]);

            const totalSaldo = INVESTIMENTOS_DATA.reduce((acc, item) => acc + item.valor, 0);
            const categorias = ["Todos", "Renda Fixa", "Fundos", "Ações", "Cripto"];
            const listaFiltrada = categoriaFiltro === "Todos" 
                ? INVESTIMENTOS_DATA 
                : INVESTIMENTOS_DATA.filter(i => i.categoria === categoriaFiltro);

            return e("div", { className: "min-h-screen flex flex-col" },
                // Header
                e("header", { className: "bg-white border-b border-slate-200 sticky top-0 z-10" },
                    e("div", { className: "max-w-6xl mx-auto px-4 h-16 flex items-center justify-between" },
                        e("div", { className: "flex items-center gap-2" },
                            e("div", { className: "bg-emerald-500 text-white p-2 rounded-xl font-bold shadow-md" }, "🪙"),
                            e("span", { className: "font-extrabold text-xl text-slate-800" }, 
                                "Minhas", e("span", { className: "text-emerald-500" }, "Moedinhas")
                            )
                        ),
                        e("span", { className: "text-xs font-semibold bg-slate-100 text-slate-600 px-3 py-1 rounded-full" }, "v2.5 — À prova de falhas")
                    )
                ),

                // Conteúdo Principal
                e("main", { className: "flex-1 max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6" },
                    
                    // Coluna da Esquerda (Saldo, Filtros e Cards)
                    e("div", { className: "md:col-span-2 space-y-6" },
                        
                        // Card de Saldo
                        e("div", { className: "bg-slate-900 text-white rounded-3xl p-6 shadow-xl relative overflow-hidden" },
                            e("div", { className: "flex justify-between items-center mb-2" },
                                e("span", { className: "text-sm text-slate-400 font-medium" }, "Patrimônio Total Simulado"),
                                e("button", { 
                                    onClick: () => setMostrarSaldo(!mostrarSaldo),
                                    className: "text-slate-400 hover:text-white text-xs bg-white/5 px-2.5 py-1.5 rounded-lg"
                                }, mostrarSaldo ? "Ocultar Saldo" : "Mostrar Saldo")
                            ),
                            e("div", { className: "text-3xl font-black tracking-tight mb-2" }, 
                                mostrarSaldo ? `R$ ${totalSaldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : "R$ •••••••"
                            ),
                            e("p", { className: "text-xs text-emerald-400 font-medium" }, "📈 Dinheiro inteligente rendendo mais que a poupança.")
                        ),

                        // Filtros
                        e("div", { className: "space-y-2" },
                            e("h2", { className: "text-sm font-bold text-slate-700 uppercase tracking-wider" }, "Filtrar por Tipo"),
                            e("div", { className: "flex flex-wrap gap-2" },
                                categorias.map(cat => 
                                    e("button", {
                                        key: cat,
                                        onClick: () => setCategoriaFiltro(cat),
                                        className: `px-4 py-2 rounded-xl text-xs font-bold transition ${
                                            categoriaFiltro === cat ? "bg-emerald-500 text-white shadow-md" : "bg-white border border-slate-200 text-slate-600 hover:bg-slate-50"
                                        }`
                                    }, cat)
                                )
                            )
                        ),

                        // Grid de Investimentos
                        e("div", { className: "space-y-3" },
                            e("h2", { className: "text-sm font-bold text-slate-700 uppercase tracking-wider" }, "Onde o dinheiro está alocado"),
                            e("div", { className: "grid grid-cols-1 sm:grid-cols-2 gap-3" },
                                listaFiltrada.map(item => 
                                    e("div", {
                                        key: item.id,
                                        onClick: () => setItemSelecionado(item),
                                        className: `bg-white p-4 rounded-2xl border-2 cursor-pointer transition flex flex-col justify-between h-36 ${
                                            itemSelecionado.id === item.id ? "border-emerald-500 bg-emerald-50/10 shadow-md" : "border-slate-100 hover:border-slate-200"
                                        }`
                                    }, 
                                        e("div", null,
                                            e("div", { className: "flex justify-between items-start mb-1" },
                                                e("h3", { className: "font-bold text-slate-800 text-sm sm:text-base" }, item.nome),
                                                e("span", { className: `text-[10px] font-extrabold px-2 py-0.5 rounded-full ${item.riscoCor}` }, item.risco)
                                            ),
                                            e("span", { className: "text-xs text-slate-400 font-medium" }, item.categoria)
                                        ),
                                        e("div", { className: "flex justify-between items-end mt-4" },
                                            e("div", null,
                                                e("span", { className: "text-[10px] text-slate-400 block uppercase font-bold" }, "Valor"),
                                                e("span", { className: "font-extrabold text-slate-800 text-base" }, `R$ ${item.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`)
                                            ),
                                            e("span", { className: "text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg" }, item.rentabilidade)
                                        )
                                    )
                                )
                            )
                        )
                    ),

                    // Coluna da Direita (Painel Educativo)
                    e("div", { className: "bg-white rounded-3xl p-6 border border-slate-200 shadow-sm flex flex-col justify-between" },
                        e("div", null,
                            e("div", { className: "flex items-center gap-2 mb-4" },
                                e("span", { className: "text-xl" }, "💡"),
                                e("h2", { className: "font-extrabold text-slate-800 text-lg" }, "Guia Prático")
                            ),
                            e("div", { className: "bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-4" },
                                e("span", { className: "text-[10px] uppercase font-bold text-slate-400 block mb-1" }, "Selecionado"),
                                e("h3", { className: "text-base font-black text-slate-800" }, itemSelecionado.nome),
                                e("div", { className: "mt-2 flex gap-2" },
                                    e("span", { className: "text-xs font-semibold bg-slate-200 text-slate-700 px-2.5 py-0.5 rounded-md" }, itemSelecionado.categoria),
                                    e("span", { className: `text-xs font-bold px-2.5 py-0.5 rounded-md ${itemSelecionado.riscoCor}` }, `Risco ${itemSelecionado.risco}`)
                                )
                            ),
                            e("div", { className: "space-y-4" },
                                e("div", null,
                                    e("h4", { className: "text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" }, "O que significa na prática?"),
                                    e("p", { className: "text-sm text-slate-600 leading-relaxed font-medium" }, itemSelecionado.desc)
                                ),
                                e("div", null,
                                    e("h4", { className: "text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" }, "Como investir?"),
                                    e("p", { className: "text-sm text-slate-600 leading-relaxed font-medium" }, itemSelecionado.ondeComo)
                                )
                            )
                        ),
                        e("div", { className: "mt-8 border-t border-slate-100 pt-4 text-center" },
                            e("p", { className: "text-xs text-slate-400 font-medium" }, "Clique nos investimentos para alternar a explicação.")
                        )
                    )
                ),

                // Footer
                e("footer", { className: "bg-slate-100 text-center py-4 text-xs text-slate-500 font-medium border-t border-slate-200 mt-8" },
                    "Minhas Moedinhas © 2026"
                )
            );
        }

        // Renderização limpa e direta
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
