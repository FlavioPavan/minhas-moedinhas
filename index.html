<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div id="root" class="flex items-center justify-center min-h-screen">
        <div class="text-center p-6 bg-white rounded-xl shadow-md">
            <h1 class="text-2xl font-bold text-green-600">Minhas Moedinhas</h1>
            <p class="mt-2 text-gray-600">O sistema está carregando...</p>
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        // Criando um componente simples sem precisar de Babel/JSX
        const e = React.createElement;

        function App() {
            return e('div', { className: 'text-center p-10' }, [
                e('h1', { className: 'text-4xl font-bold text-green-600' }, 'Minhas Moedinhas'),
                e('p', { className: 'mt-4 text-gray-700' }, 'Site carregado com sucesso!')
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
