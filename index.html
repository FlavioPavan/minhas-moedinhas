<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Dashboard</title>
  
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e2e8f0; }
    
    /* Utilitários Customizados */
    .card-dash { background-color: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 16px; }
    .input-moderno { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; color: white; font-weight: 500; width: 100%; outline: none; }
    .input-moderno:focus { border-color: #34d399; box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2); }
    
    /* Gráfico */
    .chart-container { position: relative; height: 180px; width: 100%; }
    
    /* Animações */
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #34d399; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef, useCallback } = React;
    const html = htm.bind(React.createElement);
    const sbClient = window.supabase.createClient('https://gqpxxwfahnwnhklbjwxr.supabase.co', 'sb_publishable_LiUY4XIO_xNS_aEqpmQlkQ_etMa1iB5');

    // ==========================================================
    // 1. MOTOR FINANCEIRO (Matemática Pura e Dados Dinâmicos)
    // ==========================================================
    const MotorFinanceiro = {
      // Gera dados históricos com volatilidade real (Movimento Browniano)
      gerarSerieTemporal: (dias, valorInicial, rentabilidadeAnual, volatilidadeDiaria) => {
        let historico = [];
        let valorAtual = valorInicial || 1000;
        const taxaDiaria = (1 + rentabilidadeAnual) ** (1/252) - 1;
        for (let i = 0; i < dias; i++) {
          const ruido = (Math.random() - 0.5) * volatilidadeDiaria * 2;
          valorAtual = valorAtual * (1 + taxaDiaria + ruido);
          historico.push(valorAtual);
        }
        return historico;
      },

      // Calcula a divisão de aporte (50/40/10)
      calcularDivisao: (valorTotal, perfil = 'moderado') => {
        let rf = 0.50, fiis = 0.40, acoes = 0.10;
        if (perfil === 'conservador') { rf = 0.70; fiis = 0.20; acoes = 0.10; }
        if (perfil === 'arrojado') { rf = 0.30; fiis = 0.40; acoes = 0.30; }
        return {
          rendaFixa: valorTotal * rf,
          fiis: valorTotal * fiis,
          acoes: valorTotal * acoes
        };
      }
    };

    // ==========================================================
    // 2. COMPONENTES DE UI (Substituição Cirúrgica do Gráfico)
    // ==========================================================

    // 2.1 Gráfico de Performance (Linhas Flutuantes - NOVO)
    function GraficoPerformance({ valores }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (chartInstance.current) chartInstance.current.destroy();
        const ctx = chartRef.current.getContext('2d');

        // Dados gerados pelo motor com base no último valor do usuário
        const base = valores?.length > 0 ? valores[valores.length - 1] : 1000;
        const dataPoints = MotorFinanceiro.gerarSerieTemporal(12, base, 0.15, 0.02);
        const cdiPoints = MotorFinanceiro.gerarSerieTemporal(12, base, 0.105, 0.005);

        chartInstance.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
            datasets: [
              {
                label: 'Sua Carteira',
                data: dataPoints,
                borderColor: '#34d399',
                backgroundColor: 'rgba(52, 211, 153, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                borderWidth: 2
              },
              {
                label: 'CDI',
                data: cdiPoints,
                borderColor: '#818cf8',
                borderDash: [5, 5],
                tension: 0.4,
                pointRadius: 0,
                borderWidth: 1
              }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { 
              legend: { 
                labels: { color: '#94a3b8', font: { size: 9, family: 'Inter' }, usePointStyle: true, boxWidth: 8 } 
              } 
            },
            scales: { 
              y: { 
                grid: { color: 'rgba(255,255,255,0.05)' }, 
                ticks: { 
                  color: '#64748b', 
                  callback: (v) => `R$ ${(v/1000).toFixed(0)}k`, // Corrigido para exibir k corretamente
                  maxTicksLimit: 4 
                } 
              }, 
              x: { 
                grid: { display: false }, 
                ticks: { color: '#64748b', maxTicksLimit: 6 } 
              } 
            }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [valores]);

      return html`<div class="chart-container fade-up"><canvas ref=${chartRef}></canvas></div>`;
    }

    // 2.2 Top 3 Oportunidades (Cards + Modal)
    function TopOportunidades() {
      const [selected, setSelected] = useState(null);
      const oportunidades = [
        { 
          id: 1, titulo: "Tesouro IPCA+ 2035", tipo: "Renda Fixa", cor: "text-[#818cf8]", 
          tese: "Título público atrelado à inflação. Garante rentabilidade real acima do IPCA. Ideal para reservas de longo prazo.",
          projecao: "IPCA + 6,5% a.a."
        },
        { 
          id: 2, titulo: "FIIs de Tijolo", tipo: "Fundos Imobiliários", cor: "text-[#34d399]", 
          tese: "Fundo que investe em imóveis comerciais. Recebe aluguéis mensais. Dividendos isentos de IR para pessoa física.",
          projecao: "Yield médio de 9,8% a.a."
        },
        { 
          id: 3, titulo: "Ações Pagadoras", tipo: "Renda Variável", cor: "text-[#fbbf24]", 
          tese: "Empresas com histórico sólido de distribuição de lucros. Investimento focado em dividendos de longo prazo.",
          projecao: "Dividend Yield 7,5% a.a."
        }
      ];

      return html`
        <div>
          <div class="grid grid-cols-3 gap-2">
            ${oportunidades.map(op => html`
              <div 
                key=${op.id}
                onClick=${() => setSelected(op)}
                class="bg-[#0d1117] p-3 rounded-xl border border-[#30363d] hover:border-[#34d399]/30 cursor-pointer transition-all flex flex-col items-center text-center space-y-1"
              >
                <span class="text-lg">${op.id === 1 ? '📈' : op.id === 2 ? '🏢' : '📊'}</span>
                <h4 class="text-[9px] font-bold text-white leading-tight">${op.titulo}</h4>
                <span class="${op.cor} text-[7px] bg-[#161b22] px-2 py-0.5 rounded-full border border-slate-800">${op.tipo}</span>
              </div>
            `)}
          </div>

          ${selected && html`
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-50 fade-up" onClick=${(e) => { if(e.target === e.currentTarget) setSelected(null); }}>
              <div class="bg-[#161b22] max-w-sm w-full p-6 rounded-2xl border border-slate-700 space-y-4">
                <div class="flex justify-between items-start">
                  <h2 class="text-lg font-bold text-white">${selected.titulo}</h2>
                  <button onClick=${() => setSelected(null)} class="text-slate-400 hover:text-white text-xl">✕</button>
                </div>
                <div class="space-y-3 text-sm text-slate-300 leading-relaxed">
                  <p><strong class="text-[#34d399]">Tese de Investimento:</strong><br/>${selected.tese}</p>
                  <div class="p-4 bg-[#0d1117] rounded-lg border border-slate-800 text-center">
                    <p class="text-xs text-slate-400">Projeção Matemática</p>
                    <p class="text-2xl font-extrabold text-[#34d399]">${selected.projecao}</p>
                  </div>
                </div>
              </div>
            </div>
          `}
        </div>
      `;
    }

    // 2.3 Gerenciador de Moedinhas (Original)
    function GerenciadorMoedinhas() {
      const [saldo, setSaldo] = useState(12500.00);
      const [visivel, setVisivel] = useState(true);
      const [historico, setHistorico] = useState([]);

      const handleTransacao = (tipo) => {
        const input = document.getElementById(`val-${tipo}`);
        const valor = parseFloat(input.value.replace(',', '.'));
        if (isNaN(valor) || valor <= 0) return;

        const novoSaldo = tipo === 'entrada' ? saldo + valor : saldo - valor;
        setSaldo(novoSaldo);
        setHistorico([{ tipo, valor, data: new Date().toLocaleDateString() }, ...historico].slice(0, 5));
        input.value = '';
      };

      return html`
        <div class="card-dash fade-up">
          <div class="flex justify-between items-center border-b border-[#30363d] pb-2 mb-3">
            <div class="flex items-center gap-2">
              <h2 class="text-xs font-bold text-slate-300 uppercase tracking-wider">💰 Gerenciador</h2>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-sm font-bold ${visivel ? 'text-[#34d399]' : 'text-slate-600'}">
                ${visivel ? `R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : '● ● ● ● ●'}
              </span>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="bg-[#0d1117] p-3 rounded-xl border border-[#30363d]">
              <label class="text-[10px] text-slate-400 block mb-1">Entrada</label>
              <input id="val-entrada" type="text" placeholder="0,00" class="input-moderno text-[#34d399]" />
              <button onClick=${() => handleTransacao('entrada')} class="w-full mt-2 bg-[#34d399] py-1.5 rounded text-[10px] font-bold text-slate-950 hover:opacity-90 transition">Adicionar</button>
            </div>

            <div class="bg-[#0d1117] p-3 rounded-xl border border-[#30363d]">
              <label class="text-[10px] text-slate-400 block mb-1">Saída</label>
              <input id="val-saida" type="text" placeholder="0,00" class="input-moderno text-[#ef4444]" />
              <button onClick=${() => handleTransacao('saida')} class="w-full mt-2 bg-[#ef4444] py-1.5 rounded text-[10px] font-bold text-slate-50 hover:opacity-90 transition">Retirar</button>
            </div>
          </div>

          <div class="max-h-20 overflow-y-auto space-y-1 text-[10px] text-slate-400">
            ${historico.map((e, i) => html`
              <div key=${i} class="flex justify-between border-b border-[#30363d]/50 pb-1">
                <span>${e.tipo === 'entrada' ? '🟢 Entrada' : '🔴 Saída'}</span>
                <span>R$ ${e.valor.toFixed(2)}</span>
                <span>${e.data}</span>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    // ==========================================================
    // 3. AUTH (Login/Cadastro) - Original
    // ==========================================================
    function LoginScreen() {
      const [modo, setModo] = useState('entrar');
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [erro, setErro] = useState('');

      async function handleAuth() {
        setErro('');
        try {
          if (modo === 'entrar') {
            const { error } = await sbClient.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;
          } else {
            const { error } = await sbClient.auth.signUp({ email, password: senha });
            if (error) throw error;
          }
        } catch (e) { setErro(e.message); }
      }

      return html`<div class="flex items-center justify-center min-h-screen p-4"><div class="w-full max-w-sm bg-[#161b22] p-6 rounded-2xl border border-[#30363d] space-y-4 fade-up">
        <h1 class="text-xl font-bold text-[#34d399] text-center">Minhas Moedinhas</h1>
        ${erro && html`<div class="bg-red-900/30 border border-red-500/50 p-2 rounded text-xs text-red-300 text-center">${erro}</div>`}
        <input type="email" placeholder="E-mail" onChange=${e => setEmail(e.target.value)} class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-[#30363d] text-sm focus:border-[#34d399] outline-none" />
        <input type="password" placeholder="Senha" onChange=${e => setSenha(e.target.value)} class="w-full px-4 py-3 bg-[#0d1117] rounded-xl border border-[#30363d] text-sm focus:border-[#34d399] outline-none" />
        <button onClick=${handleAuth} class="w-full bg-[#34d399] py-3 rounded-xl font-bold text-slate-950 hover:opacity-90 transition">${modo === 'entrar' ? 'Entrar' : 'Cadastrar'}</button>
        <button onClick=${() => { setModo(modo === 'entrar' ? 'cadastrar' : 'entrar'); setErro(''); }} class="w-full text-xs text-slate-500 underline text-center">${modo === 'entrar' ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Faça login'}</button>
      </div></div>`;
    }

    // ==========================================================
    // 4. APP (Estrutura Principal - Atualizada)
    // ==========================================================
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [visivel, setVisivel] = useState(true);
      const [patrimonios, setPatrimonios] = useState([]);

      useEffect(() => {
        sbClient.auth.getSession().then(s => {
          setUser(s.data.session?.user);
          setLoading(false);
        });
        sbClient.auth.onAuthStateChange((_, session) => setUser(session?.user));
      }, []);

      if (loading) return html`<div class="flex items-center justify-center min-h-screen text-[#34d399]">Carregando...</div>`;
      if (!user) return html`<${LoginScreen} />`;

      return html`
        <div class="max-w-md mx-auto p-4 pb-8 space-y-4 fade-up">
          
          <!-- Header com Botões (Original) -->
          <header class="flex justify-between items-center py-2 border-b border-[#30363d] mb-2">
            <div class="flex items-center gap-2">
              <h1 class="text-lg font-extrabold text-[#34d399]">Minhas Moedinhas</h1>
            </div>
            <div class="flex items-center gap-3">
              <button onClick=${() => setVisivel(!visivel)} class="text-slate-400 hover:text-[#34d399] transition-colors">
                ${visivel ? '👁️' : '🚫'}
              </button>
              <a href="https://wa.me/5511999999999?text=Quero%20multiplicar%20minhas%20moedinhas!" target="_blank" class="text-[#25D366] font-bold text-xs bg-[#0d1117] px-3 py-1 rounded-full border border-[#30363d] hover:border-[#25D366] transition-colors">
                📱 Indique
              </a>
            </div>
          </header>

          <!-- TOP 3 Oportunidades -->
          <section class="card-dash">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-xs font-bold text-white">🔥 Top 3 Oportunidades</h3>
              <span class="text-[8px] text-slate-500">Clique para ver a tese</span>
            </div>
            <${TopOportunidades} />
          </section>

          <!-- Gerenciador de Moedinhas (Original) -->
          <${GerenciadorMoedinhas} />

          <!-- Simulador de Aporte (Original aprimorado) -->
          <section class="card-dash space-y-3">
            <h2 class="text-sm font-bold text-slate-200">Simulador de Aporte</h2>
            <div class="flex gap-2">
              <input id="aporte-input" type="text" placeholder="R$ 100,00" class="input-moderno" />
              <button onClick=${() => {
                const v = parseFloat(document.getElementById('aporte-input').value.replace(',', '.'));
                if(v > 0) {
                  const divisao = MotorFinanceiro.calcularDivisao(v, 'moderado');
                  const total = divisao.rendaFixa + divisao.fiis + divisao.acoes;
                  setPatrimonios(prev => [...prev, total]);
                  document.getElementById('aporte-input').value = '';
                }
              }} class="bg-[#34d399] text-[#0d1117] font-bold px-6 py-2 rounded-lg">Simular</button>
            </div>
            <p class="text-[10px] text-slate-500">Divisão padrão: 50% RF, 40% FIIs, 10% Ações.</p>
          </section>

          <!-- Evolução do Patrimônio (NOVA LÓGICA E GRÁFICO) -->
          <section class="card-dash">
            <div class="flex justify-between items-center mb-2">
              <h2 class="text-sm font-bold text-slate-200">Evolução do Patrimônio</h2>
              <span class="text-xs font-bold text-[#34d399]">${visivel ? `R$ ${(patrimonios[patrimonios.length-1] || 0).toFixed(2)}` : '● ● ●'}</span>
            </div>
            <${GraficoPerformance} valores=${patrimonios} />
          </section>

          <!-- Banner de Monetização (Original) -->
          <div class="relative card-dash bg-gradient-to-r from-[#161b22] to-[#0d1117] border border-[#34d399]/20 overflow-hidden">
            <div class="flex justify-between items-center relative z-10">
              <div class="flex flex-col items-start space-y-1">
                <span class="text-[#fbbf24] text-lg">✨</span>
                <p class="text-xs font-bold text-white leading-tight">Quer multiplicar suas moedas?</p>
                <p class="text-[8px] text-slate-400">Abra sua conta na corretora parceira</p>
              </div>
              <div class="flex flex-col items-end space-y-1">
                <button class="bg-[#34d399] text-[#0d1117] text-[10px] font-bold px-4 py-2 rounded-lg hover:bg-[#2ecc86] transition-colors">Conhecer agora</button>
                <span class="text-[6px] text-slate-600">Taxa zero</span>
              </div>
            </div>
          </div>

          <!-- Footer (Original) -->
          <div class="flex justify-between items-center text-[8px] text-slate-600 leading-relaxed pt-4 border-t border-[#30363d]">
            <div class="flex gap-4">
              <span class="cursor-pointer hover:text-slate-400">Calculadora Juros</span>
              <span class="cursor-pointer hover:text-slate-400">Calculadora IPCA</span>
            </div>
            <p>© 2026 Minhas Moedinhas</p>
          </div>
          <div class="text-[6px] text-center text-slate-700 mt-1">
            Ferramenta educacional. Não constitui recomendação de compra ou venda.
          </div>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
