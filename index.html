<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Educação Financeira</title>
  
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 antialiased selection:bg-emerald-500/30">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const html = htm.bind(React.createElement);

    // DADOS HISTÓRICOS (Evolução Patrimonial)
    const HISTORICO = [
      { mes: 'Jan', valor: 4000 },
      { mes: 'Fev', valor: 5500 },
      { mes: 'Mar', valor: 8200 },
      { mes: 'Abr', valor: 12000 },
      { mes: 'Mai', valor: 15500 },
      { mes: 'Jun', valor: 20550 },
    ];
    const MAX_VALOR = Math.max(...HISTORICO.map((h) => h.valor));

    // REGRAS DE ALOCAÇÃO (50% Fixa, 40% FIIs, 10% Ações)
    const ALOCACAO = [
      { nome: 'Renda Fixa', pct: 0.5, cor: 'text-indigo-400' },
      { nome: 'FIIs (Imobiliário)', pct: 0.4, cor: 'text-emerald-400' },
      { nome: 'Ações', pct: 0.1, cor: 'text-amber-400' },
    ];

    function App() {
      // Inicializa o estado buscando o que foi salvo no localStorage (Persistência)
      const [valor, setValor] = useState(() => {
        return localStorage.getItem('@minhasmoedinhas:aporte') || '';
      });
      const [resultado, setResultado] = useState(null);

      // Toda vez que o resultado mudar, ele calcula a alocação
      const calcular = () => {
        const v = parseFloat(valor);
        if (Number.isNaN(v) || v <= 0) return;
        setResultado(v);
        localStorage.setItem('@minhasmoedinhas:aporte', valor); // Salva no navegador
      };

      // Dispara o cálculo inicial caso já exista valor salvo ao abrir a página
      useEffect(() => {
        if (valor) calcular();
      }, []);

      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-between">
          
          <main class="space-y-6">
            <header class="pt-4">
              <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">
                Minhas Moedinhas
              </h1>
              <p class="text-xs text-slate-400 mt-1">Sua jornada para a autonomia financeira começa aqui.</p>
            </header>

            <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
              <h2 class="text-sm font-semibold text-indigo-400 mb-4">Evolução do Patrimônio</h2>
              <div class="flex items-end justify-between h-36 gap-2 px-1 border-b border-l border-slate-700 pb-2 bg-slate-950/40 rounded-lg">
                ${HISTORICO.map((item) => html`
                  <div key=${item.mes} class="flex flex-col items-center group w-full relative">
                    <div
                      class="w-full min-w-[20px] bg-gradient-to-t from-emerald-600 to-emerald-400 rounded-t-md hover:from-emerald-400 hover:to-emerald-300 transition-all duration-300 cursor-pointer"
                      style=${{ height: `${(item.valor / MAX_VALOR) * 100}%`, minHeight: '8px' }}
                      title=${'R$ ' + item.valor.toLocaleString('pt-BR')}
                    ></div>
                    <span class="text-[10px] mt-2 text-slate-500 group-hover:text-emerald-400 font-medium transition-colors">${item.mes}</span>
                  </div>
                `)}
              </div>
            </section>

            <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl space-y-4">
              <h2 class="text-sm font-semibold text-indigo-400">Simulador Inteligente</h2>
              
              <div class="flex gap-2">
                <input
                  type="number"
                  min="0"
                  value=${valor}
                  onChange=${(e) => setValor(e.target.value)}
                  onKeyDown=${(e) => e.key === 'Enter' && calcular()}
                  placeholder="Quanto quer investir hoje? (R$)"
                  aria-label="Valor do aporte em reais"
                  class="w-full p-3 bg-slate-950 rounded-xl border border-slate-700 focus:outline-none focus:border-emerald-500 text-slate-100 placeholder-slate-500 transition-colors text-sm"
                />
                <button
                  onClick=${calcular}
                  class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-5 rounded-xl font-bold transition-all duration-200 active:scale-95 text-sm"
                >
                  Simular
                </button>
              </div>

              ${resultado !== null && html`
                <div class="pt-2 space-y-2 animate-fade-in">
                  <p class="text-xs text-slate-400 font-medium">Divisão sugerida para sua carteira:</p>
                  <div class="grid grid-cols-1 gap-2">
                    ${ALOCACAO.map((a) => html`
                      <div key=${a.nome} class="flex justify-between items-center bg-slate-950/60 p-3 rounded-xl border border-slate-800">
                        <span class="text-xs text-slate-300 font-medium">${a.nome} (${a.pct * 100}%)</span>
                        <span class="font-bold ${a.cor}">R$ ${(resultado * a.pct).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                      </div>
                    `)}
                  </div>
                </div>
              `}
            </section>
          </main>

          <footer class="mt-8 pt-4 border-t border-slate-800/60 text-center space-y-2 pb-2">
            <p class="text-[9px] text-slate-500 leading-relaxed max-w-xs mx-auto">
              <strong>Aviso Legal:</strong> O <em>Minhas Moedinhas</em> é uma ferramenta exclusivamente educativa. Os cálculos e divisões não constituem recomendação de compra ou alocação de ativos. Investimentos envolvem riscos.
            </p>
            <p class="text-[8px] text-slate-600">
              Seus dados financeiros são processados localmente e pertencem apenas a você.
            </p>
          </footer>

        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
