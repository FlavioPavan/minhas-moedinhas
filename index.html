<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Moedinhas v6.0</title>
    <link rel="icon" href="https://fav.farm/🪙" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const useState = React.useState;
        const useEffect = React.useEffect;

        // Captura automática de chaves via URL ou LocalStorage para o GitHub Pages
        const urlParams = new URLSearchParams(window.location.search);
        const urlBanco = urlParams.get('url') || localStorage.getItem('db_url') || "";
        const keyBanco = urlParams.get('key') || localStorage.getItem('db_key') || "";

        if (urlParams.get('url')) localStorage.setItem('db_url', urlParams.get('url'));
        if (urlParams.get('key')) localStorage.setItem('db_key', urlParams.get('key'));

        let supabaseClient = null;
        if (urlBanco && keyBanco) {
            supabaseClient = supabase.createClient(urlBanco, keyBanco);
        }

        const DATASET_PADRAO = [
            { nome: "Tesouro Selic 2027", categoria: "Tesouro Direto", valor: 5820.00, rentabilidade: "+10.75% a.a.", taxaAnual: 0.1075, risco: "Muito Baixo", riscoCor: "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20", desc: "O investmento mais seguro do país. Ideal para reserva de emergência.", ondeComo: "Qualquer banco ou corretora via Tesouro Direto.", graficos: { "1D": "0,25 20,24 40,23 60,24 80,25 100,26", "5D": "0,20 20,22 40,23 60,25 80,24 100,26", "1M": "0,25 20,20 40,18 60,15 80,12 100,5", "6M": "0,28 20,22 40,18 60,14 80,8 100,2" } },
            { nome: "CDB 110% Liquidez Diária", categoria: "CDB / CDI", valor: 2500.00, rentabilidade: "+11.50% a.a.", taxaAnual: 0.1150, risco: "Baixo", riscoCor: "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20", desc: "Empréstimo para bancos de médio porte com garantia do FGC até R$250mil.", ondeComo: "Direto no app de bancos digitais como Inter ou Nu.", graficos: { "1D": "0,25 20,24 40,24 60,24 80,25 100,25", "5D": "0,22 20,23 40,24 60,24 80,25 100,25", "1M": "0,25 20,22 40,20 60,18 80,14 100,10", "6M": "0,28 20,24 40,20 60,16 80,10 100,5" } },
            { nome: "LCA Banco do Brasil", categoria: "LCI / LCA", valor: 3200.00, rentabilidade: "+9.20% a.a.", taxaAnual: 0.0920, risco: "Muito Baixo", riscoCor: "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20", desc: "Letra de Crédito do Agronegócio. ISENTO de Imposto de Renda.", ondeComo: "Disponível no aplicativo do Banco do Brasil.", graficos: { "1D": "0,25 20,25 40,24 60,24 80,24 100,23", "5D": "0,24 20,24 40,23 60,23 80,22 100,21", "1M": "0,25 20,22 40,19 60,17 80,15 100,13", "6M": "0,28 20,24 40,20 60,17 80,14 100,11" } },
            { nome: "KNCR11 (Fundo de Crítico)", categoria: "FIIs", valor: 3500.00, rentabilidade: "+0.95% ao mês", taxaAnual: 0.1140, risco: "Baixo", riscoCor: "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20", desc: "Fundo focado em títulos de dívidas imobiliárias indexadas ao CDI.", ondeComo: "Comprado na Bolsa via Home Broker com o código KNCR11.", graficos: { "1D": "0,20 20,18 40,19 60,17 80,18 100,16", "5D": "0,22 20,19 40,21 60,18 80,17 100,15", "1M": "0,24 20,20 40,17 60,15 80,11 100,8", "6M": "0,27 20,22 40,16 60,12 80,8 100,4" } },
            { nome: "Itaú Unibanco (ITUB4)", categoria: "Ações", valor: 1980.00, rentabilidade: "+14.30% a.a.", taxaAnual: 0.1430, risco: "Alto", riscoCor: "bg-rose-500/10 text-rose-400 border border-rose-500/20", desc: "Excelente pagador de dividendos.", ondeComo: "Home Broker de qualquer corretora digitando ITUB4.", graficos: { "1D": "0,22 20,10 40,25 60,5 80,18 100,12", "5D": "0,28 20,14 40,22 60,8 80,16 100,5", "1M": "0,25 20,18 40,12 60,20 80,10 100,4", "6M": "0,29 20,24 40,15 60,18 80,8 100,2" } },
            { nome: "Bitcoin (BTC)", categoria: "Cripto", valor: 850.00, rentabilidade: "+42.80% a.a.", taxaAnual: 0.4280, risco: "Muito Alto", riscoCor: "bg-purple-500/10 text-purple-400 border border-purple-500/20", desc: "A maior moeda digital do mundo. Escassa e descentralizada.", ondeComo: "Corretoras de cripto (Binance/Mynt) ou ETF 'HASH11' na Bolsa.", graficos: { "1D": "0,28 20,5 40,25 60,2 85,22 100,14", "5D": "0,5 20,28 40,12 60,25 80,4 100,18", "1M": "0,25 20,12 40,28 60,8 80,22 100,5", "6M": "0,29 20,22 40,14 60,28 80,6 100,1" } }
        ];

        function App() {
            if (!supabaseClient) {
                return e("div", { className: "min-h-screen flex flex-col items-center justify-center bg-slate-950 p-6 text-center" },
                    e("div", { className: "max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 space-y-4" },
                        e("span", { className: "text-4xl" }, "🔑"),
                        e("h1", { className: "text-xl font-bold text-white" }, "Configuração do Banco Pendente"),
                        e("p", { className: "text-sm text-slate-400" }, "Para conectar este app ao seu banco de dados, passe os parâmetros 'url' e 'key' na URL do seu navegador. Exemplo:"),
                        e("div", { className: "bg-slate-950 p-3 rounded-xl text-xs font-mono text-emerald-400 break-all select-all" }, 
                            window.location.origin + window.location.pathname + "?url=SUA_URL&key=SUA_CHAVE"
                        )
                    )
                );
            }

            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [emailInput, setEmailInput] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [authLoading, setAuthLoading] = useState(false);
            const [investimentos, setInvestimentos] = useState([]);
            const [mostrarSaldo, setMostrarSaldo] = useState(true);
            const [categoriaFiltro, setCategoriaFiltro] = useState("Todos");
            const [itemSelecionado, setItemSelecionado] = useState(null);
            const [valorSimulado, setValorSimulado] = useState(1000);
            const [periodoGrafico, setPeriodoGrafico] = useState("1M");

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    if (session) {
                        setUser(session.user);
                        buscarInvestimentos(session.user.id);
                    } else {
                        setLoading(false);
                    }
                });

                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    if (session) {
                        setUser(session.user);
                        buscarInvestimentos(session.user.id);
                    } else {
                        setUser(null);
                        setInvestimentos([]);
                        setLoading(false);
                    }
                });

                return () => subscription.unsubscribe();
            }, []);

            const buscarInvestimentos = async (userId) => {
                try {
                    setLoading(true);
                    let { data, error } = await supabaseClient.from('investimentos_usuario').select('*');
                    if (error) throw error;

                    if (!data || data.length === 0) {
                        const payload = DATASET_PADRAO.map(item => ({
                            user_id: userId, nome: item.nome, categoria: item.categoria, valor: item.valor,
                            rentabilidade: item.rentabilidade, taxa_anual: item.taxaAnual, risco: item.risco,
                            risco_cor: item.riscoCor, desc_pratica: item.desc, onde_como: item.ondeComo, graficos: item.graficos
                        }));
                        const { data: insertedData, error: insertError } = await supabaseClient.from('investimentos_usuario').insert(payload).select();
                        if (insertError) throw insertError;
                        data = insertedData;
                    }
                    setInvestimentos(data);
                    if (data.length > 0) setItemSelecionado(data[0]);
                } catch (err) {
                    console.error(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleAuth = async (eSubmit) => {
                eSubmit.preventDefault();
                setAuthError("");
                setAuthLoading(true);
                const email = emailInput.trim();
                
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: passwordInput });

                if (error) {
                    if (error.status === 400 && !error.message.includes("Invalid login credentials")) {
                        const { error: signUpError } = await supabaseClient.auth.signUp({ email, password: passwordInput });
                        if (signUpError) { setAuthError(signUpError.message); setAuthLoading(false); }
                    } else {
                        setAuthError("E-mail ou senha incorretos.");
                        setAuthLoading(false);
                    }
                }
            };

            if (loading && !user) return e("div", { className: "min-h-screen flex items-center justify-center bg-slate-950 text-emerald-400 font-bold" }, "Conectando à Nuvem...");

            if (!user) {
                return e("div", { className: "min-h-screen flex items-center justify-center bg-slate-950 px-4" },
                    e("div", { className: "max-w-md w-full bg-slate-900 rounded-3xl p-8 border border-slate-800 shadow-2xl space-y-6" },
                        e("div", { className: "text-center space-y-2" },
                            e("div", { className: "inline-block bg-emerald-500 text-white p-3 rounded-2xl font-bold shadow-lg text-2xl" }, "🪙"),
                            e("h1", { className: "text-2xl font-black text-white" }, "Minhas", e("span", { className: "text-emerald-400" }, "Moedinhas")),
                            e("p", { className: "text-sm text-slate-400" }, "Insira seus dados para sincronizar sua carteira.")
                        ),
                        e("form", { onSubmit: handleAuth, className: "space-y-4" },
                            e("div", { className: "space-y-1" },
                                e("label", { className: "text-xs text-slate-400 font-bold uppercase" }, "E-mail"),
                                e("input", { type: "email", required: true, placeholder: "seu@email.com", value: emailInput, onChange: (evt) => setEmailInput(evt.target.value), className: "block w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-emerald-500" })
                            ),
                            e("div", { className: "space-y-1" },
                                e("label", { className: "text-xs text-slate-400 font-bold uppercase" }, "Senha"),
                                e("input", { type: "password", required: true, placeholder: "Mínimo 6 caracteres", value: passwordInput, onChange: (evt) => setPasswordInput(evt.target.value), className: "block w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-emerald-500" })
                            ),
                            authError && e("p", { className: "text-xs text-rose-400 bg-rose-500/10 p-2.5 rounded-lg border border-rose-500/20 text-center" }, authError),
                            e("button", { type: "submit", disabled: authLoading, className: "w-full py-3 bg-emerald-500 text-white font-bold rounded-xl shadow-lg transition" }, authLoading ? "Acessando..." : "Entrar / Cadastrar")
                        )
                    )
                );
            }

            const totalSaldo = investimentos.reduce((acc, item) => acc + Number(item.valor), 0);
            const categorias = ["Todos", "Tesouro Direto", "CDB / CDI", "LCI / LCA", "FIIs", "Ações", "Cripto"];
            const listaFiltrada = categoriaFiltro === "Todos" ? investimentos : investimentos.filter(i => i.categoria === categoriaFiltro);
            const rendimentoAnual = itemSelecionado ? valorSimulado * Number(itemSelecionado.taxa_anual) : 0;
            const rendimentoMensalEstimado = rendimentoAnual / 12;

            return e("div", { className: "min-h-screen flex flex-col bg-slate-950 text-slate-100" },
                e("header", { className: "bg-slate-900 border-b border-slate-800 sticky top-0 z-10" },
                    e("div", { className: "max-w-6xl mx-auto px-4 h-16 flex items-center justify-between" },
                        e("div", { className: "flex items-center gap-2" },
                            e("div", { className: "bg-emerald-500 text-white p-2 rounded-xl font-bold" }, "🪙"),
                            e("span", { className: "font-extrabold text-xl text-white" }, "Minhas", e("span", { className: "text-emerald-400" }, "Moedinhas"))
                        ),
                        e("div", { className: "flex items-center gap-3" },
                            e("span", { className: "text-xs text-slate-400 max-w-[120px] truncate" }, user.email),
                            e("button", { onClick: () => { supabaseClient.auth.signOut(); setUser(null); }, className: "text-xs font-bold text-rose-400" }, "Sair")
                        )
                    )
                ),
                e("main", { className: "flex-1 max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6" },
                    e("div", { className: "md:col-span-2 space-y-6" },
                        e("div", { className: "bg-slate-900 rounded-3xl p-6 border border-slate-800" },
                            e("div", { className: "flex justify-between items-center mb-2" },
                                e("span", { className: "text-sm text-slate-400" }, "Patrimônio Total"),
                                e("button", { onClick: () => setMostrarSaldo(!mostrarSaldo), className: "text-xs bg-slate-800 px-2.5 py-1.5 rounded-lg" }, mostrarSaldo ? "Ocultar" : "Mostrar")
                            ),
                            e("div", { className: "text-3xl font-black" }, mostrarSaldo ? `R$ ${totalSaldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : "R$ •••••••")
                        ),
                        e("div", { className: "flex flex-wrap gap-2" },
                            categorias.map(cat => e("button", { key: cat, onClick: () => setCategoriaFiltro(cat), className: `px-3 py-2 rounded-xl text-xs font-bold border ${categoriaFiltro === cat ? "bg-emerald-500 text-white" : "bg-slate-900 text-slate-300"}` }, cat))
                        ),
                        e("div", { className: "grid grid-cols-1 sm:grid-cols-2 gap-3" },
                            listaFiltrada.map(item => e("div", { key: item.id, onClick: () => setItemSelecionado(item), className: `bg-slate-900 p-5 rounded-2xl border-2 cursor-pointer ${itemSelecionado && itemSelecionado.id === item.id ? "border-emerald-500" : "border-transparent"}` },
                                e("div", { className: "flex justify-between" }, e("h3", { className: "font-bold text-white text-sm" }, item.nome), e("span", { className: `text-[9px] font-bold px-2 py-0.5 rounded-full ${item.risco_cor}` }, item.risco)),
                                e("div", { className: "flex justify-between items-end mt-4 pt-2 border-t border-slate-800" }, e("span", { className: "font-extrabold text-white" }, `R$ ${Number(item.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`), e("span", { className: "text-xs text-emerald-400 font-bold" }, item.rentabilidade))
                            ))
                        )
                    ),
                    e("div", { className: "space-y-6" },
                        itemSelecionado && e("div", { className: "bg-slate-900 rounded-3xl p-6 border border-slate-800 space-y-4" },
                            e("h3", { className: "text-base font-black text-white" }, itemSelecionado.nome),
                            e("div", { className: "pt-4 pb-2 bg-slate-950 rounded-xl" },
                                e("svg", { viewBox: "0 0 100 30", className: "w-full h-16 text-emerald-400 stroke-current", fill: "none", strokeWidth: "2" }, e("polyline", { points: itemSelecionado.graficos[periodoGrafico] || "0,15 100,15" }))
                            ),
                            e("p", { className: "text-xs text-slate-300" }, itemSelecionado.desc_pratica)
                        ),
                        itemSelecionado && e("div", { className: "bg-emerald-950 rounded-3xl p-6 space-y-4" },
                            e("input", { type: "number", value: valorSimulado, onChange: (evt) => setValorSimulado(Number(evt.target.value)), className: "block w-full p-2.5 bg-slate-950 rounded-xl text-white font-extrabold text-center" }),
                            e("div", { className: "text-xs space-y-1 text-emerald-100" },
                                e("div", { className: "flex justify-between" }, e("span", null, "Mensal:"), e("span", { className: "font-bold" }, `R$ ${rendimentoMensalEstimado.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`)),
                                e("div", { className: "flex justify-between" }, e("span", null, "Anual:"), e("span", { className: "font-bold" }, `R$ ${rendimentoAnual.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`))
                            )
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
</body>
</html>
