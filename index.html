<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Moedinhas - Educação Financeira</title>
  
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#111827] text-slate-100 antialiased selection:bg-emerald-500/30">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const html = htm.bind(React.createElement);

    // DADOS HISTÓRICOS (Gráfico)
    const HISTORICO = [
      { mes: 'Jan', valor: 4000 },
      { mes: 'Fev', valor: 5500 },
      { mes: 'Mar', valor: 8200 },
      { mes: 'Abr', valor: 12000 },
      { mes: 'Mai', valor: 15500 },
      { mes: 'Jun', valor: 20550 },
    ];
    const MAX_VALOR = Math.max(...HISTORICO.map((h) => h.valor));

    // REGRAS DE ALOCAÇÃO (Visual Vertical Identificado no Print)
    const ALOCACAO = [
      { nome: 'Renda Fixa (50%)', pct: 0.5, cor: 'text-indigo-400' },
      { nome: 'FIIs (Imobiliário) (40%)', pct: 0.4, cor: 'text-emerald-400' },
      { nome: 'Ações (10%)', pct: 0.1, cor: 'text-amber-400' },
    ];

    // OPORTUNIDADES MONETIZADAS (Links de Afiliados Simulados)
    const OPORTUNIDADES = [
      { 
        id: 'selic', 
        nome: 'Tesouro Selic 2029', 
        taxa: '10.5% a.a', 
        desc: 'O investimento mais seguro do país. Ideal para construir sua reserva de emergência com rendimento diário superior à poupança.',
        link: 'https://www.tesourodireto.com.br/', // Substituir por link de afiliado real futuro
        btnTexto: 'Abrir conta na Corretora Parceira'
      },
      { 
        id: 'mxrf', 
        nome: 'MXRF11 (Fundo Imobiliário)', 
        taxa: '9.8% a.a', 
        desc: 'Invista no mercado imobiliário com menos de R$ 11. Receba aluguéis mensais isentos de Imposto de Renda direto na sua conta.',
        link: '#', 
        btnTexto: 'Comprar Cotas com Taxa Zero'
      },
      { 
        id: 'acoes', 
        nome: 'Montar Carteira Diversificada', 
        taxa: 'Foco em Dividendos', 
        desc: 'Aprenda a selecionar as maiores empresas do Brasil para buscar lucros recorrentes e proteção contra a inflação a longo prazo.',
        link: '#', 
        btnTexto: 'Ver Guia Prático Recomendado'
      }
    ];

    function App() {
      const [valor, setValor] = useState(() => localStorage.getItem('@minhasmoedinhas:aporte') || '');
      const [resultado, setResultado] = useState(null);
      const [ativoAberto, setAtivoAberto] = useState(null); // Controla a sanfona de monetização

      const calcular = () => {
        const v = parseFloat(valor);
        if (Number.isNaN(v) || v <= 0) return;
        setResultado(v);
        localStorage.setItem('@minhasmoedinhas:aporte', valor);
      };

      useEffect(() => {
        if (valor) calcular();
      }, []);

      return html`
        <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-between space-y-6">
          
          <main class="space-y-6">
            <header class="pt-4">
              <h1 class="text-3xl font-extrabold text-[#34d399]">
                Minhas Moedinhas
              </h1>
              <p class="text-xs text-slate-400 mt-1">Sua jornada para a autonomia financeira começa aqui.</p>
            </header>

            <section class="bg-[#1f293d] p-5 rounded-2xl border border-slate-800 shadow-xl">
              <h2 class="text-sm font-semibold text-[#818cf8] mb-4">Evolução do Patrimônio</h2>
              <div class="flex items-end justify-between h-32 gap-2 px-2 border-b border-l border-slate-700 pb-2 bg-[#111827]/60 rounded-lg">
                ${HISTORICO.map((item) => html`
                  <div key=${item.mes} class="flex flex-col items-center group w-full relative">
                    <div
                      class="w-full bg-[#34d399] rounded-t-md hover:bg-[#6ee7b7] transition-all duration-200 cursor-pointer"
                      style="height: ${(item.valor / MAX_VALOR) * 100}%; min-height: 12px;"
                      title=${'R$ ' + item.valor.toLocaleString('pt-BR')}
                    ></div>
                    <span class="text-[10px] mt-2 text-slate-500 group-hover:text-[#34d399] font-medium">${item.mes}</span>
                  </div>
                `)}
              </div>
            </section>

            <section class="bg-[#1f293d] p-5 rounded-2xl border border-slate-800 shadow-xl space-y-4">
              <h2 class="text-sm font-semibold text-[#818cf8]">Simulador Inteligente</h2>
              
              <div class="flex gap-2">
                <input
                  type="number"
                  value=${valor}
                  onChange=${(e) => setValor(e.target.value)}
                  onKeyDown=${(e) => e.key === 'Enter' && calcular()}
                  placeholder="Quanto quer investir hoje? (R$)"
                  class="w-full p-3 bg-[#111827] rounded-xl border border-slate-700 focus:outline-none focus:border-[#34d399] text-slate-100 placeholder-slate-500 text-sm"
                />
                <button
                  onClick=${calcular}
                  class="bg-[#34d399] hover:bg-[#6ee7b7] text-slate-950 px-5 rounded-xl font-bold transition-all duration-200 active:scale-95 text-sm"
                >
                  Simular
                </button>
              </div>

              ${resultado !== null && html`
                <div class="pt-2 space-y-2">
                  <p class="text-xs text-slate-400 font-medium">Divisão sugerida para sua carteira:</p>
                  <div class="space-y-2">
                    ${ALOCACAO.map((a) => html`
                      <div key=${a.nome} class="flex justify-between items-center bg-[#111827]/80 p-4 rounded-xl border border-slate-800">
                        <span class="text-xs text-slate-300 font-medium">${a.nome}</span>
                        <span class="font-bold ${a.cor}">R$ ${(resultado * a.pct).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                      </div>
                    `)}
                  </div>
                </div>
              `}
            </section>

            <section class="bg-[#1f293d] p-5 rounded-2xl border border-slate-800 shadow-xl space-y-3">
              <h2 class="text-sm font-semibold text-[#818cf8]">Top 3 Oportunidades da Semana</h2>
              <div class="space-y-2">
                ${OPORTUNIDADES.map((op) => {
                  const aberto = ativoAberto === op.id;
                  return html`
                    <div 
                      key=${op.id}
                      onClick=${() => setAtivoAberto(aberto ? null : op.id)}
                      class="bg-[#111827]/50 hover:bg-[#111827] p-3.5 rounded-xl border border-slate-800 cursor-pointer transition-colors space-y-3"
                    >
                      <div class="flex justify-between items-center">
                        <div>
                          <h3 class="text-xs font-bold text-slate-200">${op.nome}</h3>
                          <span class="text-[10px] text-slate-500">${aberto ? 'Clique para fechar' : 'Clique para ver detalhes e como investir'}</span>
                        </div>
                        <span class="text-xs font-bold text-[#34d399]">${op.taxa}</span>
                      </div>
                      
                      ${aberto && html`
                        <div class="pt-3 border-t border-slate-800/80 space-y-3" onClick=${(e) => e.stopPropagation()}>
                          <p class="text-xs text-slate-400 leading-relaxed">
                            ${op.desc}
                          </p>
                          <a 
                            href=${op.link} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            class="block text-center bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-bold text-xs py-2 px-4 rounded-lg transition-all shadow-md transform active:scale-98"
                          >
                            ${op.btnTexto}
                          </a>
                        </div>
                      `}
                    </div>
                  `;
                })}
              </div>
            </section>
          </main>

          <footer class="pt-6 text-center space-y-2 pb-4">
            <p class="text-[9px] text-slate-500 leading-relaxed max-w-xs mx-auto">
              <strong>Aviso Legal:</strong> O <em>Minhas Moedinhas</em> é uma ferramenta exclusivamente educativa. Os cálculos e divisões não constituem recomendação de compra ou alocação de ativos. Investimentos envolvem riscos.
            </p>
            <p class="text-[8px] text-slate-600">
              Seus dados financeiros são processados localmente e pertencem apenas a você.
            </p>
          </footer>

        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
